<!-- build: v2 -->
<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daovone Shop – ລະບົບລວມ</title>
<style>
  :root{
    --green-dark:#14432f; --green-mid:#1c5d40; --green-light:#eef3ef;
    --gold:#b08d3e; --gold-light:#f3ead2; --cream:#ffffff;
    --text:#1a201c; --muted:#6b7770; --border:#e3e8e4;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans Lao','Segoe UI',sans-serif;background:var(--green-light);color:var(--text);}

  /* ---------- LOGIN ---------- */
  #login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;background:var(--green-dark);padding:24px;}
  #login-wrap h1{color:#fff;font-size:1.3rem;margin:0 0 24px;text-align:center;letter-spacing:.02em;}
  .pin-dots{display:flex;gap:14px;margin-bottom:10px;}
  .pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.25);transition:.2s;}
  .pin-dot.filled{background:var(--gold);}
  .pin-dot.err{background:#c0392b;}
  .pin-err{color:#e8b4a8;font-size:.85rem;min-height:1.2em;margin-bottom:10px;}
  .pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:12px;margin-top:12px;}
  .pin-key{width:72px;height:72px;border-radius:14px;border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.06);color:#fff;font-size:24px;font-weight:600;}
  .pin-key.del{color:#e8b4a8;}
  .pin-key.empty{background:transparent;border:none;}
  .pin-key:active{background:var(--gold);color:var(--green-dark);}
  #login-wrap .logo{font-size:2.2rem;margin-bottom:6px;}

  /* ---------- MENU ---------- */
  #menu-wrap{display:none;min-height:100vh;}
  .menu-header{background:var(--green-dark);color:#fff;padding:18px 20px;display:flex;
    justify-content:space-between;align-items:center;border-bottom:3px solid var(--gold);}
  .menu-header .who{font-size:.85rem;opacity:.85;}
  .menu-header .name{font-weight:700;font-size:1.05rem;}
  .logout-btn{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;
    border-radius:8px;padding:8px 14px;font-size:.85rem;}
  .cards{max-width:720px;margin:24px auto;padding:0 16px;display:grid;
    grid-template-columns:1fr;gap:16px;}
  @media(min-width:520px){.cards{grid-template-columns:1fr 1fr;}}
  .card{background:var(--cream);border:1px solid var(--border);border-radius:14px;
    padding:22px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 10px rgba(20,67,47,.06);
    cursor:pointer;}
  .card:active{background:var(--gold-light);}
  .card .icon{font-size:2rem;width:52px;text-align:center;}
  .card .txt b{display:block;font-size:1.05rem;color:var(--green-dark);}
  .card .txt span{font-size:.82rem;color:var(--muted);}
  .empty-note{text-align:center;color:var(--muted);margin-top:60px;padding:0 24px;}

  /* ---------- MODULE VIEW ---------- */
  #module-wrap{display:none;position:fixed;inset:0;background:#000;z-index:50;}
  .module-bar{height:48px;background:var(--green-dark);display:flex;align-items:center;
    padding:0 10px;gap:10px;}
  .back-btn{background:var(--gold);color:var(--green-dark);border:none;border-radius:8px;
    padding:8px 14px;font-weight:700;font-size:.9rem;}
  .module-bar .mtitle{color:#fff;font-size:.9rem;opacity:.9;}
  #module-frame{width:100%;height:calc(100% - 48px);border:none;background:#fff;}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login-wrap">
  <div class="logo">🏪</div>
  <h1>ຮ້ານດາວອນ — ປ້ອນລະຫັດເຂົ້າລະບົບ</h1>
  <div class="pin-dots" id="pinDots"></div>
  <div class="pin-err" id="pinErr">&nbsp;</div>
  <div class="pin-grid" id="pinGrid"></div>
</div>

<!-- ================= MENU ================= -->
<div id="menu-wrap">
  <div class="menu-header">
    <div>
      <div class="name" id="userName">-</div>
      <div class="who" id="userRole">-</div>
    </div>
    <button class="logout-btn" onclick="logout()">ອອກ</button>
  </div>
  <div class="cards" id="cards"></div>
  <div class="empty-note" id="emptyNote" style="display:none;">ບັນຊີນີ້ຍັງບໍ່ໄດ້ຮັບສິດເຂົ້າໃຊ້ລະບົບໃດເລີຍ ກະລຸນາຕິດຕໍ່ຜູ້ອານຸມັດ</div>
</div>

<!-- ================= MODULE (iframe) ================= -->
<div id="module-wrap">
  <div class="module-bar">
    <button class="back-btn" onclick="closeModule()">← ກັບໄປໜ້າຫຼັກ</button>
    <div class="mtitle" id="moduleTitle"></div>
  </div>
  <iframe id="module-frame"></iframe>
</div>

<script>
/* ================= CONFIG ================= */
const SUPA_URL = "https://snyyhmeprngskneaaubb.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNueXlobWVwcm5nc2tuZWFhdWJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjIyMTgsImV4cCI6MjA5NTEzODIxOH0.3ltbo2EDzbHuMIC-TkoRew7asII0rIGNF0qoz2DkWHs";
const HEADERS = { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY, "Content-Type": "application/json" };

// Filenames must sit in the SAME folder as this hub.html on GitHub Pages.
// Rename your 3 uploaded files exactly like this when you deploy:
const MODULES = {
  cash:    { label: "ເງິນສົດ",     icon: "💰", file: "cash.html" },
  payroll: { label: "ເງິນເດືອນ",   icon: "🧾", file: "payroll.html" },
  expense: { label: "ລາຍຈ່າຍ",     icon: "📒", file: "expense.html" },
};

/* ================= LOGIN LOGIC ================= */
let pin = "";
let currentUser = null;

function renderPinGrid(){
  const grid = document.getElementById('pinGrid');
  const keys = ["1","2","3","4","5","6","7","8","9","","0","del"];
  grid.innerHTML = keys.map(k=>{
    if(k==="") return `<button class="pin-key empty"></button>`;
    if(k==="del") return `<button class="pin-key del" onclick="pinDel()">⌫</button>`;
    return `<button class="pin-key" onclick="pinPress('${k}')">${k}</button>`;
  }).join("");
}
function renderDots(err){
  const dots = document.getElementById('pinDots');
  dots.innerHTML = "";
  for(let i=0;i<6;i++){
    const filled = i < pin.length;
    dots.innerHTML += `<div class="pin-dot ${filled?'filled':''} ${err?'err':''}"></div>`;
  }
}
function pinPress(d){
  if(pin.length>=6) return;
  pin += d;
  renderDots(false);
  document.getElementById('pinErr').innerHTML = "&nbsp;";
  if(pin.length>=4) tryLogin();
}
function pinDel(){
  pin = pin.slice(0,-1);
  renderDots(false);
}
async function tryLogin(){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/hub_accounts?pin=eq.${pin}&active=eq.true&select=*`, { headers: HEADERS });
    const rows = await res.json();
    if(rows && rows.length){
      currentUser = rows[0];
      sessionStorage.setItem('daovone_hub_user', JSON.stringify(currentUser));
      showMenu();
    } else {
      document.getElementById('pinErr').textContent = "ລະຫັດບໍ່ຖືກຕ້ອງ";
      renderDots(true);
      setTimeout(()=>{ pin=""; renderDots(false); }, 500);
    }
  }catch(e){
    document.getElementById('pinErr').textContent = "ເຊື່ອມຕໍ່ບໍ່ໄດ້ ລອງໃໝ່";
    pin=""; renderDots(false);
  }
}

/* ================= MENU LOGIC ================= */
function showMenu(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('menu-wrap').style.display='block';
  document.getElementById('userName').textContent = currentUser.name;
  const roleLabel = {owner:'ຫົວໜ້າ', admin:'ຜູ້ອານຸມັດ', staff:'ພະນັກງານ'}[currentUser.role] || currentUser.role;
  document.getElementById('userRole').textContent = roleLabel;

  const allowed = Array.isArray(currentUser.modules) ? currentUser.modules : [];
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = "";
  let count = 0;
  Object.keys(MODULES).forEach(key=>{
    if(!allowed.includes(key)) return;
    count++;
    const m = MODULES[key];
    cardsEl.innerHTML += `
      <div class="card" onclick="openModule('${key}')">
        <div class="icon">${m.icon}</div>
        <div class="txt"><b>${m.label}</b><span>ກົດເພື່ອເຂົ້າລະບົບ</span></div>
      </div>`;
  });
  document.getElementById('emptyNote').style.display = count? 'none':'block';
}

function openModule(key){
  const m = MODULES[key];
  document.getElementById('moduleTitle').textContent = m.label;
  document.getElementById('module-frame').src = m.file;
  document.getElementById('module-wrap').style.display='block';
}
function closeModule(){
  document.getElementById('module-wrap').style.display='none';
  document.getElementById('module-frame').src = "about:blank";
}
function logout(){
  sessionStorage.removeItem('daovone_hub_user');
  currentUser = null; pin = "";
  document.getElementById('menu-wrap').style.display='none';
  document.getElementById('module-wrap').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  renderDots(false);
}

/* ================= INIT ================= */
renderPinGrid();
renderDots(false);
const saved = sessionStorage.getItem('daovone_hub_user');
if(saved){
  try{ currentUser = JSON.parse(saved); showMenu(); }catch(e){}
}
</script>
</body>
</html>
