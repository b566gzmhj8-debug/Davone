<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Davone Shop - аәҘаә°аәҡаә»аәҡаәӘаә°аә•аәұаәӯаәҒ &amp; аәҡаәҙаәҷаәӮаәІаәҚ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Lao:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F3ED; --panel:#FFFFFF; --panel2:#EFEAE0; --border:#DBD2C0;
    --orange:#B8471C; --orange-soft:#B8471C; --ink:#2A241E; --muted:#7C7266;
    --danger:#A23327; --ok:#3E7A52;
    --font-body:'Noto Serif Lao','Source Serif 4',Georgia,serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;}
  #app{width:100%;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
  .narrow{max-width:520px;margin:0 auto;width:100%;}

  /* ---- Login ---- */
  #loginScreen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;}
  .brand{text-align:center;margin-bottom:28px;}
  .brand .name{font-size:22px;letter-spacing:1px;color:var(--orange-soft);font-weight:600;}
  .brand .sub{font-size:13px;color:var(--muted);margin-top:4px;}
  .login-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .login-input{width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--ink);font-size:15px;font-family:var(--font-body);outline:none;}
  .login-input:focus{border-color:var(--orange);}
  .login-btn{width:100%;padding:13px;border:none;border-radius:8px;background:var(--orange);color:#fff;font-weight:600;font-size:14px;letter-spacing:.03em;font-family:var(--font-body);margin-top:2px;}
  .login-btn:active{filter:brightness(.92);}
  .loginErr{color:var(--danger);font-size:13px;min-height:18px;margin-top:2px;text-align:center;}

  /* ---- Header / Nav ---- */
  header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;gap:10px;}
  .head-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .seal-mark{width:34px;height:34px;flex:none;display:flex;align-items:center;justify-content:center;position:relative;border-radius:50%;border:1.4px solid var(--orange);color:var(--orange);}
  .seal-mark::before{content:'';position:absolute;inset:3px;border:1px dashed var(--orange);border-radius:50%;}
  .seal-mark .dv-icon{width:15px;height:15px;}
  header .title{font-size:15px;color:var(--orange-soft);font-weight:700;line-height:1.2;}
  header .role{font-size:11px;color:var(--muted);}
  header .logout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:var(--font-body);}

  nav{display:flex;overflow-x:auto;background:var(--panel2);border-bottom:1px solid var(--border);}
  nav button{flex:1;min-width:70px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);padding:8px 4px 7px;font-size:10.5px;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-body);}
  nav button.active{color:var(--orange-soft);border-bottom:2px solid var(--orange);font-weight:600;}

  main{flex:1;padding:14px 14px 90px;overflow-y:auto;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .card h3{margin:0 0 10px;font-size:14px;color:var(--orange-soft);border-bottom:1px solid var(--border);padding-bottom:8px;display:flex;align-items:center;gap:7px;}
  .card h3 .dv-icon{color:var(--orange);}
  .row{display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:flex-start;gap:10px;padding:7px 0;font-size:13px;border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row>span:first-child{flex:1 1 auto;min-width:0;}
  .row>span:last-child{flex:none;white-space:nowrap;text-align:right;}
  .row>span:only-child{flex:1 1 auto;white-space:normal;text-align:left;}
  .muted{color:var(--muted);}
  .gold{color:var(--orange-soft);}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;}
  input,select,textarea{width:100%;padding:9px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--ink);font-size:14px;}
  input:focus,select:focus,textarea:focus{outline:1px solid var(--orange);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--orange);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;width:100%;margin-top:10px;font-family:var(--font-body);}
  .btn.secondary{background:none;border:1px solid var(--orange);color:var(--orange-soft);}
  .btn.danger{background:var(--danger);color:#fff;}
  .btn.small{width:auto;padding:6px 10px;font-size:12px;margin-top:0;}
  .btn .dv-icon{width:15px;height:15px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--panel2);border-radius:10px;padding:12px;text-align:center;}
  .stat .num{font-size:19px;color:var(--orange-soft);font-weight:700;font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:12px;}
  .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
  .tag.ok{border-color:var(--ok);color:var(--ok);}
  .tag.sold{border-color:var(--danger);color:var(--danger);}
  .list-item{display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .list-item:last-child{border-bottom:none;}
  .list-item>span:first-child,.list-item>div:first-child{flex:1 1 auto;min-width:0;}
  .list-item>span:last-child,.list-item>div:last-child{flex:none;white-space:nowrap;text-align:right;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;}
  .cart-item{display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px;}
  .cart-item .x{color:var(--danger);font-size:16px;padding:0 6px;}
  .search-box{position:relative;margin-bottom:8px;}
  .picker-list{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px;}
  .picker-row{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;}
  .picker-row:last-child{border-bottom:none;}
  .picker-row .n{color:var(--ink);}
  .picker-row .p{color:var(--orange-soft);font-size:12px;}
  .toast-container{position:fixed;left:0;right:0;top:calc(66px + env(safe-area-inset-top));z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 16px;pointer-events:none;}
  .toast{background:var(--ink);border:none;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;box-shadow:0 10px 24px -8px rgba(0,0,0,.45);text-align:center;max-width:440px;animation:toastIn .18s ease-out;display:flex;align-items:center;gap:7px;justify-content:center;font-family:var(--font-body);}
  .toast .dv-icon{color:#8fd0a0;width:15px;height:15px;flex:none;}
  @keyframes toastIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;z-index:50;}
  .modal{background:var(--panel);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:520px;margin:0 auto;max-height:85vh;overflow-y:auto;}
  .modal h3{margin-top:0;color:var(--orange-soft);display:flex;align-items:center;gap:7px;}
  .invoice-total{font-size:20px;color:var(--orange-soft);font-weight:700;text-align:right;margin-top:10px;font-variant-numeric:tabular-nums;}

  /* ---- Document-style card (receipt / transfer note), mimics printed receipt layout ---- */
  .doc-card{margin:-16px -16px 14px;border-radius:16px 16px 0 0;overflow:hidden;background:var(--panel);border:1px solid var(--border);border-top:none;}
  .doc-head{background:linear-gradient(135deg,var(--orange),#D9752F);color:#fff;padding:16px 18px 14px;}
  .doc-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .doc-brand{display:flex;align-items:center;gap:8px;min-width:0;}
  .doc-brand .seal-mark{width:32px;height:32px;border-color:#fff;color:#fff;flex:none;}
  .doc-brand .seal-mark::before{border-color:rgba(255,255,255,.6);}
  .doc-brand-name{font-weight:700;font-size:14px;letter-spacing:.4px;white-space:nowrap;}
  .doc-head-title{text-align:right;flex:none;}
  .doc-head-title h3{margin:0;color:#fff;font-size:14px;justify-content:flex-end;font-family:var(--font-mono);}
  .doc-head-meta{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;margin-top:9px;font-size:11px;}
  .doc-tag{font-size:11px;font-weight:700;border:1.3px solid rgba(255,255,255,.9);border-radius:6px;padding:3px 8px;color:#fff;white-space:nowrap;background:rgba(0,0,0,.18);text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .doc-tag.solid{background:rgba(0,0,0,.36);border-color:transparent;}
  .doc-tag.solid, .doc-tag.solid *{color:#fff !important;}
  .doc-body{padding:14px 18px 2px;}
  .doc-box{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start;}
  .doc-avatar{width:38px;height:38px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;}
  .doc-avatar .dv-icon{width:18px;height:18px;}
  .doc-box-info{flex:1;min-width:0;}
  .doc-line{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink);margin-top:4px;}
  .doc-line:first-child{margin-top:0;}
  .doc-line .dv-icon{width:13px;height:13px;color:var(--orange-soft);flex:none;}
  .doc-section-label{font-size:11px;font-weight:700;color:var(--orange-soft);letter-spacing:.02em;margin:2px 0 6px;}
  .doc-table-head{display:flex;flex-wrap:nowrap;justify-content:space-between;gap:10px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:7px 12px;border-radius:8px 8px 0 0;}
  .doc-table-body{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:0 12px;margin-bottom:12px;}
  .doc-table-body .row{font-size:12.5px;}
  .doc-total-band{background:var(--orange);color:#fff;border-radius:9px;padding:10px 14px;display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:center;gap:10px;font-size:16px;font-weight:700;margin:6px 0 14px;}
  .doc-total-band span:last-child{white-space:nowrap;flex:none;}
  .doc-footer{padding:12px 18px;border-top:1px solid var(--border);background:var(--panel2);text-align:center;font-size:11px;color:var(--muted);}
  @media (min-width:860px){
    .doc-card{margin:-28px -32px 16px;border-radius:16px;}
  }
  .switch{display:flex;align-items:center;gap:8px;font-size:13px;margin:10px 0;}
  .icon{width:16px;height:16px;display:inline-block;vertical-align:middle;}
  hr.sep{border:none;border-top:1px solid var(--border);margin:12px 0;}

  .body-row{display:flex;flex-direction:column;flex:1;min-height:0;}
  .card-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .row-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 9px;font-size:12px;line-height:1;display:inline-flex;align-items:center;gap:4px;font-family:var(--font-body);}
  .icon-btn:hover{color:var(--orange-soft);border-color:var(--orange);}
  .icon-btn .dv-icon{width:12px;height:12px;}

  /* ---- Icons & mono reference codes ---- */
  .dv-icon{width:17px;height:17px;flex:none;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;}
  .mono{font-family:var(--font-mono);letter-spacing:-.01em;}

  /* ===================== DESKTOP / MacBook LAYOUT ===================== */
  @media (min-width:860px){
    body{padding:0;}
    #loginScreen{min-height:100vh;}
    header{padding:16px 28px;}
    header .title{font-size:17px;}
    .body-row{flex-direction:row;align-items:stretch;}
    nav{
      flex-direction:column;overflow-x:visible;width:190px;flex:none;
      border-bottom:none;border-right:1px solid var(--border);
      position:sticky;top:53px;align-self:flex-start;height:calc(100vh - 53px);
    }
    nav button{
      flex:none;width:100%;flex-direction:row;justify-content:flex-start;text-align:left;padding:13px 20px;font-size:13px;
      border-bottom:none;border-left:3px solid transparent;
    }
    nav button .dv-icon{width:16px;height:16px;}
    nav button.active{border-left:3px solid var(--orange);border-bottom:none;background:var(--panel2);}
    main{flex:1;padding:26px 40px 70px;max-width:1560px;}
    .card{padding:18px 22px;}
    .card-grid.cols-2{grid-template-columns:1fr 1fr;}
    .card-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
    .stats-row{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));max-width:1100px;}
    .login-btn:hover{filter:brightness(1.06);cursor:pointer;}
    nav button:hover{color:var(--orange-soft);cursor:pointer;}
    .logout:hover{border-color:var(--orange);cursor:pointer;}
    .list-item, .row{cursor:default;}
    .row.clickable, .list-item.clickable{cursor:pointer;}
    .row.clickable:hover, .list-item.clickable:hover{background:var(--panel2);border-radius:6px;}
    .modal-bg{align-items:center;}
    .modal{border-radius:16px;width:90vw;max-width:900px;max-height:88vh;padding:28px 32px;}
    .modal input, .modal select, .modal textarea{padding:11px 13px;font-size:15px;}
    .modal label{font-size:13px;margin:12px 0 5px;}
    .icon-btn{padding:7px 13px;font-size:13px;}
    .btn.small{padding:8px 15px;font-size:13px;}
  }
  /* аәҠа»ҲаәӯаәҮаә„аә»а»үаәҷаә«аәІаәӘаәҙаәҷаә„а»үаәІ (аәһаәҙаәЎаәҠаә·а»Ҳ/аәҘаә°аә«аәұаә”а»Җаәһаә·а»ҲаәӯаәҒаәұа»Ҳаәҷаә•аәӯаәҮ а»Ғаә—аәҷаәҒаәІаәҷа»ҖаәҘаә·а»ҲаәӯаәҷаәҘаәҙаә”аәўаәІаә§а»Ҷ) */
  .model-search-wrap{position:relative;}
  .model-search-dropdown{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--panel);border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;z-index:60;box-shadow:0 10px 24px -8px rgba(0,0,0,.3);}
  .model-search-item{padding:10px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);}
  .model-search-item:last-child{border-bottom:none;}
  .model-search-item:hover,.model-search-item.active{background:var(--panel2);}
  .model-search-empty{padding:10px 12px;font-size:13px;color:var(--muted);}
</style>
</head>
<body>
<div id="app">

  <!-- ===================== LOGIN ===================== -->
  <div id="loginScreen">
    <div class="narrow" style="display:flex;flex-direction:column;align-items:center;">
    <div class="brand">
      <div class="seal-mark" style="width:44px;height:44px;margin:0 auto 12px;"><svg class="dv-icon" style="width:20px;height:20px;"><use href="#i-gear"></use></svg></div>
      <div class="name">DAVONE SHOP</div>
      <div class="sub">аәҘаә°аәҡаә»аәҡаәӘаә°аә•аәұаәӯаәҒ &amp; аәҡаәҙаәҷаәӮаәІаәҚ</div>
    </div>
    <div class="login-form">
      <input class="login-input" type="text" id="loginUsername" placeholder="аәҠаә·а»Ҳаәңаә№а»үа»ғаәҠа»ү" autocomplete="username" autocapitalize="off" spellcheck="false">
      <input class="login-input" type="password" id="loginPassword" placeholder="аәҘаә°аә«аәұаә”аәңа»ҲаәІаәҷ" autocomplete="current-password">
      <div class="loginErr" id="loginErr">&nbsp;</div>
      <button class="login-btn" id="loginBtn">а»ҖаәӮаә»а»үаәІаәӘаә№а»ҲаәҘаә°аәҡаә»аәҡ</button>
    </div>
    </div>
  </div>

  <!-- ===================== MAIN APP ===================== -->
  <div id="mainScreen" style="display:none;flex-direction:column;flex:1;">
    <header>
      <div class="head-left">
        <div class="seal-mark"><svg class="dv-icon"><use href="#i-gear"></use></svg></div>
        <div>
          <div class="title">DAVONE SHOP</div>
          <div class="role" id="roleLabel"></div>
        </div>
      </div>
      <button class="logout" id="logoutBtn"><svg class="dv-icon" style="width:13px;height:13px;"><use href="#i-logout"></use></svg>аәӯаәӯаәҒаәҘаә°аәҡаә»аәҡ</button>
    </header>
    <div class="body-row">
      <nav id="tabNav"></nav>
      <main id="mainContent"></main>
    </div>
  </div>

</div>

<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
<symbol id="i-home" viewBox="0 0 24 24"><polyline points="3 11 12 4 21 11"></polyline><path d="M5 10v9a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1v-9"></path></symbol>
<symbol id="i-box" viewBox="0 0 24 24"><path d="M3 7.5l9-4 9 4-9 4-9-4z"></path><path d="M3 7.5v9l9 4 9-4v-9"></path><path d="M12 11.5v9"></path></symbol>
<symbol id="i-truck" viewBox="0 0 24 24"><rect x="1" y="7" width="13" height="9" rx="1"></rect><path d="M14 10h4l3 3v3h-7z"></path><circle cx="5.5" cy="18.2" r="1.6"></circle><circle cx="17" cy="18.2" r="1.6"></circle></symbol>
<symbol id="i-receipt" viewBox="0 0 24 24"><path d="M6 3h12v17l-2-1.3L14 20l-2-1.3L10 20l-2-1.3L6 20V3z"></path><line x1="8.5" y1="8" x2="15.5" y2="8"></line><line x1="8.5" y1="11.5" x2="15.5" y2="11.5"></line><line x1="8.5" y1="15" x2="13" y2="15"></line></symbol>
<symbol id="i-chart" viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="20"></line><rect x="6" y="12" width="3" height="8"></rect><rect x="11" y="8" width="3" height="12"></rect><rect x="16" y="4" width="3" height="16"></rect></symbol>
<symbol id="i-pencil" viewBox="0 0 24 24"><path d="M4 20l1-4L16 5l3 3L8 19l-4 1z"></path><line x1="14" y1="7" x2="17" y2="10"></line></symbol>
<symbol id="i-trash" viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"></line><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"></path><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></symbol>
<symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V6l7-3z"></path><polyline points="9 12 11 14 15 9.5"></polyline></symbol>

   ============================================================ */
async function sb(path, options={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method: options.method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers||{})
    },
    body: options.body ? JSON.stringify(options.body) : undefined
  });
  if(!res.ok){
    const t = await res.text().catch(()=> '');
    throw new Error(`Supabase error ${res.status}: ${t}`);
  }
  if(res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function sumByCurrency(rows, amountField){
  const out = {};
  rows.forEach(r=>{
    const c = r.currency || 'LAK';
    out[c] = (out[c]||0) + Number(r[amountField]||0);
  });
  return out;
}

  return parts.length ? parts.join('<br>') : (fmtMoney(0) + ' аәҒаәөаәҡ');

/* аёӣаёЈаёұаёҡаё§аёұаёҷаё—аёөа№ҲаёҲаёІаёҒ YYYY-MM-DD (аёЈаё№аёӣа№ҒаёҡаёҡаёЎаёІаё•аёЈаёҗаёІаёҷаё—аёөа№Ҳа№ҖаёҒа№Үаёҡа№ғаёҷаёҗаёІаёҷаёӮа№үаёӯаёЎаё№аёҘ/аёҠа№ҲаёӯаёҮ input date) а№ғаё«а№үа№ҒаёӘаё”аёҮаёңаёҘа№Җаёӣа№Үаёҷ аё§аёұаёҷ-а№Җаё”аё·аёӯаёҷ-аёӣаёө аё•аёІаёЎаё—аёөа№Ҳаёңаё№а№үа№ғаёҠа№үаё•а№үаёӯаёҮаёҒаёІаёЈа№Җаё«а№Үаёҷ (а№ғаёҠа№үа№Ғаё„а№Ҳаё•аёӯаёҷа№ҒаёӘаё”аёҮаёңаёҘ а№„аёЎа№ҲаёҒаёЈаё°аё—аёҡаёӮа№үаёӯаёЎаё№аёҘаё—аёөа№Ҳа№ҖаёҒа№ҮаёҡаёҲаёЈаёҙаёҮ) */
function fmtDateDMY(dateStr){
  if(!dateStr) return '';
  const d = String(dateStr).slice(0,10);
  const parts = d.split('-');
  if(parts.length !== 3) return d;
  const [y,m,day] = parts;
  return `${day}-${m}-${y}`;
}

/* аёҒаё” Enter/Return а№ғаёҷаёҠа№ҲаёӯаёҮаёһаё§аёҒаёҷаёөа№ү = аёҒаё”аёӣаёёа№ҲаёЎа№Җаё”аёөаёўаё§аёҒаёұаёҡаёӣаёёа№ҲаёЎаё—аёөа№ҲаёЈаё°аёҡаёё (аёӘаё°аё”аё§аёҒа№Җаё§аёҘаёІаёһаёҙаёЎаёһа№Ңаё”а№үаё§аёўаё„аёөаёўа№ҢаёҡаёӯаёЈа№Ңаё” MacBook) */
function bindEnterKey(inputIds, buttonId){
  inputIds.forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        const btn = document.getElementById(buttonId);
        if(btn) btn.click();
      }
    });
  });
}
/* аёҒаё” Enter/Return а№ғаёҷаёҠа№ҲаёӯаёҮа№Җаё«аёҘа№ҲаёІаёҷаёөа№ү = а№Ӯаё”аё”а№„аёӣа№ӮаёҹаёҒаёұаёӘаёҠа№ҲаёӯаёҮаё–аёұаё”а№„аёӣа№ғаёҷаёҘаёіаё”аёұаёҡ (аёҠа№ҲаёӯаёҮаёӘаёёаё”аё—а№үаёІаёўа№Ӯаё”аё”а№„аёӣ finalId аё–а№үаёІаёЎаёөаёЈаё°аёҡаёё) */
function bindEnterAdvance(inputIds, finalId){
  inputIds.forEach((id, idx)=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        const nextId = inputIds[idx+1] || finalId;
        const nextEl = nextId ? document.getElementById(nextId) : null;
        if(nextEl) nextEl.focus();
      }
    });
  });
}

/* аәӣа»ҲаәҪаәҷ <select> аә—аәөа»ҲаәЎаәөаәҘаәІаәҚаәҒаәІаәҷаәӘаәҙаәҷаә„а»үаәІаә«аәјаәІаәҚа»Ҷа»ғаә«а»үаәһаәҙаәЎаә„аә»а»үаәҷаә«аәІа»„аә”а»ү (аәҠаә·а»Ҳ аә«аәјаә· аәҘаә°аә«аәұаә”) а»Ғаә—аәҷаәҒаәІаәҷа»ҖаәҘаә·а»Ҳаәӯаәҷаә«аәІа»ҖаәӯаәҮ
   а»ғаәҠа»үа»„аә”а»үаәҒаәұаәҡ select а»ғаә”аәҒа»Қа»Ҳа»„аә”а»ү а»Ӯаә”аәҚ select а»ҖаәҒаә»а»ҲаәІаәҚаәұаәҮаәўаә№а»Ҳа»ғаәҷ DOM (а»ҖаәҠаә·а»ҲаәӯаәҮа»„аә§а»ү) а»Җаәһаә·а»Ҳаәӯаәҡа»Қа»Ҳа»ғаә«а»үа»Ӯаә„а»үаә”аәӯаә·а»Ҳаәҷаә—аәөа»Ҳаәӯа»үаәІаәҮаәӯаәөаәҮ .value / .selectedOptions аәһаәұаәҮ */
function enableSearchableSelect(selectEl){
  if(!selectEl || selectEl.dataset.searchable) return;
  selectEl.dataset.searchable = 'true';
  const wrap = document.createElement('div');
  wrap.className = 'model-search-wrap';
  selectEl.parentNode.insertBefore(wrap, selectEl);
  wrap.appendChild(selectEl);
  selectEl.style.display = 'none';

  const input = document.createElement('input');
  input.type = 'text';
  input.id = selectEl.id + '_search';
  input.autocomplete = 'off';
  input.placeholder = 'аәһаәҙаәЎаәҠаә·а»Ҳ аә«аәјаә· аәҘаә°аә«аәұаә”аәӘаәҙаәҷаә„а»үаәІ а»Җаәһаә·а»Ҳаәӯаә„аә»а»үаәҷаә«аәІ...';
  wrap.appendChild(input);

  const dropdown = document.createElement('div');
  dropdown.className = 'model-search-dropdown';
  dropdown.style.display = 'none';
  wrap.appendChild(dropdown);

  const options = Array.from(selectEl.options).filter(o=>o.value);
  let highlighted = -1;

  function renderList(filter){
    const f = (filter||'').trim().toLowerCase();
    const filtered = f ? options.filter(o=> o.textContent.toLowerCase().includes(f)) : options;
    highlighted = -1;
    dropdown.innerHTML = filtered.length
      ? filtered.map(o=> `<div class="model-search-item" data-value="${o.value}">${o.textContent}</div>`).join('')
      : '<div class="model-search-empty">аәҡа»Қа»Ҳаәһаә»аәҡаәӘаәҙаәҷаә„а»үаәІ</div>';
  }
  function openDropdown(){ renderList(input.value); dropdown.style.display = 'block'; }
  function closeDropdown(){ dropdown.style.display = 'none'; }
  function selectOption(value){
    selectEl.value = value;
    const opt = selectEl.selectedOptions[0];
    input.value = opt ? opt.textContent : '';
    closeDropdown();
    selectEl.dispatchEvent(new Event('change', {bubbles:true}));
  }
  function updateHighlight(items){
    items.forEach((it,i)=> it.classList.toggle('active', i===highlighted));
    if(items[highlighted]) items[highlighted].scrollIntoView({block:'nearest'});
  }

  input.addEventListener('focus', openDropdown);
  input.addEventListener('click', openDropdown);
  input.addEventListener('input', openDropdown);
  dropdown.addEventListener('click', (e)=>{
    const item = e.target.closest('.model-search-item');
    if(item && item.dataset.value) selectOption(item.dataset.value);
  });
  input.addEventListener('keydown', (e)=>{
    if(dropdown.style.display === 'none' && (e.key === 'ArrowDown' || e.key === 'Enter')){
      openDropdown();
      if(e.key === 'Enter') return;
    }
    const items = dropdown.querySelectorAll('.model-search-item[data-value]');
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      highlighted = Math.min(highlighted+1, items.length-1);
      updateHighlight(items);
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      highlighted = Math.max(highlighted-1, 0);
      updateHighlight(items);
    } else if(e.key === 'Enter'){
      if(dropdown.style.display !== 'none' && items.length){
        e.preventDefault();
        e.stopPropagation();
        const idx = highlighted >= 0 ? highlighted : 0;
        if(items[idx]) selectOption(items[idx].dataset.value);
      }
    } else if(e.key === 'Escape'){
      closeDropdown();
      input.blur();
    }
  });
  input.addEventListener('blur', ()=>{
    setTimeout(()=>{
      closeDropdown();
      const opt = selectEl.selectedOptions[0];
      input.value = (opt && opt.value) ? opt.textContent : '';
    }, 150);
  });
  document.addEventListener('click', (e)=>{
    if(!wrap.contains(e.target)) closeDropdown();
  });
}

    errEl.textContent = 'аәҒаә°аәҘаәёаәҷаәІаәӣа»үаәӯаәҷаәҠаә·а»Ҳаәңаә№а»үа»ғаәҠа»ү а»ҒаәҘаә° аәҘаә°аә«аәұаә”аәңа»ҲаәІаәҷ';

  try{

      enterApp();
    } else {
      errEl.textContent = 'аәҠаә·а»Ҳаәңаә№а»үа»ғаәҠа»ү аә«аәјаә· аәҘаә°аә«аәұаә”аәңа»ҲаәІаәҷаәҡа»Қа»Ҳаә–аә·аәҒаә•а»үаәӯаәҮ';
      passEl.value = '';
    }
  }catch(e){
    errEl.textContent = 'а»ҖаәҠаә·а»ҲаәӯаәЎаә•а»Қа»Ҳаәҡа»Қа»Ҳа»„аә”а»ү аәҘаәӯаәҮа»ға»қа»Ҳ';
  }finally{
    btnEl.disabled = false;
  }
}

async function renderDashboard(main){
  const today = todayStr();
  const monthStart = today.slice(0,7) + '-01';
  const [todayInv, monthInv, models, balMap, unitMap] = await Promise.all([
    sb(`sales_invoices?select=id,total_amount,currency&invoice_date=eq.${today}&status=eq.confirmed`),
    sb(`sales_invoices?select=id,total_amount,currency&invoice_date=gte.${monthStart}&status=eq.confirmed`),
    getModels(), getBalanceMap(), getUnitCountMap()
  ]);
  const [todayByCur, monthByCur] = await Promise.all([
    sumInvoicesByPaidCurrency(todayInv),
    sumInvoicesByPaidCurrency(monthInv)
  ]);

  const lowStock = models.filter(m=>{
    const qty = m.has_serial ? (unitMap[m.id]||0) : (balMap[m.id]||0);
    const threshold = m.low_stock_threshold!=null ? Number(m.low_stock_threshold) : 1;
    return qty <= threshold;
  }).sort((a,b)=>{
    const qtyA = a.has_serial ? (unitMap[a.id]||0) : (balMap[a.id]||0);
    const qtyB = b.has_serial ? (unitMap[b.id]||0) : (balMap[b.id]||0);
    return qtyA - qtyB;
  });

  const isAdmin = currentRole === 'admin';
  let profitBlock = '';
  if(isAdmin){
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
    const monthProfitByCur = await getPeriodProfit(monthStart, tomorrow.toISOString().slice(0,10));
    profitBlock = `<div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(monthProfitByCur)}</div><div class="lbl">аәҒаәіа»„аәҘа»Җаә”аә·аәӯаәҷаәҷаәөа»ү (а»Ғаәӯаә”аәЎаәҙаәҷ)</div></div>`;
  }

  main.innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(todayByCur)}</div><div class="lbl">аәҚаәӯаә”аәӮаәІаәҚаәЎаә·а»үаәҷаәөа»ү</div></div>
      <div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(monthByCur)}</div><div class="lbl">аәҚаәӯаә”аәӮаәІаәҚа»Җаә”аә·аәӯаәҷаәҷаәөа»ү</div></div>
      ${profitBlock}
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-alert"></use></svg>аәӘаәҙаәҷаә„а»үаәІа»ғаәҒа»үа»қаә»аә” / а»қаә»аә”а»ҒаәҘа»үаә§</h3>
      ${lowStock.length ? lowStock.map(m=>{
        const qty = m.has_serial ? (unitMap[m.id]||0) : (balMap[m.id]||0);
        return `<div class="row"><span>${m.name}</span><span style="color:${qty<=0?'var(--danger)':'var(--orange-soft)'};font-weight:600;">а»Җаә«аәјаә·аәӯ ${qty} ${m.unit||''}</span></div>`;
      }).join('') : '<div class="empty">аәӘаә°аә•аәұаәӯаәҒаәҚаәұаәҮаәӣаә»аәҒаәҒаә°аә•аәҙ</div>'}
    </div>
  `;
}

/* аё•а№үаёҷаё—аёёаёҷаё—аёөа№Ҳаёҡаёұаёҷаё—аё¶аёҒа№„аё§а№ү (cost_lak аёӮаёӯаёҮа№Ғаё•а№ҲаёҘаё°а№Җаё„аёЈаё·а№ҲаёӯаёҮ / cost_price аёӮаёӯаёҮаёЈаёёа№ҲаёҷаёӘаёҙаёҷаё„а№үаёІ) а№Җаёӣа№Үаёҷа№ҖаёҮаёҙаёҷаёҒаёөаёҡа№ҖаёӘаёЎаёӯ аё–а№үаёІаёҡаёҙаёҘаёӮаёІаёўа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘаёҡаёІаё—аё•а№үаёӯаёҮа№Җаё—аёөаёўаёҡаёҒаёұаёҡ cost_price_thb аёӮаёӯаёҮаёЈаёёа№ҲаёҷаёӘаёҙаёҷаё„а№үаёІа№Ғаё—аёҷ а№„аёЎа№ҲаёҮаёұа№үаёҷа№ҖаёӯаёІаёҒаёөаёҡа№„аёӣаёҘаёҡаёҡаёІаё—аё•аёЈаёҮа№Ҷ аёҒаёіа№„аёЈаёҲаё°аёңаёҙаё”а№Җаёһаёөа№үаёўаёҷаёЎаё«аёІаёЁаёІаёҘ (аё•аёҙаё”аёҘаёҡаё—аёұа№үаёҮаё—аёөа№ҲаёҲаёЈаёҙаёҮаёҒаёіа№„аёЈаёӯаёўаё№а№Ҳ) аё–а№үаёІаёҡаёҙаёҘа№Җаёӣа№ҮаёҷаёҡаёІаё—а№Ғаё•а№ҲаёўаёұаёҮа№„аёЎа№Ҳа№„аё”а№үаё•аёұа№үаёҮ cost_price_thb а№„аё§а№ү а№ғаё«а№үаё–аё·аёӯаё§а№ҲаёІа№„аёЎа№Ҳаё—аёЈаёІаёҡаё•а№үаёҷаё—аёёаёҷ (аё„аё·аёҷаё„а№ҲаёІ null) а№ҒаёҘа№үаё§а№„аёЎа№ҲаёЈаё§аёЎаёЈаёІаёўаёҒаёІаёЈаёҷаёұа№үаёҷа№ғаёҷаёҒаёІаёЈаё„аёҙаё”аёҒаёіа№„аёЈ а№Ғаё—аёҷаё—аёөа№ҲаёҲаё°а№ӮаёҠаё§а№Ңаё•аёұаё§а№ҖаёҘаёӮаёңаёҙаё”а№Ҷ */
function itemUnitCostForInvoice(it, invCurrency){
  const model = it.stock_product_models || {};
  if(invCurrency === 'THB'){
    return model.cost_price_thb ? Number(model.cost_price_thb) : null;
  }
  if(it.unit_id && it.stock_product_units && it.stock_product_units.cost_lak != null){
    return Number(it.stock_product_units.cost_lak);
  }
  return model.cost_price != null ? (Number(model.cost_price)||0) : 0;
}
/* аёЈаё§аёЎаёҒаёіа№„аёЈаёӮаёӯаёҮаёЈаёІаёўаёҒаёІаёЈаёӘаёҙаёҷаё„а№үаёІаё—аёұа№үаёҮаё«аёЎаё”а№ғаёҷаёҡаёҙаёҘа№Җаё”аёөаёўаё§ аё„аёҙаё”а№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаёӮаёӯаёҮаёҡаёҙаёҘаёҷаёұа№үаёҷ (аёўаёұаёҮа№„аёЎа№Ҳа№ҒаёӣаёҘаёҮа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘаё—аёөа№ҲаёЈаёұаёҡаёҲа№ҲаёІаёўаёҲаёЈаёҙаёҮ) */
function computeInvoiceItemProfit(items, invCurrency){
  let unknownCostCount = 0;
  const profit = items.reduce((s,it)=>{
    const unitCost = itemUnitCostForInvoice(it, invCurrency);
    if(unitCost === null){ unknownCostCount++; return s; }
    const cost = unitCost * Number(it.quantity||0);
    return s + (Number(it.amount||0) - cost);
  }, 0);
  return { profit, unknownCostCount };
}
/* аё•аёұа№үаёҮаёҡаёҙаёҘа№„аё§а№үа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘа№„аё«аёҷ а№„аёЎа№Ҳа№„аё”а№үа№ҒаёӣаёҘаё§а№ҲаёІаёҘаё№аёҒаё„а№үаёІаёҲа№ҲаёІаёўа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘаёҷаёұа№үаёҷаёҲаёЈаёҙаёҮа№Ҷ (а№ҖаёҠа№Ҳаёҷаё•аёұа№үаёҮаёҡаёҙаёҘа№Җаёӣа№ҮаёҷаёҡаёІаё— а№Ғаё•а№ҲаёҘаё№аёҒаё„а№үаёІа№ӮаёӯаёҷаёЎаёІа№Җаёӣа№ҮаёҷаёҒаёөаёҡ) аёўаёӯаё”аёӮаёІаёў/аёҒаёіа№„аёЈаё„аё§аёЈаёҷаёұаёҡаё•аёІаёЎаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаё—аёөа№ҲаёЈа№үаёІаёҷа№„аё”а№үаёЈаёұаёҡаёҲаёЈаёҙаёҮаёҲаёІаёҒаёҒаёІаёЈаёҲа№ҲаёІаёўа№ҖаёҮаёҙаёҷа№Ғаё•а№ҲаёҘаё°аё„аёЈаёұа№үаёҮ а№„аёЎа№Ҳа№ғаёҠа№ҲаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаё—аёөа№Ҳаё•аёұа№үаёҮаёЈаёІаё„аёІа№„аё§а№үаё•аёӯаёҷаёӯаёӯаёҒаёҡаёҙаёҘ аёҹаёұаёҮаёҒа№ҢаёҠаёұаёҷаёҷаёөа№үаёҒаёЈаё°аёҲаёІаёўаёЎаё№аёҘаё„а№ҲаёІаёӮаёӯаёҮаёҡаёҙаёҘ (аё—аёөа№Ҳаё„аёҙаё”а№„аё§а№үа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘаёҡаёҙаёҘ а№ҖаёҠа№Ҳаёҷ аёўаёӯаё”аёӮаёІаёўаё—аёұа№үаёҮаёҡаёҙаёҘ аё«аёЈаё·аёӯ аёҒаёіа№„аёЈаё—аёұа№үаёҮаёҡаёҙаёҘ) а№„аёӣаё•аёІаёЎаёӘаёұаё”аёӘа№Ҳаё§аёҷаё—аёөа№Ҳа№Ғаё•а№ҲаёҘаё°аёҒаёІаёЈаёҲа№ҲаёІаёўа№ҖаёҮаёҙаёҷаё„аёЈаёӯаёҡаё„аёҘаёёаёЎаёўаёӯаё”аёҡаёҙаёҘ а№ҒаёҘа№үаё§а№ҒаёӣаёҘаёҮаёӘа№Ҳаё§аёҷаёҷаёұа№үаёҷа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаё—аёөа№ҲаёҲа№ҲаёІаёўаёҲаёЈаёҙаёҮ аёӘа№Ҳаё§аёҷаё—аёөа№ҲаёўаёұаёҮа№„аёЎа№Ҳа№„аё”а№үаёҲа№ҲаёІаёў (аё„а№үаёІаёҮаёҠаёіаёЈаё°) аёҲаё°аёўаёұаёҮаёҷаёұаёҡа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаёӮаёӯаёҮаёҡаёҙаёҘа№„аёӣаёҒа№Ҳаёӯаёҷ а№ҖаёһаёЈаёІаё°аёўаёұаёҮа№„аёЎа№ҲаёЈаё№а№үаё§а№ҲаёІаёӘаёёаё”аё—а№үаёІаёўаёҲаё°а№„аё”а№үаёЈаёұаёҡа№Җаёӣа№ҮаёҷаёӘаёҒаёёаёҘа№„аё«аёҷ
   аё–а№үаёІаёҘаё№аёҒаё„а№үаёІаёҲа№ҲаёІаёўа№ҖаёҒаёҙаёҷаёўаёӯаё”аёҡаёҙаёҘ (а№ҖаёҠа№Ҳаёҷаё•аёұа№үаёҮаёҡаёҙаёҘ 2,200 аёҡаёІаё— @700 = 1,540,000 аёҒаёөаёҡ а№Ғаё•а№ҲаёЈаёұаёҡа№ҖаёҮаёҙаёҷаёӘаё” 1,600,000 аёҒаёөаёҡ) аёӘа№Ҳаё§аёҷаё—аёөа№Ҳа№ҖаёҒаёҙаёҷ (60,000 аёҒаёөаёҡ) аёҲаё°аё–аё№аёҒаёҷаёұаёҡаёЈаё§аёЎа№ҖаёӮа№үаёІаёўаёӯаё”аё•аёІаёЎа№ҖаёҮаёҙаёҷаёӘаё”аё—аёөа№ҲаёЈаёұаёҡаёҲаёЈаёҙаёҮ а№„аёЎа№Ҳаё•аёұаё”аё—аёҙа№үаёҮ аё—аёіа№ғаё«а№үаёўаёӯаё”аёӮаёІаёў/аёҒаёіа№„аёЈаё•аёЈаёҮаёҒаёұаёҡа№ҖаёҮаёҙаёҷаё—аёөа№Ҳа№„аё”а№үаёЈаёұаёҡаёҲаёЈаёҙаёҮ */
function splitByPaidCurrency(valueInInvCurrency, invCurrency, totalAmount, payments){
  const out = {};
  payments = payments || [];
  if(!totalAmount){
    /* аәҡа»Қа»Ҳаә®аә№а»үаәҚаәӯаә”аәҡаәҙаәҷ: аә–а»үаәІаәЎаәөаәҒаәІаәҷаәҲа»ҲаәІаәҚ а»ғаә«а»үаәҷаәұаәҡаә•аәІаәЎа»ҖаәҮаәҙаәҷаәӘаә»аә”аә—аәөа»Ҳаә®аәұаәҡаәҲаәҙаәҮ, аәҡа»Қа»Ҳаә”аәұа»ҲаәҮаәҷаәұа»үаәҷаә„аә·аәҷаә„а»ҲаәІаә•аәІаәЎаәӘаә°аәҒаәёаәҷаәҡаәҙаәҷ */
    if(payments.length){
      payments.forEach(p=>{
        const amt = Number(p.amount)||0;
        if(!amt) return;
        const payCurrency = p.currency || invCurrency;
        out[payCurrency] = (out[payCurrency]||0) + amt;
      });
      return out;
    }
    out[invCurrency] = (out[invCurrency]||0) + valueInInvCurrency;
    return out;
  }
  let coveredInInv = 0; /* аәҚаәӯаә”аәҡаәҙаәҷаә—аәөа»ҲаәҲа»ҲаәІаәҚа»ҒаәҘа»үаә§ аәҷаәұаәҡа»ҖаәӣаәұаәҷаәӘаә°аәҒаәёаәҷаәӮаәӯаәҮаәҡаәҙаәҷ */
  payments.forEach(p=>{
    const amt = Number(p.amount)||0;
    const coveredInInvCurrency = p.converted_amount != null ? Number(p.converted_amount) : amt;
    if(!coveredInInvCurrency) return;
    const payCurrency = p.currency || invCurrency;
    const payPerInv = amt / coveredInInvCurrency; /* 1 а»ңа»Ҳаә§аәҚаәӘаә°аәҒаәёаәҷаәҡаәҙаәҷ = ? а»ңа»Ҳаә§аәҚаәӘаә°аәҒаәёаәҷаә—аәөа»ҲаәҲа»ҲаәІаәҚ */
    /* аәӘа»Ҳаә§аәҷаә—аәөа»Ҳа»ғаәҠа»үаә«аәұаәҒаәҚаәӯаә”аәҡаәҙаәҷ (аәҡа»Қа»Ҳа»ҖаәҒаәөаәҷаәҚаәӯаә”аә„а»үаәІаәҮ) вҶ’ а»„аә”а»үаәӘа»Ҳаә§аәҷа»Ғаәҡа»ҲаәҮаәӮаәӯаәҮ value аә•аәІаәЎаәӘаәұаә”аәӘа»Ҳаә§аәҷ */
    const usableInInv = Math.max(0, Math.min(coveredInInvCurrency, totalAmount - coveredInInv));
    if(usableInInv > 0){
      const valueShare = valueInInvCurrency * (usableInInv / totalAmount);
      out[payCurrency] = (out[payCurrency]||0) + (payCurrency !== invCurrency ? valueShare * payPerInv : valueShare);
      coveredInInv += usableInInv;
    }
    /* аәӘа»Ҳаә§аәҷаә—аәөа»ҲаәҲа»ҲаәІаәҚа»ҖаәҒаәөаәҷаәҚаәӯаә”аәҡаәҙаәҷ (overpayment) вҶ’ аәҷаәұаәҡа»ҖаәӣаәұаәҷаәЎаә№аәҷаә„а»ҲаәІа»Җаәһаәөа»ҲаәЎаә•аәІаәЎа»ҖаәҮаәҙаәҷаәӘаә»аә”аә—аәөа»Ҳаә®аәұаәҡаәҲаәҙаәҮ аәҡа»Қа»Ҳаә•аәұаә”аә–аәҙа»үаәЎ */
    const overInInv = coveredInInvCurrency - usableInInv;
    if(overInInv > 0){
      out[payCurrency] = (out[payCurrency]||0) + (payCurrency !== invCurrency ? overInInv * payPerInv : overInInv);
    }
  });
  /* аәҚаәұаәҮаә„а»үаәІаәҮаәҠаәіаәҘаә° вҶ’ аәҷаәұаәҡа»ҖаәӣаәұаәҷаәӘаә°аәҒаәёаәҷаәӮаәӯаәҮаәҡаәҙаәҷа»„аәӣаәҒа»Ҳаәӯаәҷ а»ҖаәһаәІаә°аәҚаәұаәҮаәҡа»Қа»Ҳаә®аә№а»үаә§а»ҲаәІаәҲаә°аә®аәұаәҡа»ҖаәӣаәұаәҷаәӘаә°аәҒаәёаәҷа»ғаә” */
  const remainingInInv = Math.max(0, totalAmount - coveredInInv);
  if(remainingInInv > 0){
    out[invCurrency] = (out[invCurrency]||0) + valueInInvCurrency * (remainingInInv / totalAmount);
  }
  return out;
}
/* аёЈаё§аёЎаёўаёӯаё”аёӮаёІаёў (total_amount) аёӮаёӯаёҮаёҡаёҙаёҘаё«аёҘаёІаёўа№ғаёҡ а№ҒаёўаёҒаё•аёІаёЎаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаё—аёөа№ҲаёЈаёұаёҡаёҲа№ҲаёІаёўаёҲаёЈаёҙаёҮ (а№„аёЎа№Ҳа№ғаёҠа№ҲаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаё—аёөа№Ҳаё•аёұа№үаёҮаёҡаёҙаёҘа№„аё§а№үа№Җаёүаёўа№Ҷ) аё•а№үаёӯаёҮаёЎаёө id а№ғаёҷа№Ғаё•а№ҲаёҘаё°а№Ғаё–аё§аёӮаёӯаёҮ invoices */
async function sumInvoicesByPaidCurrency(invoices){
  const out = {};
  if(!invoices.length) return out;
  const ids = invoices.map(i=>i.id).join(',');
  const payments = await sb(`sales_payments?select=invoice_id,currency,amount,converted_amount&invoice_id=in.(${ids})`);
  const paymentsByInvoice = {};
  payments.forEach(p=> (paymentsByInvoice[p.invoice_id] = paymentsByInvoice[p.invoice_id]||[]).push(p));
  invoices.forEach(inv=>{
    const invCurrency = inv.currency || 'LAK';
    const totalAmount = Number(inv.total_amount||0);
    const split = splitByPaidCurrency(totalAmount, invCurrency, totalAmount, paymentsByInvoice[inv.id]||[]);
    Object.keys(split).forEach(c=>{ out[c] = (out[c]||0) + split[c]; });
  });
  return out;
}
/* аә„аәҙаә”аәҚаәӯаә”аә®аәұаәҡаәҲаәҙаәҮа»ҒаәҚаәҒаә•аәІаәЎаәӘаә°аәҒаәёаәҷа»ҖаәҮаәҙаәҷ аәӮаәӯаәҮа»Ғаә•а»ҲаәҘаә°аәҡаәҙаәҷ (perInvoice) аәһа»үаәӯаәЎаәҚаәӯаә”аәҘаә§аәЎ (total)
   а»ғаәҠа»үаәӘаә°а»Ғаә”аәҮа»ғаәҷаәҘаәІаәҚаәҒаәІаәҷаәҡаәҙаәҷ а»ғаә«а»үа»ӮаәҠаә§а»Ң "а»ҖаәҮаәҙаәҷаә—аәөа»Ҳаә®аәұаәҡаәҲаәҙаәҮ" аәӮаәӯаәҮа»Ғаә•а»ҲаәҘаә°а»ғаәҡ а»Ғаә—аәҷ "аәҘаәІаә„аәІаәӘаәҙаәҷаә„а»үаәІ/аәҚаәӯаә”аәҡаәҙаәҷ" */
async function getReceivedByInvoice(invoices){
  const perInvoice = {};
  const total = {};
  if(!invoices.length) return { perInvoice, total };
  const ids = invoices.map(i=>i.id).join(',');
  const payments = await sb(`sales_payments?select=invoice_id,currency,amount,converted_amount&invoice_id=in.(${ids})`);
  const paymentsByInvoice = {};
  payments.forEach(p=> (paymentsByInvoice[p.invoice_id] = paymentsByInvoice[p.invoice_id]||[]).push(p));
  invoices.forEach(inv=>{
    const invCurrency = inv.currency || 'LAK';
    const totalAmount = Number(inv.total_amount||0);
    const split = splitByPaidCurrency(totalAmount, invCurrency, totalAmount, paymentsByInvoice[inv.id]||[]);
    perInvoice[inv.id] = split;
    Object.keys(split).forEach(c=>{ total[c] = (total[c]||0) + split[c]; });
  });
  return { perInvoice, total };
}
/* аё„аёіаёҷаё§аё“аёҒаёіа№„аёЈ (аёўаёӯаё”аёӮаёІаёў - аё•а№үаёҷаё—аёёаёҷ) аёӮаёӯаёҮаәҡаәҙаәҷаә—аәұаәҮа»қаә»аә”а№ғаёҷаёҠа№Ҳаё§аёҮаё§аёұаёҷаё—аёөа№Ҳаё—аёөа№ҲаёҒаёіаё«аёҷаё” а№ғаёҠа№үаё•а№үаёҷаё—аёёаёҷаёӣаёұаёҲаёҲаёёаёҡаёұаёҷаёӮаёӯаёҮаёӘаёҙаёҷаё„а№үаёІ (а№„аёЎа№Ҳа№„аё”а№үа№ҖаёҒа№Үаёҡ snapshot аё•а№үаёҷаё—аёёаёҷ аё“ аё§аёұаёҷаёӮаёІаёў) а№ҒаёҘа№үаё§аёҷаёұаёҡаёҒаёіа№„аёЈаё•аёІаёЎаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаё—аёөа№ҲаёЈаёұаёҡаёҲа№ҲаёІаёўаёҲаёЈаёҙаёҮаёӮаёӯаёҮа№Ғаё•а№ҲаёҘаё°аёҡаёҙаёҘ а№„аёЎа№Ҳа№ғаёҠа№ҲаёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷаё—аёөа№Ҳаё•аёұа№үаёҮаёҡаёҙаёҘа№„аё§а№ү */
async function getPeriodProfit(start, end){
  const invoices = await sb(`sales_invoices?select=id,currency,total_amount&invoice_date=gte.${start}&invoice_date=lt.${end}&status=eq.confirmed`);
  if(!invoices.length) return {};
  const ids = invoices.map(i=>i.id).join(',');
  const [items, payments] = await Promise.all([
    sb(`sales_invoice_items?select=amount,quantity,unit_id,invoice_id,stock_product_models(cost_price,cost_price_thb),stock_product_units(cost_lak)&invoice_id=in.(${ids})`),
    sb(`sales_payments?select=invoice_id,currency,amount,converted_amount&invoice_id=in.(${ids})`)
  ]);
  const itemsByInvoice = {};
  items.forEach(it=> (itemsByInvoice[it.invoice_id] = itemsByInvoice[it.invoice_id]||[]).push(it));
  const paymentsByInvoice = {};
  payments.forEach(p=> (paymentsByInvoice[p.invoice_id] = paymentsByInvoice[p.invoice_id]||[]).push(p));
  const profitByCurrency = {};
  invoices.forEach(inv=>{
    const invCurrency = inv.currency || 'LAK';
    const { profit } = computeInvoiceItemProfit(itemsByInvoice[inv.id]||[], invCurrency);
    const perCurrency = splitByPaidCurrency(profit, invCurrency, Number(inv.total_amount||0), paymentsByInvoice[inv.id]||[]);
    Object.keys(perCurrency).forEach(c=>{
      profitByCurrency[c] = (profitByCurrency[c]||0) + perCurrency[c];
    });
  });
  return profitByCurrency;
}

    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-box"></use></svg>аәҘаәІаәҚаәҒаәІаәҷаәӘаәҙаәҷаә„а»үаәІ (<span id="prod_count">${models.length}</span>)</h3>
      <input id="prod_search" placeholder="аә„аә»а»үаәҷаә«аәІаәӘаәҙаәҷаә„а»үаәІ (аәҠаә·а»Ҳ / аәҘаә°аә«аәұаә” / а»қаә§аә”а»қаә№а»Ҳ)..." style="margin-bottom:10px;">

/* а»Җаәҡаәҙа»ҲаәҮаәҘаәІаәҚаәҘаә°аәӯаәҪаә”а»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮ (serial) аәӮаәӯаәҮаәӘаәҙаәҷаә„а»үаәІаә—аәөа»Ҳаә•а»үаәӯаәҮа»ҖаәҒаәұаәҡа»ҖаәҘаәҒа»ҒаәҚаәҒа»Ғаә•а»ҲаәҘаә°а»ңа»Ҳаә§аәҚ */

async function openDuplicateSerialsModal(models){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal"><div class="empty">аәҒаәіаәҘаәұаәҮаәҒаә§аә”...</div></div>`;
  document.body.appendChild(bg);

  try{
    const units = await sb('stock_product_units?select=id,model_id,serial_no,status,received_at&order=serial_no.asc');
    const modelName = id => (models.find(m=>m.id===id)||{}).name || '-';
    const groups = {};

          <div class="mono" style="font-weight:700;color:var(--danger);">${g[0].serial_no}</div>
          ${g.map(u=> `<div class="row" style="padding:4px 0;"><span style="font-size:12px;">${modelName(u.model_id)}</span><span class="muted" style="font-size:11px;">${u.status==='in_stock'?'аә„аә»аәҮаә„аәұаәҮ':(u.status==='transferred'?'а»ӮаәӯаәҷаәӘаәІаәӮаәІа»ҒаәҘа»үаә§':'аәӮаәІаәҚа»ҒаәҘа»үаә§')} В· ${fmtDateDMY(u.received_at)}</span></div>`).join('')}
        </div>`).join('') : ''}
      <button class="btn secondary" id="dupClose" style="margin-top:8px;">аәӣаәҙаә”</button>

    if(canSeeCost) modelFieldOrder.push('m_cost','m_cost_thb');
    modelFieldOrder.push('m_threshold');
    bindEnterAdvance(modelFieldOrder, 'm_save');
  }
  bg.addEventListener('click', (e)=>{ if(e.target === bg) bg.remove(); });

document.addEventListener('keydown', (e)=>{
  if(e.key !== 'Enter') return;

        <input id="r_rate" type="text" placeholder="а»ҖаәҠаәұа»Ҳаәҷ 620">
        <div class="muted" style="font-size:11px;margin-top:3px;" id="r_lockedPreview"></div>
      </div>` : ''}
      <button class="btn secondary" id="r_addItem"><svg class="dv-icon"><use href="#i-box"></use></svg>а»Җаәһаәөа»ҲаәЎа»ҖаәӮаә»а»үаәІаәҘаәІаәҚаәҒаәІаәҷ</button>
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-receipt"></use></svg>аәҘаәІаәҚаәҒаәІаәҷаә—аәөа»ҲаәҲаә°аә®аәұаәҡа»ҖаәӮаә»а»үаәІ</h3>
      <div id="r_cartList">${renderReceiveCart()}</div>
      ${canSeeCost ? `<div class="invoice-total mono">аәҘаә§аәЎ: ${fmtMoney(receiveCart.reduce((s,i)=>s+i.amount,0))}</div>` : ''}
      <button class="btn" id="r_submit"><svg class="dv-icon"><use href="#i-check-circle"></use></svg>аәҡаәұаәҷаә—аә¶аәҒаә®аәұаәҡа»ҖаәӮаә»а»үаәІ</button>
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-truck"></use></svg>аәӣаә°аә«аә§аәұаә”аәҒаәІаәҷаә®аәұаәҡа»ҖаәӮаә»а»үаәІ <span class="muted" style="font-weight:400;font-size:11px;">(аәҒаә»аә”а»Җаәһаә·а»Ҳаәӯа»Җаәҡаәҙа»ҲаәҮаәҘаәІаәҚаәҒаәІаәҷ)</span></h3>
      <label>а»ҖаәҘаә·аәӯаәҒа»Җаә”аә·аәӯаәҷ</label>
      <input type="month" id="rcv_month" value="${historyMonth}">
      <div id="rcv_history" style="margin-top:8px;"><div class="empty">аәҒаәіаәҘаәұаәҮа»Ӯаә«аәҘаә”...</div></div>
    </div>
  `;
  document.getElementById('rcv_month').addEventListener('change', (e)=>{
    main.dataset.rcvMonth = e.target.value;
    loadReceiveHistory(e.target.value);
  });
  loadReceiveHistory(historyMonth);
  if(canSeeCost) attachMoneyInput('r_cost', 0);
  const modelSel = document.getElementById('r_model');
  enableSearchableSelect(modelSel);
  /* аәӯаәұаә”аә•аәІаә•а»үаәӯаәҮаәһаәҙаәЎа»ға»қа»Ҳаә—аәёаәҒаә„аәұа»үаәҮаә—аәөа»Ҳаә®аәұаәҡа»ҖаәӮаә»а»үаәІ (аәҡа»Қа»ҲаәҲаә·а»Ҳаәӯаәұаә”аә•аәІа»ҖаәҒаә»а»ҲаәІа»„аә§а»ү) вҖӢаә•аә»а»үаәҷаә—аә¶аәҷаәҒаәөаәҡаәҲаә°аәҘа»ӢаәӯаәҒаә•аәІаәЎаәЎаә·а»үаәҷаәөа»ү аәҡа»Қа»Ҳаәӣа»ҲаәҪаәҷаә•аәІаәЎаәһаәІаәҚаә«аәјаәұаәҮ */
  /* аә”аә¶аәҮаә•аә»а»үаәҷаә—аә¶аәҷаә—аәөа»Ҳа»Җаә„аәөаәҚаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»үаәӮаәӯаәҮаәӘаәҙаәҷаә„а»үаәІаәҷаәөа»ү (аә•аәІаәЎаәӘаә°аәҒаәёаәҷаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ: аәҡаәІаә”вҶ’cost_price_thb, аәҒаәөаәҡвҶ’cost_price) аәЎаәІа»Җаә•аәөаәЎа»ғаә«а»ү аәҡа»Қа»Ҳаә•а»үаәӯаәҮаәһаәҙаәЎа»ға»қа»Ҳаә—аәёаәҒаә„аәұа»үаәҮ */
  function fillReceiveCostFromModel(){
    if(!canSeeCost) return;
    const opt = modelSel.selectedOptions[0];
    const currency = document.getElementById('r_currency').value;
    const saved = opt ? (currency === 'THB' ? (opt.dataset.costThb||0) : (opt.dataset.cost||0)) : 0;
    attachMoneyInput('r_cost', saved);
  }
  function updateReceiveCostLabel(){
    if(!canSeeCost) return;
    const currency = document.getElementById('r_currency').value;
    const rateBlock = document.getElementById('r_rateBlock');
    const lbl = document.getElementById('r_cost_lbl');
    rateBlock.style.display = currency === 'THB' ? 'block' : 'none';
    lbl.textContent = currency === 'THB' ? 'аә•аә»а»үаәҷаә—аә¶аәҷ/а»ңа»Ҳаә§аәҚ (аәҡаәІаә”)' : 'аә•аә»а»үаәҷаә—аә¶аәҷ/а»ңа»Ҳаә§аәҚ (аәҒаәөаәҡ)';
    fillReceiveCostFromModel();
    updateReceiveCostPreview();
  }
  function updateReceiveCostPreview(){
    const preview = document.getElementById('r_lockedPreview');
    if(!preview) return;
    const currency = document.getElementById('r_currency').value;
    if(currency !== 'THB'){ preview.textContent=''; return; }
    const costThb = moneyValue('r_cost');
    const rate = Number((document.getElementById('r_rate').value||'').replace(/,/g,''));
    if(costThb && rate) preview.textContent = `вүҲ ${fmtMoney(costThb*rate)} аәҒаәөаәҡ/а»ңа»Ҳаә§аәҚ (аәҘа»ӢаәӯаәҒаә•аә»а»үаәҷаә—аә¶аәҷаәҷаәөа»үа»„аә§а»ү)`;
    else preview.textContent = 'а»ғаәӘа»Ҳаәӯаәұаә”аә•аәІа»ҒаәҘаәҒаәӣа»ҲаәҪаәҷа»Җаәһаә·а»ҲаәӯаәҘа»ӢаәӯаәҒаә•аә»а»үаәҷаә—аә¶аәҷа»ҖаәӣаәұаәҷаәҒаәөаәҡ';
  }
  if(canSeeCost){
    document.getElementById('r_currency').addEventListener('change', updateReceiveCostLabel);
    document.getElementById('r_cost').addEventListener('input', updateReceiveCostPreview);
    document.getElementById('r_rate').addEventListener('input', updateReceiveCostPreview);
  }
  modelSel.addEventListener('change', ()=>{
    const opt = modelSel.selectedOptions[0];
    const isSerial = opt && opt.dataset.serial === 'true';
    document.getElementById('r_qtyBlock').style.display = isSerial ? 'none' : 'block';
    document.getElementById('r_serialBlock').style.display = isSerial ? 'block' : 'none';
    if(canSeeCost){
      /* аә„аә»аәҮаәӘаә°аәҒаәёаәҷаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒа»„аә§а»ү (аәҡа»Қа»ҲаәҡаәұаәҮаә„аәұаәҡаәҒаәұаәҡа»ҖаәӣаәұаәҷаәҒаәөаәҡ) а»ҒаәҘа»үаә§аә”аә¶аәҮаә•аә»а»үаәҷаә—аә¶аәҷаә—аәөа»Ҳа»Җаә„аәөаәҚаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»үаә•аәІаәЎаәӘаә°аәҒаәёаәҷаәҷаәұа»үаәҷаәЎаәІа»Җаә•аәөаәЎ */
      updateReceiveCostLabel();
    }
  });
  document.getElementById('r_addItem').addEventListener('click', async ()=>{
    const opt = modelSel.selectedOptions[0];
    if(!opt || !opt.value){ toast('а»ҖаәҘаә·аәӯаәҒаәӘаәҙаәҷаә„а»үаәІаәҒа»Ҳаәӯаәҷ'); return; }
    const isSerial = opt.dataset.serial === 'true';
    const currency = canSeeCost ? document.getElementById('r_currency').value : 'LAK';
    const costInput = canSeeCost ? moneyValue('r_cost') : 0;
    let cost = costInput; // locked LAK unit cost, used everywhere below
    let costThb = null, exchangeRate = null;
    if(canSeeCost && currency === 'THB'){
      exchangeRate = Number((document.getElementById('r_rate').value||'').replace(/,/g,''));
      if(!exchangeRate){ toast('а»ғаәӘа»Ҳаәӯаәұаә”аә•аәІа»ҒаәҘаәҒаәӣа»ҲаәҪаәҷ (1 аәҡаәІаә” = ? аәҒаәөаәҡ)'); return; }
      costThb = costInput;
      cost = costThb * exchangeRate; // аәҘа»ӢаәӯаәҒа»ҖаәӣаәұаәҷаәҒаәөаәҡаә•аәІаәЎаәӯаәұаә”аә•аәІаәЎаә·а»үаәҷаәөа»ү
    }
    let addedCount = 0;
    if(isSerial){
      const rawSerials = document.getElementById('r_serials').value.split('\n').map(s=>s.trim()).filter(Boolean);
      if(!rawSerials.length){ toast('а»ғаәӘа»Ҳа»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәўа»ҲаәІаәҮа»ңа»үаәӯаәҚ 1 аә•аә»аә§'); return; }

      /* аәҒаәұаәҷа»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәҠа»үаәіаәҒаәұаәҷа»ҖаәӯаәҮа»ғаәҷаәҘаәІаәҚаәҒаәІаәҷаә—аәөа»ҲаәһаәҙаәЎ/аә§аәІаәҮа»ҖаәӮаә»а»үаәІаәЎаәІаә„аәұа»үаәҮаәҷаәөа»ү */
      const seen = new Set();
      const dupInInput = [];
      const serials = [];
      rawSerials.forEach(sn=>{
        const key = sn.toUpperCase();
        if(seen.has(key)){ dupInInput.push(sn); } else { seen.add(key); serials.push(sn); }
      });
      if(dupInInput.length){ toast(`а»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәҠа»үаәіаәҒаәұаәҷа»ҖаәӯаәҮ: ${[...new Set(dupInInput)].join(', ')}`); return; }

      /* аәҒаәұаәҷаәҠа»үаәіаәҒаәұаәҡаәҘаәІаәҚаәҒаәІаәҷаә—аәөа»Ҳаә„а»үаәІаәҮаәўаә№а»Ҳа»ғаәҷаәҒаә°аә•а»ҲаәІ (аәҚаәұаәҮаәҡа»Қа»Ҳаә—аәұаәҷаәҡаәұаәҷаә—аә¶аәҒаә®аәұаәҡа»ҖаәӮаә»а»үаәІ) */
      const cartSerials = new Set(receiveCart.filter(i=>i.serial_no).map(i=>i.serial_no.toUpperCase()));
      const dupInCart = serials.filter(sn=> cartSerials.has(sn.toUpperCase()));
      if(dupInCart.length){ toast(`а»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәҷаәөа»үаәўаә№а»Ҳа»ғаәҷаәҘаәІаәҚаәҒаәІаәҷа»ҒаәҘа»үаә§: ${dupInCart.join(', ')}`); return; }

      /* аәҒаәұаәҷаәҠа»үаәіаәҒаәұаәҡа»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаә—аәөа»ҲаәЎаәөаәўаә№а»Ҳа»ҒаәҘа»үаә§а»ғаәҷаәҘаә°аәҡаә»аәҡ (аә®аәұаәҡа»ҖаәӮаә»а»үаәІа»„аәӣа»ҒаәҘа»үаә§аәҒа»Ҳаәӯаәҷа»ңа»үаәІаәҷаәөа»ү аәҡа»Қа»Ҳаә§а»ҲаәІаәҲаә°аә„аә»аәҮаә„аәұаәҮ аә«аәјаә· аәӮаәІаәҚа»„аәӣа»ҒаәҘа»үаә§) */
      try{
        const list = serials.map(sn=> encodeURIComponent(sn)).join(',');
        const existing = await sb(`stock_product_units?select=serial_no&serial_no=in.(${list})`);
        if(existing.length){
          toast(`а»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәҷаәөа»үаәЎаәөа»ғаәҷаәҘаә°аәҡаә»аәҡа»ҒаәҘа»үаә§: ${existing.map(e=>e.serial_no).join(', ')}`);
          return;
        }
      }catch(err){ toast('аәҒаә§аә”а»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәҠа»үаәіаәҡа»Қа»Ҳа»„аә”а»ү: '+err.message); return; }

      serials.forEach(sn=>{
        receiveCart.push({ model_id: opt.value, model_name: opt.textContent, serial_no: sn, quantity:1, unit_cost:cost, amount:cost, cost_currency:currency, unit_cost_thb:costThb, exchange_rate:exchangeRate });
      });
      addedCount = serials.length;
      document.getElementById('r_serials').value = '';
    } else {
      const qty = Number(document.getElementById('r_qty').value)||1;
      receiveCart.push({ model_id: opt.value, model_name: opt.textContent, serial_no:null, quantity:qty, unit_cost:cost, amount: qty*cost, cost_currency:currency, unit_cost_thb:costThb, exchange_rate:exchangeRate });
      addedCount = qty;
    }
    document.getElementById('r_cartList').innerHTML = renderReceiveCart();
    const totalEl = main.querySelector('.invoice-total');
    if(totalEl) totalEl.textContent = 'аәҘаә§аәЎ: ' + fmtMoney(receiveCart.reduce((s,i)=>s+i.amount,0));
    bindReceiveCartRemove();
    toast(`а»Җаәһаәөа»ҲаәЎ ${opt.textContent} а»ҒаәҘа»үаә§`);
  });
  /* Enter а№ғаёҷа№Ғаё•а№ҲаёҘаё°аёҠа№ҲаёӯаёҮ = а№„аёҘа№ҲаёҘаёҮаёҠа№ҲаёӯаёҮаё–аёұаё”а№„аёӣаё•аёІаёЎаёҘаёіаё”аёұаёҡаёҲаёЈаёҙаёҮа№ғаёҷаёҹаёӯаёЈа№ҢаёЎ (а№ҖаёҘаёӮа№Җаё„аёЈаё·а№ҲаёӯаёҮ/аёҲаёіаёҷаё§аёҷ вҶ’ аёӘаёҒаёёаёҘа»ҖаәҮаәҙаәҷ вҶ’ аё•а№үаёҷаё—аёёаёҷ вҶ’ аёӯаёұаё•аёЈаёІа№ҒаёҘаёҒа№ҖаёӣаёҘаёөа№Ҳаёўаёҷ[аё–а№үаёІа№Җаёӣа№ҮаёҷаёҡаёІаё—]) аёһаёӯаё–аё¶аёҮаёҠа№ҲаёӯаёҮаёӘаёёаё”аё—а№үаёІаёўаё„а№Ҳаёӯаёўа№Җаёһаёҙа№ҲаёЎа№ҖаёӮа№үаёІаёЈаёІаёўаёҒаёІаёЈ а№ҒаёҘа№үаё§аё•а№үаёӯаёҮаёҒаё”аёӣаёёа№ҲаёЎ "аёҡаёұаёҷаё—аё¶аёҒаёЈаёұаёҡа№ҖаёӮа№үаёІ" (r_submit) а№ҖаёӯаёҮа№ҖаёӘаёЎаёӯ а№Җаёһаё·а№ҲаёӯаёҒаёұаёҷаёҡаёұаёҷаё—аё¶аёҒаё„а№үаёІаёҮа№Ҷ а№Ӯаё”аёўа№„аёЎа№Ҳаё•аёұа№үаёҮа№ғаёҲ */
  function handleReceiveEnter(){
    document.getElementById('r_addItem').click();
  }
  /* аё«аёҘаёұаёҮа№Җаёһаёҙа№ҲаёЎа№ҖаёӮа№үаёІаёЈаёІаёўаёҒаёІаёЈа№ҒаёҘа№үаё§ а№ӮаёҹаёҒаёұаёӘаёҒаёҘаёұаёҡа№„аёӣаёҠа№ҲаёӯаёҮаё—аёөа№Ҳа№Җаё«аёЎаёІаё°аёӘаёЎа№Җаёһаё·а№ҲаёӯаёһаёҙаёЎаёһа№Ң/аёӘа№ҒаёҒаёҷаё•аёұаё§аё–аёұаё”а№„аёӣа№„аё”а№үаё—аёұаёҷаё—аёө */
  function focusBackAfterAdd(){
    const serialBlock = document.getElementById('r_serialBlock');
    const isSerialVisible = serialBlock && serialBlock.style.display !== 'none';
    if(isSerialVisible){
      const serialsEl = document.getElementById('r_serials');
      if(serialsEl) serialsEl.focus();
    } else {
      const qtyEl = document.getElementById('r_qty');
      if(qtyEl) qtyEl.focus();
    }
  }
  /* аёҘаёіаё”аёұаёҡаёҠа№ҲаёӯаёҮаёҲаёЈаёҙаёҮаёӮаёӯаёҮаёҹаёӯаёЈа№ҢаёЎ аё“ аёӮаё“аё°аёҷаёұа№үаёҷ (аёӮаё¶а№үаёҷаёҒаёұаёҡаё§а№ҲаёІаёЎаёөа№ҖаёҘаёӮа№Җаё„аёЈаё·а№ҲаёӯаёҮа№„аё«аёЎ / а№Җаё«а№Үаёҷаё•а№үаёҷаё—аёёаёҷа№„аё«аёЎ / а№ҖаёҘаё·аёӯаёҒаёӘаёҒаёёаёҘаёҡаёІаё—а№„аё«аёЎ) */
  function getReceiveFieldChain(){
    const canSeeCost2 = currentRole === 'admin';
    const serialBlock = document.getElementById('r_serialBlock');
    const isSerialVisible = serialBlock && serialBlock.style.display !== 'none';
    const chain = [isSerialVisible ? 'r_serials' : 'r_qty'];
    if(canSeeCost2){
      chain.push('r_currency', 'r_cost');
      const currencyEl = document.getElementById('r_currency');
      if(currencyEl && currencyEl.value === 'THB') chain.push('r_rate');
    }
    return chain;
  }
  function focusReceiveField(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.focus();
    if(el.select) el.select();
  }
  /* аёҒаё” Enter аёҲаёІаёҒаёҠа№ҲаёӯаёҮ id аёҷаёөа№ү вҶ’ аё–а№үаёІаёўаёұаёҮа№„аёЎа№Ҳа№ғаёҠа№ҲаёҠа№ҲаёӯаёҮаёӘаёёаё”аё—а№үаёІаёўа№ғаёҷаёҘаёіаё”аёұаёҡ а№ғаё«а№үаёҘаёҮа№„аёӣаёҠа№ҲаёӯаёҮаё–аёұаё”а№„аёӣ, аё–а№үаёІа№Җаёӣа№ҮаёҷаёҠа№ҲаёӯаёҮаёӘаёёаё”аё—а№үаёІаёўа№ҒаёҘа№үаё§а№ғаё«а№үа№Җаёһаёҙа№ҲаёЎа№ҖаёӮа№үаёІаёЈаёІаёўаёҒаёІаёЈа№ҖаёҘаёў */
  function handleReceiveFieldEnter(currentId){
    const chain = getReceiveFieldChain();
    const idx = chain.indexOf(currentId);
    if(idx === -1) return;
    if(idx < chain.length - 1){
      focusReceiveField(chain[idx+1]);
    } else {
      handleReceiveEnter();
      focusBackAfterAdd();
    }
  }
  ['r_qty','r_currency','r_cost','r_rate'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ e.preventDefault(); handleReceiveFieldEnter(id); }
    });
  });
  bindEnterAdvance(['r_supplier','r_date'], 'r_model_search');
  document.getElementById('r_serials').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){
      e.preventDefault();
      const val = e.target.value.trim();
      if(!val){
        /* а№„аёЎа№ҲаёЎаёөа№ҖаёҘаёӮа№Җаё„аёЈаё·а№ҲаёӯаёҮа№Җаё«аёҘаё·аёӯа№ғаё«а№үа№Җаёһаёҙа№ҲаёЎа№ҒаёҘа№үаё§ = аёһаёҙаёЎаёһа№Ңа№ҖаёӘаёЈа№ҮаёҲаё«аёЎаё”а№ҒаёҘа№үаё§ аёҒаё” Enter аё„аёЈаёұа№үаёҮаёҷаёөа№үаёҲаё¶аёҮаёҡаёұаёҷаё—аё¶аёҒа№ҖаёӮа№үаёІаёЈаё°аёҡаёҡаё—аёұа№үаёҮа№ғаёҡ */
        document.getElementById('r_submit').click();
      } else {
        /* аёһаёҙаёЎаёһа№Ңа№ҖаёҘаёӮа№Җаё„аёЈаё·а№ҲаёӯаёҮа№ҒаёҘа№үаё§аёҒаё” Enter аё„аёЈаёұа№үаёҮа№ҒаёЈаёҒ = а№„аёҘа№ҲаёҘаёҮаёҠа№ҲаёӯаёҮаё–аёұаё”а№„аёӣаё•аёІаёЎаёҘаёіаё”аёұаёҡаёҲаёЈаёҙаёҮ (аёӘаёҒаёёаёҘа№ҖаёҮаёҙаёҷ вҶ’ аё•а№үаёҷаё—аёёаёҷ вҶ’ аёӯаёұаё•аёЈаёІа№ҒаёҘаёҒа№ҖаёӣаёҘаёөа№Ҳаёўаёҷ вҶ’ а№Җаёһаёҙа№ҲаёЎа№ҖаёӮа№үаёІаёЈаёІаёўаёҒаёІаёЈ) */
        handleReceiveFieldEnter('r_serials');
      }
    }
  });
  bindReceiveCartRemove();
  document.getElementById('r_submit').addEventListener('click', async (e)=>{
    if(!receiveCart.length){ toast('аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҒаәІаәҷ'); return; }
    const btn = e.currentTarget;
    if(btn.disabled) return; // аёҒаёұаёҷаёҒаё”аёӢа№үаёіаёЈаё°аё«аё§а№ҲаёІаёҮаёҒаёіаёҘаёұаёҮаёҡаёұаёҷаё—аё¶аёҒ
    btn.disabled = true;
    try{
      const receiptId = uid();
      const total = receiveCart.reduce((s,i)=>s+i.amount,0);
      const receiptNo = 'RCV-' + Date.now().toString().slice(-8);
      await sb('stock_purchase_receipts', { method:'POST', body:{
        id: receiptId,
        receipt_no: receiptNo,
        supplier_name: document.getElementById('r_supplier').value.trim(),
        receipt_date: document.getElementById('r_date').value || todayStr(),
        total_amount: total,
        created_by: currentUsername
      }});
      /* аәҡаәұаәҷаә—аә¶аәҒаә—аәұаәҮа»қаә»аә”а»ҖаәӣаәұаәҷаәҠаәёаә” (bulk) а»Ғаә—аәҷаә—аәөаәҘаә°аәҘаәІаәҚаәҒаәІаәҷ: аәӘа»үаәІаәҮа»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮ (unit) аәҒа»Ҳаәӯаәҷ (аә–а»үаәІаәЎаәө) а»ҖаәһаәІаә° movement аә•а»үаәӯаәҮаәӯа»үаәІаәҮаәӯаәөаәҮ unit аә—аәөа»ҲаәЎаәөа»ҒаәҘа»үаә§ аәҲаәІаәҒаәҷаәұа»үаәҷаәҡаәұаәҷаә—аә¶аәҒаәҘаәІаәҚаәҒаәІаәҷ/аәҒаәІаәҷа»Җаә„аә·а»Ҳаәӯаәҷа»„аә«аә§/аә•аә»а»үаәҷаә—аә¶аәҷаәһа»үаәӯаәЎаәҒаәұаәҷ */
      const receiptDate = document.getElementById('r_date').value || todayStr();
      const unitsBody = receiveCart.filter(item=> item.serial_no).map(item=> ({
        id: uid(), model_id: item.model_id, serial_no: item.serial_no, status:'in_stock',
        received_at: receiptDate, cost_lak: item.unit_cost
      }));
      if(unitsBody.length) await sb('stock_product_units', { method:'POST', body: unitsBody });
      const unitIdBySerial = {};
      unitsBody.forEach(u=> unitIdBySerial[u.serial_no] = u.id);
      const receiptItemsBody = receiveCart.map(item=> ({
        id: uid(), receipt_id: receiptId, model_id: item.model_id, serial_no: item.serial_no,
        quantity: item.quantity, unit_cost: item.unit_cost, amount: item.amount,
        cost_currency: item.cost_currency||'LAK', unit_cost_thb: item.unit_cost_thb, exchange_rate: item.exchange_rate
      }));
      const movementsBody = receiveCart.map(item=> ({
        id: uid(), model_id: item.model_id, unit_id: item.serial_no ? unitIdBySerial[item.serial_no] : null, movement_type:'in',
        quantity: item.quantity, ref_type:'purchase', ref_id: receiptId, created_by: currentUsername
      }));
      /* аәӯаәұаәҡа»Җаә”аә”аә•аә»а»үаәҷаә—аә¶аәҷаәӯа»үаәІаәҮаәӯаәҙаәҮаәӮаәӯаәҮа»Ғаә•а»ҲаәҘаә°аә®аәёа»ҲаәҷаәӘаәҙаәҷаә„а»үаәІ (а»ңаә¶а»ҲаәҮаә„аәіаәӮа»Қаә•а»Қа»Ҳ 1 аә®аәёа»Ҳаәҷ а»Җаә–аәҙаәҮаәҲаә°аәЎаәөаә«аәјаәІаәҚаәҘаәІаәҚаәҒаәІаәҷаәӮаәӯаәҮаә®аәёа»Ҳаәҷаә”аәҪаә§аәҒаәұаәҷ) */
      const costPatchByModel = {};
      if(currentRole==='admin'){
        receiveCart.forEach(item=> {
          const patch = costPatchByModel[item.model_id] || (costPatchByModel[item.model_id] = {});
          patch.cost_price = item.unit_cost; /* аә•аә»а»үаәҷаә—аә¶аәҷаәҒаәөаәҡ (аәҘа»ӢаәӯаәҒаә•аәІаәЎаәӯаәұаә”аә•аәІаәЎаә·а»үаәҷаәөа»ү) */
          /* аә–а»үаәІаәҠаә·а»үа»ҖаәӣаәұаәҷаәҡаәІаә” а»ғаә«а»үаәҲаә·а»Ҳаә•аә»а»үаәҷаә—аә¶аәҷаәҡаәІаә”аә—аәөа»Ҳаә«аәІаәҒа»ҚаәҠаә·а»үа»„аә§а»үаәҷаәі а»Җаәһаә·а»Ҳаәӯаә„аәұа»үаәҮа»ңа»үаәІаәҠаә·а»үаә®аәёа»Ҳаәҷа»ҖаәҒаә»а»ҲаәІаәҲаә°аә”аә¶аәҮаәЎаәІа»Җаә•аәөаәЎа»ғаә«а»үаәӯаәұаә”аә•аә°а»ӮаәҷаәЎаәұаә” */
          if(item.cost_currency === 'THB' && item.unit_cost_thb){
            patch.cost_price_thb = item.unit_cost_thb;
          }
        });
      }
      await Promise.all([
        sb('stock_purchase_receipt_items', { method:'POST', body: receiptItemsBody }),
        sb('stock_movements', { method:'POST', body: movementsBody }),
        ...Object.entries(costPatchByModel).map(([modelId, patch])=>
          sb(`stock_product_models?id=eq.${modelId}`, { method:'PATCH', body: patch }))
      ]);
      toast(`аә®аәұаәҡа»ҖаәӮаә»а»үаәІаәӘаә°аә•аәұаәӯаәҒаәӘаәіа»ҖаәҘаәұаә” В· ${receiptNo}`);
      receiveCart = [];
      renderTab();
    }catch(err){ toast('аәңаәҙаә”аәһаәІаә”: '+err.message); btn.disabled = false; }
  });
}
function renderReceiveCart(){
  if(!receiveCart.length) return '<div class="empty">аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҒаәІаәҷ</div>';
  const canSeeCost = currentRole === 'admin';
  return receiveCart.map((it,idx)=> `
    <div class="cart-item">
      <span>${it.model_name}${it.serial_no?(' В· '+it.serial_no):(' Г— '+it.quantity)}${it.cost_currency==='THB' ? ' <span class="muted" style="font-size:11px;">(аәҠаә·а»ү ' + fmtMoney(it.unit_cost_thb) + ' аәҡаәІаә” @' + it.exchange_rate + ')</span>' : ''}</span>
      <span>${canSeeCost ? fmtMoney(it.amount)+' аәҒаәөаәҡ ' : ''}<span class="x" data-idx="${idx}">вң•</span></span>
    </div>`).join('');
}
function bindReceiveCartRemove(){
  document.querySelectorAll('#r_cartList .x').forEach(el=>{
    el.addEventListener('click', ()=>{
      receiveCart.splice(Number(el.dataset.idx),1);
      renderTab();
    });
  });
}

/* аәӣаә°аә«аә§аәұаә”аәҒаәІаәҷаә®аәұаәҡа»ҖаәӮаә»а»үаәІ (а»Җаәҡаәҙа»ҲаәҮаәҚа»үаәӯаәҷаә«аәјаәұаәҮаәҘаәІаәҚа»Җаә”аә·аәӯаәҷ) */
async function getPurchaseReceipts(start, end){
  return await sb(`stock_purchase_receipts?select=*&receipt_date=gte.${start}&receipt_date=lt.${end}&order=receipt_date.desc,receipt_no.desc`);
}
async function getPurchaseReceiptItems(receiptId){
  return await sb(`stock_purchase_receipt_items?select=*,stock_product_models(name,unit)&receipt_id=eq.${receiptId}`);
}
async function loadReceiveHistory(month){
  const el = document.getElementById('rcv_history');
  if(!el) return;
  const canSeeCost = currentRole === 'admin';
  try{
    const start = month + '-01';
    const endDate = new Date(start); endDate.setMonth(endDate.getMonth()+1);
    const end = endDate.toISOString().slice(0,10);
    const receipts = await getPurchaseReceipts(start, end);
    el.innerHTML = `
      ${canSeeCost && receipts.length ? `
        <div class="row" style="padding:6px 0;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);margin:0;">
            <input type="checkbox" id="rcv_selectAll" style="width:17px;height:17px;margin:0;">а»ҖаәҘаә·аәӯаәҒаә—аәұаәҮа»қаә»аә”
          </label>
          <button class="btn danger" id="rcv_deleteSelected" style="display:none;padding:6px 12px;font-size:12px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>аәҘаә»аәҡаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ (<span id="rcv_selectedCount">0</span>)</button>
        </div>
      ` : ''}
      ${receipts.length ? receipts.map(r=> `
      <div class="row clickable" data-rcv="${r.id}">
        <span style="display:flex;align-items:center;gap:10px;">
          ${canSeeCost ? `<input type="checkbox" class="rcv-check" value="${r.id}" style="width:17px;height:17px;flex:none;margin:0;" onclick="event.stopPropagation()">` : ''}
          <span>
            <div class="mono">${r.receipt_no || '-'} <span style="font-family:var(--font-body);">${r.supplier_name ? 'В· '+r.supplier_name : ''}</span></div>
            <div class="muted" style="font-size:11px;">${fmtDateDMY(r.receipt_date)}</div>
          </span>
        </span>
        ${canSeeCost ? `<span class="gold mono">${fmtMoney(r.total_amount)}</span>` : ''}
      </div>`).join('') : '<div class="empty">аәҡа»Қа»ҲаәЎаәөаәҒаәІаәҷаә®аәұаәҡа»ҖаәӮаә»а»үаәІа»ғаәҷа»Җаә”аә·аәӯаәҷаәҷаәөа»ү</div>'}`;
    el.querySelectorAll('.row[data-rcv]').forEach(row=>{
      row.addEventListener('click', (e)=>{
        if(e.target.closest('.rcv-check')) return;
        openReceiptDetail(row.dataset.rcv, receipts.find(r=>r.id===row.dataset.rcv));
      });
    });
    if(canSeeCost && receipts.length){
      const selectAllEl = document.getElementById('rcv_selectAll');
      const deleteBtn = document.getElementById('rcv_deleteSelected');
      const countEl = document.getElementById('rcv_selectedCount');
      const checks = ()=> Array.from(el.querySelectorAll('.rcv-check'));
      function refreshSelection(){
        const selected = checks().filter(c=> c.checked);
        countEl.textContent = selected.length;
        deleteBtn.style.display = selected.length ? 'inline-flex' : 'none';
        selectAllEl.checked = selected.length === checks().length;
      }
      selectAllEl.addEventListener('change', ()=>{
        checks().forEach(c=> c.checked = selectAllEl.checked);
        refreshSelection();
      });
      checks().forEach(c=> c.addEventListener('change', refreshSelection));
      deleteBtn.addEventListener('click', async ()=>{
        const ids = checks().filter(c=> c.checked).map(c=> c.value);
        if(!ids.length) return;
        if(!confirm(`аәҘаә»аәҡаәҒаәІаәҷаә®аәұаәҡа»ҖаәӮаә»а»үаәІ ${ids.length} а»ғаәҡаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ? аәӘаә°аә•аәұаәӯаәҒаә—аәөа»Ҳаә®аәұаәҡа»ҖаәӮаә»а»үаәІаәҲаә°аә–аә·аәҒаә«аәұаәҒаә„аә·аәҷ а»ҒаәҘаә° аәҲаә°аәҘаә»аәҡаә–аәІаә§аәӯаәҷ (аәҒаә№а»үаә„аә·аәҷаәҡа»Қа»Ҳа»„аә”а»ү)`)) return;
        if(deleteBtn.disabled) return;
        deleteBtn.disabled = true;
        try{
          await bulkVoidReceipts(ids);
          toast(`аәҘаә»аәҡаәҒаәІаәҷаә®аәұаәҡа»ҖаәӮаә»а»үаәІаәӘаәіа»ҖаәҘаәұаә” ${ids.length} а»ғаәҡ аә„аә·аәҷаәӘаә°аә•аәұаәӯаәҒа»ҒаәҘа»үаә§`);
          renderTab();
        }catch(err){
          toast('аәҘаә»аәҡаәҡа»Қа»Ҳа»„аә”а»ү: аәӯаәІаә”аәЎаәөаәӘаәҙаәҷаә„а»үаәІаәҲаәІаәҒа»ғаәҡа»ғаә”а»ңаә¶а»ҲаәҮаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒаә–аә·аәҒаәӮаәІаәҚ/а»Ӯаәӯаәҷа»„аәӣа»ҒаәҘа»үаә§ вҖ” аәҘаәӯаәҮаәҚаә»аәҒа»ҖаәҘаәөаәҒаәҒаәІаәҷа»ҖаәҘаә·аәӯаәҒа»ғаәҡаәҷаәұа»үаәҷа»ҒаәҘа»үаә§аәҘаә»аәҡа»ға»қа»Ҳ');
          deleteBtn.disabled = false;
        }
      });
    }
  }catch(err){
    el.innerHTML = `<div class="empty">аәңаәҙаә”аәһаәІаә”: ${err.message}</div>`;
  }
}
async function openReceiptDetail(receiptId, receipt){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal"><div class="empty">аәҒаәіаәҘаәұаәҮа»Ӯаә«аәҘаә”...</div></div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', (e)=>{ if(e.target === bg) bg.remove(); });
  const canSeeCost = currentRole === 'admin';
  try{
    const items = await getPurchaseReceiptItems(receiptId);
    bg.querySelector('.modal').innerHTML = `

/* аәҘаә»аәҡаәҒаәІаәҷаә®аәұаәҡа»ҖаәӮаә»а»үаәІ: аә–а»үаәІаәЎаәөа»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаә—аәөа»ҲаәӮаәІаәҚа»„аәӣа»ҒаәҘа»үаә§аәҲаәІаәҒаә„аәұа»үаәҮаәҷаәөа»ү аәҲаә°аәҘаә»аәҡаәҡа»Қа»Ҳа»„аә”а»ү (unit аәҲаә°аә•аәҙаә” FK аәҒаәұаәҡаәҡаәҙаәҷаәӮаәІаәҚ) */
async function voidReceipt(receiptId){
  const movements = await sb(`stock_movements?select=id,unit_id&ref_type=eq.purchase&ref_id=eq.${receiptId}`);
  await Promise.all(movements.map(mv=>{
    if(mv.unit_id){
      return sb(`stock_product_units?id=eq.${mv.unit_id}`, { method:'DELETE' });
    }
    return Promise.resolve();
  }));
  await sb(`stock_movements?ref_type=eq.purchase&ref_id=eq.${receiptId}`, { method:'DELETE' });
  await sb(`stock_purchase_receipts?id=eq.${receiptId}`, { method:'DELETE' });
}
/* аәҘаә»аәҡа»ғаәҡаә®аәұаәҡа»ҖаәӮаә»а»үаәІаә«аәјаәІаәҚа»ғаәҡаәһа»үаәӯаәЎаәҒаәұаәҷ аә”а»үаә§аәҚ 4 request аәҘаә§аәЎ (аәҡа»Қа»Ҳаә§а»ҲаәІаәҲаә°а»ҖаәҘаә·аәӯаәҒаәҲаәұаәҒа»ғаәҡ) а»Ғаә—аәҷаә—аәөа»ҲаәҲаә°аәҘаә»аәҡа»Җаә—аә·а»ҲаәӯаәҘаә°а»ғаәҡ (а»„аә§аәҒаә§а»ҲаәІаә«аәјаәІаәҚа»ҖаәЎаә·а»Ҳаәӯа»ҖаәҘаә·аәӯаәҒаә«аәјаәІаәҚа»Ҷа»ғаәҡ) вҖ” аә•а»үаәӯаәҮаәҘаә»аәҡ unit аәҒа»Ҳаәӯаәҷ movement аә„аә·а»ҖаәҒаә»а»ҲаәІ а»Җаәһаә·а»Ҳаәӯа»ғаә«а»ү FK аәҒаә§аә” "аәӮаәІаәҚа»„аәӣа»ҒаәҘа»үаә§аәҡа»Қа»Ҳа»ғаә«а»үаәҘаә»аәҡ" аәҚаәұаәҮа»Җаә®аәұаә”аә§аәҪаәҒаә„аә·а»Җаә”аәөаәЎ */
async function bulkVoidReceipts(ids){
  const idList = ids.join(',');
  const movements = await sb(`stock_movements?select=unit_id&ref_type=eq.purchase&ref_id=in.(${idList})`);
  const unitIds = [...new Set(movements.filter(m=> m.unit_id).map(m=> m.unit_id))];
  if(unitIds.length){
    await sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'DELETE' });
  }
  await sb(`stock_movements?ref_type=eq.purchase&ref_id=in.(${idList})`, { method:'DELETE' });
  await sb(`stock_purchase_receipts?id=in.(${idList})`, { method:'DELETE' });
}

    toast(`а»Җаәһаәөа»ҲаәЎ ${opt.textContent} а»ҖаәӮаә»а»үаәІаәҡаәҙаәҷа»ҒаәҘа»үаә§`);
  });
  bindEnterKey(['s_qty','s_price'], 's_addItem');
  document.getElementById('s_discount').addEventListener('input', updateSellTotals);
  bindEnterAdvance(['s_name','s_phone','s_village','s_district','s_province'], 's_model_search');
  bindSellCartRemove();
  document.getElementById('s_addPayment').addEventListener('click', ()=>{
    const amt = moneyValue('s_pay_amount');
    if(!amt){ toast('а»ғаәӘа»ҲаәҲаәіаәҷаә§аәҷа»ҖаәҮаәҙаәҷ'); return; }
    const method = document.getElementById('s_pay_method').value;
    const invCurrency = document.getElementById('s_currency').value;
    const payCurrency = document.getElementById('s_pay_currency').value;
    let rate = null, convertedAmt = amt;
    if(payCurrency !== invCurrency){
      rate = Number((document.getElementById('s_pay_rate').value||'').replace(/,/g,''));
      if(!rate){ toast('а»ғаәӘа»Ҳаәӯаәұаә”аә•аәІа»ҒаәҘаәҒаәӣа»ҲаәҪаәҷа»Җаәһаә·а»ҲаәӯаәҒаә§аә”аәҚаәӯаә”аәҠаәіаәҘаә°'); return; }
      convertedAmt = invCurrency === 'LAK' ? amt * rate : amt / rate;
    }
    sellPayments.push({ method, currency: payCurrency, amount: amt, exchange_rate: rate, converted_amount: convertedAmt });
    document.getElementById('s_pay_amount').value = '';
    renderPaymentList();
    updateSellTotals();
    toast('а»Җаәһаәөа»ҲаәЎаәҒаәІаәҷаәҲа»ҲаәІаәҚа»ҒаәҘа»үаә§');
  });
  document.getElementById('s_pay_amount').addEventListener('keydown', (e)=>{
    /* аә–а»үаәІаәһаәҙаәЎаәҲаәіаәҷаә§аәҷа»ҖаәҮаәҙаәҷа»„аә§а»ү + Enter = а»Җаәһаәөа»ҲаәЎаәҒаәІаәҷаәҲа»ҲаәІаәҚ, аә–а»үаәІаәҠа»ҲаәӯаәҮаәҷаәөа»үаәҚаәұаәҮаә«аә§а»ҲаәІаәҮ + Enter = аәўаә·аәҷаәўаәұаәҷаәӯаәӯаәҒаәҡаәҙаәҷа»ҖаәҘаәөаәҚ */
    if(e.key !== 'Enter') return;
    e.preventDefault();
    if(moneyValue('s_pay_amount')){ document.getElementById('s_addPayment').click(); }
    else { document.getElementById('s_submit').click(); }
  });
  renderPaymentList();
  updateSellTotals();
  document.getElementById('s_submit').addEventListener('click', async (e)=>{
    if(!sellCart.length){ toast('аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҒаәІаәҷ'); return; }
    const btn = e.currentTarget;
    if(btn.disabled) return; // аёҒаёұаёҷаёҒаё”аёӢа№үаёіаёЈаё°аё«аё§а№ҲаёІаёҮаёҒаёіаёҘаёұаёҮаёҡаёұаёҷаё—аё¶аёҒ
    btn.disabled = true;
    try{
      const invoiceId = uid();
      const subtotal = sellCart.reduce((s,i)=>s+i.amount,0);
      const discount = Math.min(moneyValue('s_discount'), subtotal);
      const total = subtotal - discount;
      const paid = sellPayments.reduce((s,p)=>s+p.converted_amount,0);
      const currency = document.getElementById('s_currency').value;
      const status = paid <= 0 ? 'unpaid' : (paid >= total ? 'paid' : 'partial');
      const invNo = 'INV-' + Date.now().toString().slice(-8);
      await sb('sales_invoices', { method:'POST', body:{
        id: invoiceId, invoice_no: invNo,
        customer_name: document.getElementById('s_name').value.trim(),
        customer_phone: document.getElementById('s_phone').value.trim(),
        village: document.getElementById('s_village').value.trim(),
        district: document.getElementById('s_district').value.trim(),
        province: document.getElementById('s_province').value.trim(),
        invoice_date: todayStr(),
        total_amount: total,
        discount_amount: discount,
        currency,
        paid_amount: paid,
        payment_status: status,
        created_by: currentUsername
      }});
      /* аәҡаәұаәҷаә—аә¶аәҒаәҘаәІаәҚаәҒаәІаәҷ/аәҒаәІаәҷа»Җаә„аә·а»Ҳаәӯаәҷа»„аә«аә§/аәҒаәІаәҷаәҲа»ҲаәІаәҚа»ҖаәҮаәҙаәҷаә—аәұаәҮа»қаә»аә”а»ҖаәӣаәұаәҷаәҠаәёаә”аә”аәҪаә§ (bulk insert) а»Ғаә—аәҷаәҒаәІаәҷаәӘаә»а»ҲаәҮаә—аәөаәҘаә°аәҘаәІаәҚаәҒаәІаәҷ а»ғаә«а»үа»„аә§аәӮаә¶а»үаәҷаә«аәјаәІаәҚ а»Ӯаә”аәҚаәӘаә°а»ҖаәһаәІаә°а»ҖаәЎаә·а»ҲаәӯаәҡаәҙаәҷаәЎаәөаә«аәјаәІаәҚаәҘаәІаәҚаәҒаәІаәҷ аә«аәјаә·а»Җаәҷаәұаә”аәҠа»үаәІ */
      const soldAt = todayStr();
      const itemsBody = sellCart.map(item=> ({
        id: uid(), invoice_id: invoiceId, model_id: item.model_id, unit_id: item.unit_id,
        variant_note: item.variant_note, quantity: item.quantity, unit_price: item.unit_price, amount: item.amount
      }));
      const movementsBody = sellCart.map(item=> ({
        id: uid(), model_id: item.model_id, unit_id: item.unit_id, movement_type:'out',
        quantity: item.quantity, ref_type:'sale', ref_id: invoiceId, created_by: currentUsername
      }));
      const soldUnitIds = sellCart.filter(item=> item.unit_id).map(item=> item.unit_id);
      const paymentsBody = sellPayments.map(p=> ({
        id: uid(), invoice_id: invoiceId, payment_date: soldAt,
        method: p.method, currency: p.currency, amount: p.amount,
        exchange_rate: p.exchange_rate, converted_amount: p.converted_amount, created_by: currentUsername
      }));
      await Promise.all([
        sb('sales_invoice_items', { method:'POST', body: itemsBody }),
        sb('stock_movements', { method:'POST', body: movementsBody }),
        soldUnitIds.length ? sb(`stock_product_units?id=in.(${soldUnitIds.join(',')})`, { method:'PATCH', body:{ status:'sold', sold_at: soldAt } }) : Promise.resolve(),
        paymentsBody.length ? sb('sales_payments', { method:'POST', body: paymentsBody }) : Promise.resolve()
      ]);
      toast(`аәӯаәӯаәҒаәҡаәҙаәҷ ${invNo} аәӘаәіа»ҖаәҘаәұаә” В· ${fmtMoney(total)}`);
      sellCart = [];
      sellPayments = [];
      renderTab();
    }catch(err){ toast('аәңаәҙаә”аәһаәІаә”: '+err.message); btn.disabled = false; }
  });
}
function renderPaymentList(){
  const el = document.getElementById('s_paymentList');
  if(!el) return;
  el.innerHTML = sellPayments.length ? sellPayments.map((p,idx)=> `
    <div class="cart-item">
      <span>${p.method==='cash'?'а»ҖаәҮаәҙаәҷаәӘаә»аә”':'а»Ӯаәӯаәҷ'} В· ${p.currency}</span>
      <span>${fmtMoney(p.amount)}${p.exchange_rate ? ' <span class="muted" style="font-size:11px;">(@'+p.exchange_rate+')</span>' : ''} <span class="x" data-pidx="${idx}">вң•</span></span>
    </div>`).join('') : '<div class="empty">аәҚаәұаәҮаәҡа»Қа»Ҳа»„аә”а»үаәҡаәұаәҷаә—аә¶аәҒаәҒаәІаәҷаәҲа»ҲаәІаәҚ (аә„а»үаәІаәҮа»қаә»аә”)</div>';
  el.querySelectorAll('.x').forEach(x=>{
    x.addEventListener('click', ()=>{
      sellPayments.splice(Number(x.dataset.pidx),1);
      renderPaymentList();
      updateSellTotals();
    });
  });
}
function updateSellTotals(){
  const subtotal = sellCart.reduce((s,i)=>s+i.amount,0);
  const discount = Math.min(moneyValue('s_discount'), subtotal);
  const total = subtotal - discount;
  const paid = sellPayments.reduce((s,p)=>s+p.converted_amount,0);
  const remain = total - paid;
  const subtotalDisplay = document.getElementById('s_subtotalDisplay');
  if(subtotalDisplay) subtotalDisplay.textContent = fmtMoney(subtotal);
  const totalDisplay = document.getElementById('s_totalDisplay');
  if(totalDisplay) totalDisplay.textContent = 'аәҘаә§аәЎ: ' + fmtMoney(total);
  const st = document.getElementById('s_sumTotal'); if(st) st.textContent = fmtMoney(total);
  const sp = document.getElementById('s_sumPaid'); if(sp) sp.textContent = fmtMoney(paid);
  const sr = document.getElementById('s_sumRemain'); if(sr) sr.textContent = fmtMoney(remain > 0 ? remain : 0);
}
function renderSellCart(){
  if(!sellCart.length) return '<div class="empty">аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҒаәІаәҷ</div>';
  return sellCart.map((it,idx)=> `
    <div class="cart-item">
      <span>${it.model_name}${it.variant_note?(' В· '+it.variant_note):(' Г— '+it.quantity)}</span>
      <span>${fmtMoney(it.amount)} <span class="x" data-idx="${idx}">вң•</span></span>
    </div>`).join('');
}
function bindSellCartRemove(){
  document.querySelectorAll('#s_cartList .x').forEach(el=>{
    el.addEventListener('click', ()=>{
      sellCart.splice(Number(el.dataset.idx),1);
      document.getElementById('s_cartList').innerHTML = renderSellCart();
      bindSellCartRemove();
      updateSellTotals();
    });
  });
}

  });
  loadTransferHistory(historyMonth);
  /* Enter а№ғаёҷа№Ғаё•а№ҲаёҘаё°аёҠа№ҲаёӯаёҮ = а№„аёҘа№ҲаёҘаёҮаёҠа№ҲаёӯаёҮаё–аёұаё”а№„аёӣаё•аёІаёЎаёҘаёіаё”аёұаёҡаёҲаёЈаёҙаёҮа№ғаёҷаёҹаёӯаёЈа№ҢаёЎ (аёҲаёіаёҷаё§аёҷ/а№„аёЎа№ҲаёЎаёөа№ҖаёҘаёӮа№Җаё„аёЈаё·а№ҲаёӯаёҮ вҶ’ аё«аёЎаёІаёўа№Җаё«аё•аёё) аёһаёӯаё–аё¶аёҮаёҠа№ҲаёӯаёҮаёӘаёёаё”аё—а№үаёІаёўаё„а№Ҳаёӯаёўа№Җаёһаёҙа№ҲаёЎа№ҖаёӮа№үаёІаёЈаёІаёўаёҒаёІаёЈ а№ҒаёҘа№үаё§а№ӮаёҹаёҒаёұаёӘа№„аёӣаё—аёөа№Ҳаёӣаёёа№ҲаёЎ "аёҡаёұаёҷаё—аё¶аёҒа№ӮаёӯаәҷаёӘаёІаёӮаёІ" а№ғаё«а№үаёһаёЈа№үаёӯаёЎаёҒаё” Enter аёӯаёөаёҒаё„аёЈаёұа№үаёҮа№Җаёһаё·а№Ҳаёӯаёҡаёұаёҷаё—аё¶аёҒа№ҖаёҘаёў */
  function getTransferFieldChain(){
    const serialBlock = document.getElementById('tr_serialBlock');
    const isSerialVisible = serialBlock && serialBlock.style.display !== 'none';
    const chain = [];
    if(!isSerialVisible) chain.push('tr_qty');
    chain.push('tr_note');
    return chain;
  }
  function focusTransferField(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.focus();
    if(el.select) el.select();
  }
  function handleTransferFieldEnter(currentId){
    const chain = getTransferFieldChain();
    const idx = chain.indexOf(currentId);
    if(idx === -1) return;
    if(idx < chain.length - 1){
      focusTransferField(chain[idx+1]);
    } else {
      document.getElementById('tr_addItem').click();
      /* аё«аёҷа№Ҳаё§аёҮаёҒаёІаёЈа№ӮаёҹаёҒаёұаёӘа№„аёӣаёҠа№Ҳаё§аёҮаё–аёұаё”а№„аёӣаё”а№үаё§аёў setTimeout а№Җаёһаё·а№Ҳаёӯа№„аёЎа№Ҳа№ғаё«а№үаё„аёөаёўа№Ң Enter аё•аёұаё§а№Җаё”аёөаёўаё§аёҒаёұаёҷа№„аёӣаёҒаёЈаё°аё•аёёа№үаёҷ click аё—аёөа№Ҳаёӣаёёа№ҲаёЎаёҡаёұаёҷаё—аё¶аёҒаёӢа№үаёіаёӯаёөаёҒаё—аёө (аё–а№үаёІа№ӮаёҹаёҒаёұаёӘаёӣаёёа№ҲаёЎаё—аёұаёҷаё—аёөа№ғаёҷаёӯаёөа№Җаё§аёҷаё•а№Ңа№Җаё”аёөаёўаё§аёҒаёұаёҷ аёҡаёІаёҮа№ҖаёҡаёЈаёІаё§а№Ңа№ҖаёӢаёӯаёЈа№ҢаёҲаё°аёўаёҙаёҮ click аёӢа№үаёіаё•аёӯаёҷаёӣаёҘа№Ҳаёӯаёўаё„аёөаёўа№Ң) */
      setTimeout(()=>{
        const submitBtn = document.getElementById('tr_submit');
        if(submitBtn) submitBtn.focus();
      }, 0);
    }
  }
  ['tr_qty','tr_note'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ e.preventDefault(); handleTransferFieldEnter(id); }
    });
  });
  bindEnterAdvance(['tr_branch','tr_date'], 'tr_model_search');
  document.getElementById('tr_submit').addEventListener('click', async (e)=>{
    if(!transferCart.length){ toast('аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҒаәІаәҷ'); return; }
    const branch = document.getElementById('tr_branch').value.trim();
    if(!branch){ toast('а»ғаәӘа»ҲаәҠаә·а»ҲаәӘаәІаәӮаәІаәӣаәІаәҚаә—аәІаәҮаәҒа»Ҳаәӯаәҷ'); return; }
    const btn = e.currentTarget;
    if(btn.disabled) return;
    btn.disabled = true;
    try{
      const note = document.getElementById('tr_note').value.trim();
      const fullNote = `а»Ӯаәӯаәҷа»„аәӣ: ${branch}${note ? ' - '+note : ''}`;
      const transferId = uid();
      /* аәҡаәұаәҷаә—аә¶аәҒаә—аәұаәҮа»қаә»аә”а»ҖаәӣаәұаәҷаәҠаәёаә”аә”аәҪаә§ (bulk) а»Ғаә—аәҷаә—аәөаәҘаә°аәҘаәІаәҚаәҒаәІаәҷ а»ғаә«а»үа»„аә§аәӮаә¶а»үаәҷ */
      const movementsBody = transferCart.map(item=> ({
        id: uid(), model_id: item.model_id, unit_id: item.unit_id, movement_type:'out',
        quantity: item.quantity, ref_type:'transfer', ref_id: transferId, note: fullNote, created_by: currentUsername
      }));
      const transferredUnitIds = transferCart.filter(item=> item.unit_id).map(item=> item.unit_id);
      await Promise.all([
        sb('stock_movements', { method:'POST', body: movementsBody }),
        transferredUnitIds.length ? sb(`stock_product_units?id=in.(${transferredUnitIds.join(',')})`, { method:'PATCH', body:{ status:'transferred', note: fullNote } }) : Promise.resolve()
      ]);
      toast(`а»ӮаәӯаәҷаәӘаәІаәӮаәІаәӘаәіа»ҖаәҘаәұаә” В· ${transferCart.length} аәҘаәІаәҚаәҒаәІаәҷ`);
      transferCart = [];
      renderTab();
    }catch(err){ toast('аәңаәҙаә”аәһаәІаә”: '+err.message); btn.disabled = false; }
  });
}
function renderTransferCart(){
  if(!transferCart.length) return '<div class="empty">аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҒаәІаәҷ</div>';

}
function bindTransferCartRemove(){
  document.querySelectorAll('#tr_cartList .x').forEach(el=>{
