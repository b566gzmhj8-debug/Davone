      <div class="row"><span>ລວມຍ່ອຍ</span><span class="mono" id="s_subtotalDisplay">${fmtMoney(sellCart.reduce((s,i)=>s+i.amount,0))}</span></div>
      <label>ຫຼຸດລາຄາ (ຖ້າມີ)</label>
      <input id="s_discount" type="text" value="0">
      <div class="invoice-total mono" id="s_totalDisplay">ລວມ: ${fmtMoney(sellCart.reduce((s,i)=>s+i.amount,0))}</div>
      <label>ສະກຸນເງິນ</label>
      <select id="s_currency">
        <option value="LAK">ກີບ (LAK)</option>
        <option value="THB">ບາດ (THB)</option>
      </select>
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-wallet"></use></svg>ການຈ່າຍເງິນ</h3>
      <div id="s_paymentList"></div>
      <div class="grid2">
        <select id="s_pay_method">
          <option value="cash">ເງິນສົດ</option>
          <option value="transfer">ໂອນ</option>
        </select>
        <select id="s_pay_currency">
          <option value="LAK">ກີບ (LAK)</option>
          <option value="THB">ບາດ (THB)</option>
        </select>
      </div>
      <input id="s_pay_amount" type="text" placeholder="ຈຳນວນ" style="margin-top:8px;">
      <div id="s_pay_rateBlock" style="display:none;">
        <label>ອັດຕາແລກປ່ຽນມື້ນີ້ (1 ບາດ = ? ກີບ)</label>
        <input id="s_pay_rate" type="text" placeholder="ເຊັ່ນ 620">
      </div>
      <button class="btn secondary" id="s_addPayment"><svg class="dv-icon"><use href="#i-wallet"></use></svg>ເພີ່ມການຈ່າຍ</button>
      <hr class="sep">
      <div class="row"><span>ຍອດບິນ</span><span class="mono" id="s_sumTotal">0</span></div>
      <div class="row"><span>ຈ່າຍແລ້ວ</span><span class="mono" id="s_sumPaid">0</span></div>
      <div class="row"><span class="gold">ຄ້າງຊຳລະ</span><span class="gold mono" id="s_sumRemain">0</span></div>
      <button class="btn" id="s_submit"><svg class="dv-icon"><use href="#i-check-circle"></use></svg>ຢືນຢັນອອກບິນ (ຫັກສະຕັອກທັນທີ)</button>
    </div>
  `;
  attachMoneyInput('s_price', 0);
  attachMoneyInput('s_discount', 0);
  attachMoneyInput('s_pay_amount', '');
  const modelSel = document.getElementById('s_model');
  enableSearchableSelect(modelSel);
  /* ໃສ່ລາຄາໃຫ້ອັດຕະໂນມັດຕາມສະກຸນເງິນທີ່ເລືອກ (ກີບ ໃຊ້ sale_price, ບາດ ໃຊ້ sale_price_thb) */
  function fillSellPrice(){
    const opt = modelSel.selectedOptions[0];
    if(!opt || !opt.value) return;
    const currency = document.getElementById('s_currency').value;
    const price = currency === 'THB' ? (opt.dataset.priceThb || 0) : (opt.dataset.price || 0);
    attachMoneyInput('s_price', price);
  }
  modelSel.addEventListener('change', async ()=>{
    const opt = modelSel.selectedOptions[0];
    if(!opt || !opt.value) return;
    const isSerial = opt.dataset.serial === 'true';
    /* ເລືອກສະກຸນເງິນຂອງບິນໃຫ້ອັດຕະໂນມັດຕາມລາຄາທີ່ສິນຄ້ານີ້ຕັ້ງໄວ້ຈິງ (ຖ້າມີແຕ່ລາຄາບາດ ກໍ່ໃຫ້ສະຫຼັບເປັນບາດເອງ ບໍ່ຕ້ອງໃຫ້ຜູ້ໃຊ້ໄປເລືອກສະກຸນເງິນເອງກ່ອນ ບໍ່ຄືອອກຄ່າ 0) */
    const priceLak = Number(opt.dataset.price || 0);
    const priceThb = Number(opt.dataset.priceThb || 0);
    const currencySel = document.getElementById('s_currency');
    if(priceLak > 0){
      currencySel.value = 'LAK';
    } else if(priceThb > 0){
      currencySel.value = 'THB';
    }
    syncPayCurrencyDefault();
    fillSellPrice();
    document.getElementById('s_unitBlock').style.display = isSerial ? 'block' : 'none';
    document.getElementById('s_qtyPriceBlock').style.display = isSerial ? 'none' : 'grid';
    if(isSerial){
      const units = await getInStockUnits(opt.value);
      const sel = document.getElementById('s_unitSelect');
      sel.innerHTML = units.length
        ? units.map(u=> `<option value="${u.id}" data-serial="${u.serial_no}">${u.serial_no}</option>`).join('')
        : '<option value="">-- ບໍ່ມີໃນສະຕັອກ --</option>';
    }
  });
  function syncPayCurrencyDefault(){
    document.getElementById('s_pay_currency').value = document.getElementById('s_currency').value;
    document.getElementById('s_pay_rateBlock').style.display = 'none';
  }
  document.getElementById('s_currency').addEventListener('change', ()=>{ fillSellPrice(); syncPayCurrencyDefault(); });
  syncPayCurrencyDefault();
  document.getElementById('s_pay_currency').addEventListener('change', ()=>{
    const invCurrency = document.getElementById('s_currency').value;
    document.getElementById('s_pay_rateBlock').style.display =
      document.getElementById('s_pay_currency').value !== invCurrency ? 'block' : 'none';
  });
  document.getElementById('s_addItem').addEventListener('click', ()=>{
    const opt = modelSel.selectedOptions[0];
    if(!opt || !opt.value){ toast('ເລືອກສິນຄ້າກ່ອນ'); return; }
    const isSerial = opt.dataset.serial === 'true';
    const price = moneyValue('s_price');
    if(isSerial){
      const unitSel = document.getElementById('s_unitSelect');
      const uOpt = unitSel.selectedOptions[0];
      if(!uOpt || !uOpt.value){ toast('ບໍ່ມີໜ່ວຍໃນສະຕັອກ'); return; }
      sellCart.push({ model_id: opt.value, model_name: opt.textContent, unit_id: uOpt.value,
        variant_note: uOpt.dataset.serial, quantity:1, unit_price: price, amount: price });
    } else {
      const qty = Number(document.getElementById('s_qty').value)||1;
      sellCart.push({ model_id: opt.value, model_name: opt.textContent, unit_id:null,
        variant_note:null, quantity: qty, unit_price: price, amount: qty*price });
    }
    document.getElementById('s_cartList').innerHTML = renderSellCart();
    bindSellCartRemove();
    updateSellTotals();
    toast(`ເພີ່ມ ${opt.textContent} ເຂົ້າບິນແລ້ວ`);
  });
  bindEnterKey(['s_qty','s_price'], 's_addItem');
  document.getElementById('s_discount').addEventListener('input', updateSellTotals);
  bindEnterAdvance(['s_name','s_phone','s_village','s_district','s_province'], 's_model_search');
  bindSellCartRemove();
  document.getElementById('s_addPayment').addEventListener('click', ()=>{
    const amt = moneyValue('s_pay_amount');
    if(!amt){ toast('ໃສ່ຈຳນວນເງິນ'); return; }
    const method = document.getElementById('s_pay_method').value;
    const invCurrency = document.getElementById('s_currency').value;
    const payCurrency = document.getElementById('s_pay_currency').value;
    let rate = null, convertedAmt = amt;
    if(payCurrency !== invCurrency){
      rate = Number((document.getElementById('s_pay_rate').value||'').replace(/,/g,''));
      if(!rate){ toast('ໃສ່ອັດຕາແລກປ່ຽນເພື່ອກວດຍອດຊຳລະ'); return; }
      convertedAmt = invCurrency === 'LAK' ? amt * rate : amt / rate;
    }
    sellPayments.push({ method, currency: payCurrency, amount: amt, exchange_rate: rate, converted_amount: convertedAmt });
    document.getElementById('s_pay_amount').value = '';
    renderPaymentList();
    updateSellTotals();
    toast('ເພີ່ມການຈ່າຍແລ້ວ');
  });
  document.getElementById('s_pay_amount').addEventListener('keydown', (e)=>{
    /* ຖ້າພິມຈຳນວນເງິນໄວ້ + Enter = ເພີ່ມການຈ່າຍ, ຖ້າຊ່ອງນີ້ຍັງຫວ່າງ + Enter = ຢືນຢັນອອກບິນເລີຍ */
    if(e.key !== 'Enter') return;
    e.preventDefault();
    if(moneyValue('s_pay_amount')){ document.getElementById('s_addPayment').click(); }
    else { document.getElementById('s_submit').click(); }
  });
  renderPaymentList();
  updateSellTotals();
  document.getElementById('s_submit').addEventListener('click', async (e)=>{
    if(!sellCart.length){ toast('ຍັງບໍ່ມີລາຍການ'); return; }
    const btn = e.currentTarget;
    if(btn.disabled) return; // กันกดซ้ำระหว่างกำลังบันทึก
    btn.disabled = true;
    try{
      const invoiceId = uid();
      const subtotal = sellCart.reduce((s,i)=>s+i.amount,0);
      const discount = Math.min(moneyValue('s_discount'), subtotal);
      const total = subtotal - discount;
      const paid = sellPayments.reduce((s,p)=>s+p.converted_amount,0);
      const currency = document.getElementById('s_currency').value;
      const status = paid <= 0 ? 'unpaid' : (paid >= total ? 'paid' : 'partial');
      const invNo = 'INV-' + Date.now().toString().slice(-8);
      await sb('sales_invoices', { method:'POST', body:{
        id: invoiceId, invoice_no: invNo,
        customer_name: document.getElementById('s_name').value.trim(),
        customer_phone: document.getElementById('s_phone').value.trim(),
        village: document.getElementById('s_village').value.trim(),
        district: document.getElementById('s_district').value.trim(),
        province: document.getElementById('s_province').value.trim(),
        invoice_date: todayStr(),
        total_amount: total,
        discount_amount: discount,
        currency,
        paid_amount: paid,
        payment_status: status,
        created_by: currentUsername
      }});
      /* ບັນທຶກລາຍການ/ການເຄື່ອນໄຫວ/ການຈ່າຍເງິນທັງໝົດເປັນຊຸດດຽວ (bulk insert) ແທນການສົ່ງທີລະລາຍການ ໃຫ້ໄວຂຶ້ນຫຼາຍ ໂດຍສະເພາະເມື່ອບິນມີຫຼາຍລາຍການ ຫຼືເນັດຊ້າ */
      const soldAt = todayStr();
      const itemsBody = sellCart.map(item=> ({
        id: uid(), invoice_id: invoiceId, model_id: item.model_id, unit_id: item.unit_id,
        variant_note: item.variant_note, quantity: item.quantity, unit_price: item.unit_price, amount: item.amount
      }));
      const movementsBody = sellCart.map(item=> ({
        id: uid(), model_id: item.model_id, unit_id: item.unit_id, movement_type:'out',
        quantity: item.quantity, ref_type:'sale', ref_id: invoiceId, created_by: currentUsername
      }));
      const soldUnitIds = sellCart.filter(item=> item.unit_id).map(item=> item.unit_id);
      const paymentsBody = sellPayments.map(p=> ({
        id: uid(), invoice_id: invoiceId, payment_date: soldAt,
        method: p.method, currency: p.currency, amount: p.amount,
        exchange_rate: p.exchange_rate, converted_amount: p.converted_amount, created_by: currentUsername
      }));
      await Promise.all([
        sb('sales_invoice_items', { method:'POST', body: itemsBody }),
        sb('stock_movements', { method:'POST', body: movementsBody }),
        soldUnitIds.length ? sb(`stock_product_units?id=in.(${soldUnitIds.join(',')})`, { method:'PATCH', body:{ status:'sold', sold_at: soldAt } }) : Promise.resolve(),
        paymentsBody.length ? sb('sales_payments', { method:'POST', body: paymentsBody }) : Promise.resolve()
      ]);
      toast(`ອອກບິນ ${invNo} ສຳເລັດ · ${fmtMoney(total)}`);
      sellCart = [];
      sellPayments = [];
      renderTab();
    }catch(err){ toast('ຜິດພາດ: '+err.message); btn.disabled = false; }
  });
}
function renderPaymentList(){
  const el = document.getElementById('s_paymentList');
  if(!el) return;
  el.innerHTML = sellPayments.length ? sellPayments.map((p,idx)=> `
    <div class="cart-item">
      <span>${p.method==='cash'?'ເງິນສົດ':'ໂອນ'} · ${p.currency}</span>
      <span>${fmtMoney(p.amount)}${p.exchange_rate ? ' <span class="muted" style="font-size:11px;">(@'+p.exchange_rate+')</span>' : ''} <span class="x" data-pidx="${idx}">✕</span></span>
    </div>`).join('') : '<div class="empty">ຍັງບໍ່ໄດ້ບັນທຶກການຈ່າຍ (ຄ້າງໝົດ)</div>';
  el.querySelectorAll('.x').forEach(x=>{
    x.addEventListener('click', ()=>{
      sellPayments.splice(Number(x.dataset.pidx),1);
      renderPaymentList();
      updateSellTotals();
    });
  });
}
function updateSellTotals(){
  const subtotal = sellCart.reduce((s,i)=>s+i.amount,0);
  const discount = Math.min(moneyValue('s_discount'), subtotal);
  const total = subtotal - discount;
  const paid = sellPayments.reduce((s,p)=>s+p.converted_amount,0);
  const remain = total - paid;
  const subtotalDisplay = document.getElementById('s_subtotalDisplay');
  if(subtotalDisplay) subtotalDisplay.textContent = fmtMoney(subtotal);
  const totalDisplay = document.getElementById('s_totalDisplay');
  if(totalDisplay) totalDisplay.textContent = 'ລວມ: ' + fmtMoney(total);
  const st = document.getElementById('s_sumTotal'); if(st) st.textContent = fmtMoney(total);
  const sp = document.getElementById('s_sumPaid'); if(sp) sp.textContent = fmtMoney(paid);
  const sr = document.getElementById('s_sumRemain'); if(sr) sr.textContent = fmtMoney(remain > 0 ? remain : 0);
}
function renderSellCart(){
  if(!sellCart.length) return '<div class="empty">ຍັງບໍ່ມີລາຍການ</div>';
  return sellCart.map((it,idx)=> `
    <div class="cart-item">
      <span>${it.model_name}${it.variant_note?(' · '+it.variant_note):(' × '+it.quantity)}</span>
      <span>${fmtMoney(it.amount)} <span class="x" data-idx="${idx}">✕</span></span>
    </div>`).join('');
}
function bindSellCartRemove(){
  document.querySelectorAll('#s_cartList .x').forEach(el=>{
    el.addEventListener('click', ()=>{
      sellCart.splice(Number(el.dataset.idx),1);
      document.getElementById('s_cartList').innerHTML = renderSellCart();
      bindSellCartRemove();
      updateSellTotals();
    });
  });
}

/* ============================================================
   BRANCH TRANSFER (ໂອນສາຂາ) — ตัดสต๊อกไปสาขาอื่นอย่างเดียว ไม่มีรายรับ/ไม่ยุ่งกับเงิน
   ============================================================ */
let transferCart = [];
async function renderTransfer(main){

  main.innerHTML = `

      <div class="muted" style="font-size:12px;margin-bottom:8px;">ຟັງຊັນນີ້ຕັດສະຕັອກອອກຈາກສາຂານີ້ເທົ່ານັ້ນ ບໍ່ມີການອອກບິນ ບໍ່ຮັບເງິນ ບໍ່ກະທົບຍອດຂາຍ/ກຳໄລ</div>
      <label>ສາຂາປາຍທາງ</label>

      <label>ວັນທີ</label>
      <input id="tr_date" type="date" value="${todayStr()}">

      <select id="tr_model">
        <option value="">-- ເລືອກສິນຄ້າ --</option>
        ${models.map(m=> `<option value="${m.id}" data-serial="${m.has_serial}" data-unit="${m.unit||''}">${m.name}</option>`).join('')}
      </select>
      <div id="tr_qtyBlock">
        <label>ຈຳນວນ</label>
        <input id="tr_qty" type="number" value="1" min="1">
      </div>
      <div id="tr_serialBlock" style="display:none;">
        <label>ເລືອກເລກເຄື່ອງທີ່ຈະໂອນ (ເລືອກໄດ້ຫຼາຍລາຍການ)</label>
        <div id="tr_serialList" style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;background:var(--panel);"></div>
      </div>
      <label>ໝາຍເຫດ (ຖ້າມີ)</label>
      <input id="tr_note" placeholder="ເຊັ່ນ ຜູ້ຮັບຜິດຊອບຂົນສົ່ງ">
      <button class="btn secondary" id="tr_addItem" style="margin-top:10px;"><svg class="dv-icon"><use href="#i-box"></use></svg>ເພີ່ມເຂົ້າລາຍການ</button>
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-receipt"></use></svg>ລາຍການທີ່ຈະໂອນ</h3>
      <div id="tr_cartList">${renderTransferCart()}</div>
      <button class="btn" id="tr_submit"><svg class="dv-icon"><use href="#i-check-circle"></use></svg>ບັນທຶກໂອນສາຂາ (ຕັດສະຕັອກ)</button>
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-truck"></use></svg>ປະຫວັດການໂອນສາຂາ <span class="muted" style="font-weight:400;font-size:11px;">(ກົດເພື່ອເບິ່ງລາຍການ)</span></h3>
      <label>ເລືອກເດືອນ</label>
      <input type="month" id="tr_month" value="${historyMonth}">
      <div id="tr_history" style="margin-top:8px;"><div class="empty">ກຳລັງໂຫລດ...</div></div>
    </div>
  `;
  const modelSel = document.getElementById('tr_model');
  enableSearchableSelect(modelSel);
  async function refreshSerialList(){
    const opt = modelSel.selectedOptions[0];
    const listEl = document.getElementById('tr_serialList');
    if(!opt || !opt.value){ listEl.innerHTML = ''; return; }
    const units = await getInStockUnits(opt.value);
    const cartSerialIds = new Set(transferCart.filter(i=> i.model_id===opt.value && i.unit_id).map(i=> i.unit_id));
    const available = units.filter(u=> !cartSerialIds.has(u.id));
    listEl.innerHTML = available.length
      ? available.map(u=> `
        <div style="display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:1px solid var(--border);">
          <input type="checkbox" id="trchk_${u.id}" value="${u.id}" data-serial="${(u.serial_no||'').replace(/"/g,'&quot;')}" style="width:17px;height:17px;flex:none;margin:0;">
          <label for="trchk_${u.id}" style="display:inline-block;margin:0;font-size:14px;font-weight:600;color:var(--ink);">${u.serial_no || '(ບໍ່ມີເລກ)'}</label>
        </div>`).join('')
      : '<div class="empty">ບໍ່ມີເລກເຄື່ອງໃນສະຕັອກສາຂານີ້ (ຫຼືເລືອກໝົດແລ້ວ)</div>';
  }
  modelSel.addEventListener('change', async ()=>{
    const opt = modelSel.selectedOptions[0];
    if(!opt || !opt.value) return;
    const isSerial = opt.dataset.serial === 'true';
    document.getElementById('tr_qtyBlock').style.display = isSerial ? 'none' : 'block';
    document.getElementById('tr_serialBlock').style.display = isSerial ? 'block' : 'none';

  document.getElementById('tr_addItem').addEventListener('click', async ()=>{

    const isSerial = opt.dataset.serial === 'true';
    let addedCount = 0;
    if(isSerial){
      const checked = Array.from(document.querySelectorAll('#tr_serialList input:checked'));
      if(!checked.length){ toast('ເລືອກເລກເຄື່ອງຢ່າງໜ້ອຍ 1 ຕົວ'); return; }
      checked.forEach(cb=>{
        transferCart.push({ model_id: opt.value, model_name: opt.textContent, unit_id: cb.value, serial_no: cb.dataset.serial, quantity:1 });
      });
      addedCount = checked.length;
      await refreshSerialList();
    } else {
      const qty = Number(document.getElementById('tr_qty').value)||1;
      transferCart.push({ model_id: opt.value, model_name: opt.textContent, unit_id:null, serial_no:null, quantity: qty });
      addedCount = qty;
    }
    document.getElementById('tr_cartList').innerHTML = renderTransferCart();
    bindTransferCartRemove();
    toast(`ເພີ່ມ ${opt.textContent} ເຂົ້າລາຍການແລ້ວ`);
  });
  bindTransferCartRemove();
  document.getElementById('tr_month').addEventListener('change', (e)=>{
    main.dataset.trMonth = e.target.value;
    loadTransferHistory(e.target.value);
  });
  loadTransferHistory(historyMonth);
  /* Enter ในแต่ละช่อง = ไล่ลงช่องถัดไปตามลำดับจริงในฟอร์ม (จำนวน/ไม่มีเลขเครื่อง → หมายเหตุ) พอถึงช่องสุดท้ายค่อยเพิ่มเข้ารายการ แล้วโฟกัสไปที่ปุ่ม "บันทึกโอນสาขา" ให้พร้อมกด Enter อีกครั้งเพื่อบันทึกเลย */
  function getTransferFieldChain(){
    const serialBlock = document.getElementById('tr_serialBlock');
    const isSerialVisible = serialBlock && serialBlock.style.display !== 'none';
    const chain = [];
    if(!isSerialVisible) chain.push('tr_qty');
    chain.push('tr_note');
    return chain;
  }
  function focusTransferField(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.focus();
    if(el.select) el.select();
  }
  function handleTransferFieldEnter(currentId){
    const chain = getTransferFieldChain();
    const idx = chain.indexOf(currentId);
    if(idx === -1) return;
    if(idx < chain.length - 1){
      focusTransferField(chain[idx+1]);
    } else {
      document.getElementById('tr_addItem').click();
      /* หน่วงการโฟกัสไปช่วงถัดไปด้วย setTimeout เพื่อไม่ให้คีย์ Enter ตัวเดียวกันไปกระตุ้น click ที่ปุ่มบันทึกซ้ำอีกที (ถ้าโฟกัสปุ่มทันทีในอีเวนต์เดียวกัน บางเบราว์เซอร์จะยิง click ซ้ำตอนปล่อยคีย์) */
      setTimeout(()=>{
        const submitBtn = document.getElementById('tr_submit');
        if(submitBtn) submitBtn.focus();
      }, 0);
    }
  }
  ['tr_qty','tr_note'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ e.preventDefault(); handleTransferFieldEnter(id); }
    });
  });
  bindEnterAdvance(['tr_branch','tr_date'], 'tr_model_search');
  document.getElementById('tr_submit').addEventListener('click', async (e)=>{
    if(!transferCart.length){ toast('ຍັງບໍ່ມີລາຍການ'); return; }
    const branch = document.getElementById('tr_branch').value.trim();
    if(!branch){ toast('ໃສ່ຊື່ສາຂາປາຍທາງກ່ອນ'); return; }
    const btn = e.currentTarget;
    if(btn.disabled) return;
    btn.disabled = true;
    try{
      const note = document.getElementById('tr_note').value.trim();
      const fullNote = `ໂອນໄປ: ${branch}${note ? ' - '+note : ''}`;
      const transferId = uid();
      /* ບັນທຶກທັງໝົດເປັນຊຸດດຽວ (bulk) ແທນທີລະລາຍການ ໃຫ້ໄວຂຶ້ນ */
      const movementsBody = transferCart.map(item=> ({
        id: uid(), model_id: item.model_id, unit_id: item.unit_id, movement_type:'out',
        quantity: item.quantity, ref_type:'transfer', ref_id: transferId, note: fullNote, created_by: currentUsername
      }));
      const transferredUnitIds = transferCart.filter(item=> item.unit_id).map(item=> item.unit_id);
      await Promise.all([
        sb('stock_movements', { method:'POST', body: movementsBody }),
        transferredUnitIds.length ? sb(`stock_product_units?id=in.(${transferredUnitIds.join(',')})`, { method:'PATCH', body:{ status:'transferred', note: fullNote } }) : Promise.resolve()
      ]);
      toast(`ໂອນສາຂາສຳເລັດ · ${transferCart.length} ລາຍການ`);
      transferCart = [];
      renderTab();
    }catch(err){ toast('ຜິດພາດ: '+err.message); btn.disabled = false; }
  });
}
function renderTransferCart(){
  if(!transferCart.length) return '<div class="empty">ຍັງບໍ່ມີລາຍການ</div>';
  return transferCart.map((it,idx)=> `
    <div class="cart-item">
      <span>${it.model_name}${it.serial_no ? (' · <span class="mono">'+it.serial_no+'</span>') : (' × '+it.quantity)}</span>
      <span class="x" data-idx="${idx}">✕</span>
    </div>`).join('');
}
function bindTransferCartRemove(){
  document.querySelectorAll('#tr_cartList .x').forEach(el=>{
    el.addEventListener('click', ()=>{
      transferCart.splice(Number(el.dataset.idx),1);
      document.getElementById('tr_cartList').innerHTML = renderTransferCart();
      bindTransferCartRemove();
    });
  });
}
async function loadTransferHistory(month){
  const el = document.getElementById('tr_history');
  if(!el) return;
  const isAdmin = currentRole === 'admin';
  try{
    const start = month + '-01';
    const endDate = new Date(start); endDate.setMonth(endDate.getMonth()+1);
    const end = endDate.toISOString().slice(0,10);
    const rows = await sb(`stock_movements?select=*,stock_product_models(name,unit),stock_product_units(serial_no)&ref_type=eq.transfer&created_at=gte.${start}&created_at=lt.${end}&order=created_at.desc`);
    const groups = {};
    rows.forEach(r=>{
      const key = r.ref_id || r.id;
      if(!groups[key]) groups[key] = { key, note: r.note, date: r.created_at, items: [] };
      groups[key].items.push(r);
    });
    const groupList = Object.values(groups);
    el.innerHTML = `
      ${isAdmin && groupList.length ? `
        <div class="row" style="padding:6px 0;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);margin:0;">
            <input type="checkbox" id="tr_selectAll" style="width:17px;height:17px;margin:0;">ເລືອກທັງໝົດ
          </label>
          <button class="btn danger" id="tr_deleteSelected" style="display:none;padding:6px 12px;font-size:12px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>ລົບທີ່ເລືອກ (<span id="tr_selectedCount">0</span>)</button>
        </div>
      ` : ''}
      ${groupList.length ? groupList.map(g=> `
      <div class="row clickable" data-trgroup="${g.key}">
        <span style="display:flex;align-items:center;gap:10px;">
          ${isAdmin ? `<input type="checkbox" class="tr-check" value="${g.key}" style="width:17px;height:17px;flex:none;margin:0;" onclick="event.stopPropagation()">` : ''}
          <span>
            <div>${g.note || 'ໂອນສາຂາ'}</div>
            <div class="muted" style="font-size:11px;">${fmtDateDMY((g.date||'').slice(0,10))} · ${g.items.length} ລາຍການ</div>
          </span>
        </span>
      </div>`).join('') : '<div class="empty">ບໍ່ມີການໂອນສາຂາໃນເດືອນນີ້</div>'}`;
    el.querySelectorAll('.row[data-trgroup]').forEach(row=>{
      row.addEventListener('click', (e)=>{
        if(e.target.closest('.tr-check')) return;
        openTransferDetail(groups[row.dataset.trgroup]);
      });
    });
    if(isAdmin && groupList.length){
      const selectAllEl = document.getElementById('tr_selectAll');
      const deleteBtn = document.getElementById('tr_deleteSelected');
      const countEl = document.getElementById('tr_selectedCount');
      const checks = ()=> Array.from(el.querySelectorAll('.tr-check'));
      function refreshSelection(){
        const selected = checks().filter(c=> c.checked);
        countEl.textContent = selected.length;
        deleteBtn.style.display = selected.length ? 'inline-flex' : 'none';
        selectAllEl.checked = selected.length === checks().length;
      }
      selectAllEl.addEventListener('change', ()=>{
        checks().forEach(c=> c.checked = selectAllEl.checked);
        refreshSelection();
      });
      checks().forEach(c=> c.addEventListener('change', refreshSelection));
      deleteBtn.addEventListener('click', async ()=>{
        const keys = checks().filter(c=> c.checked).map(c=> c.value);
        if(!keys.length) return;
        if(!confirm(`ລົບການໂອນສາຂາ ${keys.length} ລາຍການທີ່ເລືອກ? ສະຕັອກຈະຖືກຄືນ ແລະ ຈະລົບຖາວອນ (ກູ້ຄືນບໍ່ໄດ້)`)) return;
        if(deleteBtn.disabled) return;
        deleteBtn.disabled = true;
        try{
          await bulkVoidTransferGroups(keys.map(k=> groups[k]));
          toast(`ລົບການໂອນສາຂາສຳເລັດ ${keys.length} ລາຍການ ຄືນສະຕັອກແລ້ວ`);
          renderTab();
        }catch(err){
          toast('ລົບບໍ່ໄດ້: '+err.message);
          deleteBtn.disabled = false;
        }
      });
    }
  }catch(err){
    el.innerHTML = `<div class="empty">ຜິດພາດ: ${err.message}</div>`;
  }
}

/* ລົບການໂອນສາຂາ: ຄືນສະຕັອກ (ເຄື່ອງທີ່ມີເລກເຄື່ອງກັບເປັນ in_stock) ແລ້ວລົບ movement ທັງໝົດຂອງການໂອນຄັ້ງນີ້ */
async function voidTransfer(group){
  const unitIds = group.items.filter(it=> it.unit_id).map(it=> it.unit_id);
  const movementIds = group.items.map(it=> it.id);
  await Promise.all([
    unitIds.length ? sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'PATCH', body:{ status:'in_stock', note: null } }) : Promise.resolve(),
    movementIds.length ? sb(`stock_movements?id=in.(${movementIds.join(',')})`, { method:'DELETE' }) : Promise.resolve()
  ]);
}
/* ລົບການໂອນສາຂາຫຼາຍລາຍການພ້ອມກັນ ດ້ວຍ 2 request ລວມ (ຂໍ້ມູນ items ມີຢູ່ໃນໜ້າຈໍແລ້ວ ບໍ່ຕ້ອງໄປດຶງໃໝ່) ໄວກວ່າການລົບເທື່ອລະລາຍການຫຼາຍ */
async function bulkVoidTransferGroups(groupsArr){
  const allItems = groupsArr.flatMap(g=> g.items);
  const unitIds = [...new Set(allItems.filter(it=> it.unit_id).map(it=> it.unit_id))];
  const movementIds = allItems.map(it=> it.id);
  await Promise.all([
    unitIds.length ? sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'PATCH', body:{ status:'in_stock', note: null } }) : Promise.resolve(),
    movementIds.length ? sb(`stock_movements?id=in.(${movementIds.join(',')})`, { method:'DELETE' }) : Promise.resolve()
  ]);
}

        renderTab();
      }catch(err){
        toast('ລົບບໍ່ໄດ້: ອາດມີບິນໃດໜຶ່ງທີ່ເລືອກມີບັນຫາ — ລອງເລືອກຊ້ຳໃໝ່');
        deleteBtn.disabled = false;
      }
    });
  }
}
function statusTag(inv){
  if(inv.payment_status === 'paid') return '· <span style="color:var(--ok);font-weight:600;">ຈ່າຍຄົບ</span>';
  const remain = Number(inv.total_amount||0) - Number(inv.paid_amount||0);
  if(inv.payment_status === 'partial') return `· <span class="gold">ຄ້າງ ${fmtMoney(remain)}</span>`;
  return `· <span style="color:var(--danger);font-weight:600;">ຍັງບໍ່ຈ່າຍ</span>`;
}

async function getInvoiceItems(invoiceId){
  return await sb(`sales_invoice_items?select=*,stock_product_models(name,unit,cost_price,cost_price_thb),stock_product_units(cost_lak)&invoice_id=eq.${invoiceId}`);
}
async function getInvoicePayments(invoiceId){
  return await sb(`sales_payments?select=*&invoice_id=eq.${invoiceId}&order=payment_date.asc`);
}

async function openInvoiceDetail(invoiceId, inv){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal"><div class="empty">ກຳລັງໂຫລດ...</div></div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', (e)=>{ if(e.target === bg) bg.remove(); });
  await refreshInvoiceDetail(bg, invoiceId, inv);
}

async function refreshInvoiceDetail(bg, invoiceId, inv){
  try{
    const [items, payments] = await Promise.all([getInvoiceItems(invoiceId), getInvoicePayments(invoiceId)]);
    const remain = Number(inv.total_amount||0) - Number(inv.paid_amount||0);
    const invCurrency = inv.currency || 'LAK';
    const { profit: itemProfit, unknownCostCount } = computeInvoiceItemProfit(items, invCurrency);
    const profitByPaid = splitByPaidCurrency(itemProfit, invCurrency, Number(inv.total_amount||0), payments);
    const paidCurrencies = [...new Set(payments.map(p=> p.currency || invCurrency))].filter(c=> c !== invCurrency);
    const discount = Number(inv.discount_amount||0);
    const subtotal = Number(inv.total_amount||0) + discount;
    const address = [inv.village, inv.district, inv.province].filter(Boolean).join(' · ');
    bg.querySelector('.modal').innerHTML = `
      <div class="doc-card">
        <div class="doc-head">
          <div class="doc-head-row">
            <div class="doc-brand">
              <div class="seal-mark"><svg class="dv-icon"><use href="#i-gear"></use></svg></div>
              <div class="doc-brand-name">DAVONE SHOP</div>
            </div>
            <div class="doc-head-title">
              <h3><svg class="dv-icon"><use href="#i-receipt"></use></svg><span class="mono">${inv.invoice_no || 'ບິນຂາຍ'}</span></h3>
            </div>
          </div>
          <div class="doc-head-meta">
            <span class="doc-tag">${invCurrency}</span>
            ${paidCurrencies.map(c=> `<span class="doc-tag solid">ຮັບຈິງ: ${c==='THB'?'ບາດ':'ກີບ'}</span>`).join('')}
            <span class="doc-tag solid">${fmtDateDMY(inv.invoice_date)}</span>
            <span class="doc-tag solid">${statusTag(inv)}</span>
          </div>
        </div>
        <div class="doc-body">
          <div class="doc-box">
            <div class="doc-avatar"><svg class="dv-icon"><use href="#i-users"></use></svg></div>
            <div class="doc-box-info">
              <div style="font-size:17px;font-weight:700;color:var(--ink);line-height:1.3;">${inv.customer_name || '-'}</div>
              ${inv.customer_phone ? `<div class="doc-line"><svg class="dv-icon"><use href="#i-phone"></use></svg>${inv.customer_phone}</div>` : ''}
              ${address ? `<div class="doc-line"><svg class="dv-icon"><use href="#i-pin"></use></svg>${address}</div>` : ''}
            </div>
          </div>
          <div class="doc-section-label">ລາຍການສິນຄ້າ</div>
          <div class="doc-table-head"><span>ລາຍການ</span><span>ຈຳນວນເງິນ</span></div>
          <div class="doc-table-body">
            ${items.length ? items.map(it=> `
              <div class="row">
                <span>${it.stock_product_models ? it.stock_product_models.name : '-'}${it.variant_note ? (' · <span class="mono">'+it.variant_note+'</span>') : (' × '+it.quantity)}</span>
                <span class="mono">${fmtMoney(it.amount)}</span>
              </div>`).join('') : '<div class="empty">ບໍ່ມີລາຍລະອຽດ</div>'}
            <div class="row"><span class="muted">ລວມຍ່ອຍ</span><span class="mono muted">${fmtMoney(subtotal)}</span></div>
            ${discount > 0 ? `<div class="row"><span class="muted">ຫຼຸດລາຄາ</span><span class="mono muted">-${fmtMoney(discount)}</span></div>` : ''}
          </div>
          <div class="doc-total-band mono"><span style="font-family:var(--font-body);font-weight:600;">ລວມ</span><span>${fmtMoney(inv.total_amount)}</span></div>
          ${currentRole==='admin' ? `<div class="row" style="font-size:12px;"><span class="gold">ກຳໄລບິນນີ້ (ແອດມິນ)${unknownCostCount ? ' *' : ''}</span><span class="gold mono">${fmtByCurrency(profitByPaid)}</span></div>` : ''}
          ${currentRole==='admin' && unknownCostCount ? `<div class="muted" style="font-size:11px;margin-top:-4px;">* ບໍ່ນັບລວມ ${unknownCostCount} ລາຍການທີ່ຍັງບໍ່ໄດ້ຕັ້ງຕົ້ນທຶນສະກຸນບາດໄວ້ (ໄປຕັ້ງທີ່ໜ້າສິນຄ້າ)</div>` : ''}
          <hr class="sep">
          <div class="doc-section-label">ການຈ່າຍເງິນ</div>
          ${payments.length ? payments.map(p=> `
            <div class="row" style="font-size:12px;">
              <span>${p.method==='cash'?'ເງິນສົດ':'ໂອນ'} · ${p.currency||inv.currency||'LAK'} · ${fmtDateDMY(p.payment_date)}</span>
              <span class="mono">${fmtMoney(p.amount)}${p.exchange_rate ? ' <span class="muted" style="font-size:11px;">(@'+p.exchange_rate+')</span>' : ''}</span>
            </div>`).join('') : '<div class="empty">ຍັງບໍ່ມີການຈ່າຍບັນທຶກໄວ້</div>'}
        </div>
        <div class="doc-footer">ຂອບໃຈທີ່ໃຊ້ບໍລິການ · DAVONE SHOP</div>
      </div>
      ${remain > 0 ? `
        <div class="row" style="font-size:12px;"><span class="gold">ຍັງຄ້າງ (${inv.currency||'LAK'})</span><span class="gold mono">${fmtMoney(remain)}</span></div>
        <hr class="sep">
        <div class="muted" style="font-size:12px;margin-bottom:4px;">ຮັບຊຳລະເພີ່ມ ​· ຮັບໄດ້ທັງກີບ ຫຼື ບາດ</div>
        <div class="grid2">
          <select id="pay_method">
            <option value="cash">ເງິນສົດ</option>
            <option value="transfer">ໂອນ</option>
          </select>
          <select id="pay_currency">
            <option value="LAK">ກີບ (LAK)</option>
            <option value="THB">ບາດ (THB)</option>
          </select>
        </div>
        <input id="pay_amount" type="text" placeholder="ຈຳນວນ" style="margin-top:8px;">
        <div id="pay_rateBlock" style="display:none;">
          <label>ອັດຕາແລກປ່ຽນມື້ນີ້ (1 ບາດ = ? ກີບ)</label>
          <input id="pay_rate" type="text" placeholder="ເຊັ່ນ 620">
        </div>
        <button class="btn secondary" id="pay_submit"><svg class="dv-icon"><use href="#i-wallet"></use></svg>ບັນທຶກການຈ່າຍ</button>
      ` : ''}
      ${currentRole==='admin' ? `<button class="btn danger" id="invDeleteBtn" style="margin-top:16px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>ລົບບິນນີ້ (ຄືນສະຕັອກ)</button>` : ''}
      <button class="btn ${remain>0?'secondary':''}" id="invDetailClose">ປິດ</button>
    `;
    if(remain > 0){
      attachMoneyInput('pay_amount', '');
      bindEnterKey(['pay_amount'], 'pay_submit');
      const invCurrency = inv.currency || 'LAK';
      document.getElementById('pay_currency').value = invCurrency;
      document.getElementById('pay_currency').addEventListener('change', ()=>{
        document.getElementById('pay_rateBlock').style.display =
          document.getElementById('pay_currency').value !== invCurrency ? 'block' : 'none';
      });
      bg.querySelector('#pay_submit').addEventListener('click', async ()=>{
        const amt = moneyValue('pay_amount');
        if(!amt){ toast('ໃສ່ຈຳນວນເງິນ'); return; }
        const payCurrency = document.getElementById('pay_currency').value;
        let rate = null, convertedAmt = amt;
        if(payCurrency !== invCurrency){
          rate = Number((document.getElementById('pay_rate').value||'').replace(/,/g,''));
          if(!rate){ toast('ໃສ່ອັດຕາແລກປ່ຽນເພື່ອກວດຍອດຊຳລະ'); return; }
          /* rate = 1 THB ເປັນຈຳນວນກີບ ສະເໝີ, ໃຊ້ແປງໃຫ້ຢູ່ໃນສະກຸນຂອງບິນເພື່ອກວດຍອດຄ້າງເທົ່ານັ້ນ (ຈຳນວນທີ່ຮັບແທ້ໆເກັບໄວ້ຄືເດີມ) */
          convertedAmt = invCurrency === 'LAK' ? amt * rate : amt / rate;
        }
        try{
          await sb('sales_payments', { method:'POST', body:{
            id: uid(), invoice_id: invoiceId, payment_date: todayStr(),
            method: bg.querySelector('#pay_method').value, currency: payCurrency,
            amount: amt, exchange_rate: rate, converted_amount: convertedAmt, created_by: currentUsername
          }});
          const newPaid = Number(inv.paid_amount||0) + convertedAmt;
          const newStatus = newPaid >= Number(inv.total_amount||0) ? 'paid' : 'partial';
          await sb(`sales_invoices?id=eq.${invoiceId}`, { method:'PATCH', body:{ paid_amount: newPaid, payment_status: newStatus } });
          inv.paid_amount = newPaid;
          inv.payment_status = newStatus;
          toast('ບັນທຶກການຈ່າຍສຳເລັດ');
          await refreshInvoiceDetail(bg, invoiceId, inv);
          renderTab();
        }catch(err){ toast('ຜິດພາດ: '+err.message); }
      });
    }
    if(currentRole==='admin'){
      bg.querySelector('#invDeleteBtn').addEventListener('click', async ()=>{
        if(!confirm(`ລົບບິນ ${inv.invoice_no || ''} ? ສະຕັອກທີ່ຫັກໄປຈະຄືນທັງໝົດ ແລະ ຈະລົບຖາວອນ (ກູ້ຄືນບໍ່ໄດ້)`)) return;
        try{
          await voidInvoice(invoiceId, items);
          toast('ລົບບິນສຳເລັດ ຄືນສະຕັອກແລ້ວ');
          bg.remove();
          renderTab();
        }catch(err){ toast('ຜິດພາດ: '+err.message); }
      });
    }
    bg.querySelector('#invDetailClose').addEventListener('click', ()=> bg.remove());
  }catch(err){
    bg.querySelector('.modal').innerHTML = `<div class="empty">ຜິດພາດ: ${err.message}</div><button class="btn secondary" id="invDetailClose2">ປິດ</button>`;
    bg.querySelector('#invDetailClose2').addEventListener('click', ()=> bg.remove());
  }
}

/* ລົບບິນຂາຍ: ຄືນສະຕັອກທັງໝົດ (ເຄື່ອງທີ່ມີເລກເຄື່ອງກັບເປັນ in_stock, ລົບ movement ຂາອອກ) ແລ້ວຄ່ອຍລົບບິນ (cascade ລົບ items/payments ໃຫ້ອັດຕະໂນມັດ) */
async function voidInvoice(invoiceId, items){
  await Promise.all(items.map(it=>{
    if(it.unit_id){
      return sb(`stock_product_units?id=eq.${it.unit_id}`, { method:'PATCH', body:{ status:'in_stock', sold_at:null } });
    }
    return Promise.resolve();
  }));
  await sb(`stock_movements?ref_type=eq.sale&ref_id=eq.${invoiceId}`, { method:'DELETE' });
  await sb(`sales_invoices?id=eq.${invoiceId}`, { method:'DELETE' });
}
/* ລົບບິນຂາຍຫຼາຍໃບພ້ອມກັນ ດ້ວຍ 3 request ລວມ (ບໍ່ວ່າຈະເລືອກຈັກໃບ) ແທນທີ່ຈະດຶງ/ລົບເທື່ອລະໃບ ໄວກວ່າຫຼາຍເມື່ອເລືອກຫຼາຍໆໃບ */
async function bulkVoidInvoices(ids){
  const idList = ids.join(',');
  const items = await sb(`sales_invoice_items?select=unit_id&invoice_id=in.(${idList})`);
  const unitIds = [...new Set(items.filter(it=> it.unit_id).map(it=> it.unit_id))];
  await Promise.all([
    unitIds.length ? sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'PATCH', body:{ status:'in_stock', sold_at:null } }) : Promise.resolve(),
    sb(`stock_movements?ref_type=eq.sale&ref_id=in.(${idList})`, { method:'DELETE' })
  ]);
  await sb(`sales_invoices?id=in.(${idList})`, { method:'DELETE' });
}

/* ============================================================
   INIT
   ============================================================ */
const savedSession = sessionStorage.getItem('dv_stock_session');
if(savedSession){
  try{
    const s = JSON.parse(savedSession);
    currentRole = s.role; currentUsername = s.username; currentUserFullName = s.name;
    enterApp();
  }catch(e){ sessionStorage.removeItem('dv_stock_session'); }
}
</script>
