async function loadTransferHistory(month){
  const el = document.getElementById('tr_history');
  if(!el) return;
  const isAdmin = currentRole === 'admin';
  try{
    const start = month + '-01';
    const endDate = new Date(start); endDate.setMonth(endDate.getMonth()+1);
    const end = endDate.toISOString().slice(0,10);
    const rows = await sb(`stock_movements?select=*,stock_product_models(name,unit),stock_product_units(serial_no)&ref_type=eq.transfer&created_at=gte.${start}&created_at=lt.${end}&order=created_at.desc`);
    const groups = {};
    rows.forEach(r=>{
      const key = r.ref_id || r.id;
      if(!groups[key]) groups[key] = { key, note: r.note, date: r.created_at, items: [] };
      groups[key].items.push(r);
    });
    const groupList = Object.values(groups);
    el.innerHTML = `
      ${isAdmin && groupList.length ? `
        <div class="row" style="padding:6px 0;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);margin:0;">
            <input type="checkbox" id="tr_selectAll" style="width:17px;height:17px;margin:0;">а»ҖаәҘаә·аәӯаәҒаә—аәұаәҮа»қаә»аә”
          </label>
          <button class="btn danger" id="tr_deleteSelected" style="display:none;padding:6px 12px;font-size:12px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>аәҘаә»аәҡаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ (<span id="tr_selectedCount">0</span>)</button>
        </div>
      ` : ''}
      ${groupList.length ? groupList.map(g=> `
      <div class="row clickable" data-trgroup="${g.key}">
        <span style="display:flex;align-items:center;gap:10px;">
          ${isAdmin ? `<input type="checkbox" class="tr-check" value="${g.key}" style="width:17px;height:17px;flex:none;margin:0;" onclick="event.stopPropagation()">` : ''}
          <span>
            <div>${g.note || 'а»ӮаәӯаәҷаәӘаәІаәӮаәІ'}</div>
            <div class="muted" style="font-size:11px;">${fmtDateDMY((g.date||'').slice(0,10))} В· ${g.items.length} аәҘаәІаәҚаәҒаәІаәҷ</div>
          </span>
        </span>
      </div>`).join('') : '<div class="empty">аәҡа»Қа»ҲаәЎаәөаәҒаәІаәҷа»ӮаәӯаәҷаәӘаәІаәӮаәІа»ғаәҷа»Җаә”аә·аәӯаәҷаәҷаәөа»ү</div>'}`;
    el.querySelectorAll('.row[data-trgroup]').forEach(row=>{
      row.addEventListener('click', (e)=>{
        if(e.target.closest('.tr-check')) return;
        openTransferDetail(groups[row.dataset.trgroup]);
      });
    });
    if(isAdmin && groupList.length){
      const selectAllEl = document.getElementById('tr_selectAll');
      const deleteBtn = document.getElementById('tr_deleteSelected');
      const countEl = document.getElementById('tr_selectedCount');
      const checks = ()=> Array.from(el.querySelectorAll('.tr-check'));
      function refreshSelection(){
        const selected = checks().filter(c=> c.checked);
        countEl.textContent = selected.length;
        deleteBtn.style.display = selected.length ? 'inline-flex' : 'none';
        selectAllEl.checked = selected.length === checks().length;
      }
      selectAllEl.addEventListener('change', ()=>{
        checks().forEach(c=> c.checked = selectAllEl.checked);
        refreshSelection();
      });
      checks().forEach(c=> c.addEventListener('change', refreshSelection));
      deleteBtn.addEventListener('click', async ()=>{
        const keys = checks().filter(c=> c.checked).map(c=> c.value);
        if(!keys.length) return;
        if(!confirm(`аәҘаә»аәҡаәҒаәІаәҷа»ӮаәӯаәҷаәӘаәІаәӮаәІ ${keys.length} аәҘаәІаәҚаәҒаәІаәҷаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ? аәӘаә°аә•аәұаәӯаәҒаәҲаә°аә–аә·аәҒаә„аә·аәҷ а»ҒаәҘаә° аәҲаә°аәҘаә»аәҡаә–аәІаә§аәӯаәҷ (аәҒаә№а»үаә„аә·аәҷаәҡа»Қа»Ҳа»„аә”а»ү)`)) return;
        if(deleteBtn.disabled) return;
        deleteBtn.disabled = true;
        try{
          await bulkVoidTransferGroups(keys.map(k=> groups[k]));
          toast(`аәҘаә»аәҡаәҒаәІаәҷа»ӮаәӯаәҷаәӘаәІаәӮаәІаәӘаәіа»ҖаәҘаәұаә” ${keys.length} аәҘаәІаәҚаәҒаәІаәҷ аә„аә·аәҷаәӘаә°аә•аәұаәӯаәҒа»ҒаәҘа»үаә§`);
          renderTab();
        }catch(err){
          toast('аәҘаә»аәҡаәҡа»Қа»Ҳа»„аә”а»ү: '+err.message);
          deleteBtn.disabled = false;
        }
      });
    }
  }catch(err){
    el.innerHTML = `<div class="empty">аәңаәҙаә”аәһаәІаә”: ${err.message}</div>`;
  }
}

/* аәҘаә»аәҡаәҒаәІаәҷа»ӮаәӯаәҷаәӘаәІаәӮаәІ: аә„аә·аәҷаәӘаә°аә•аәұаәӯаәҒ (а»Җаә„аә·а»ҲаәӯаәҮаә—аәөа»ҲаәЎаәөа»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәҒаәұаәҡа»Җаәӣаәұаәҷ in_stock) а»ҒаәҘа»үаә§аәҘаә»аәҡ movement аә—аәұаәҮа»қаә»аә”аәӮаәӯаәҮаәҒаәІаәҷа»Ӯаәӯаәҷаә„аәұа»үаәҮаәҷаәөа»ү */
async function voidTransfer(group){
  const unitIds = group.items.filter(it=> it.unit_id).map(it=> it.unit_id);
  const movementIds = group.items.map(it=> it.id);
  await Promise.all([
    unitIds.length ? sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'PATCH', body:{ status:'in_stock', note: null } }) : Promise.resolve(),
    movementIds.length ? sb(`stock_movements?id=in.(${movementIds.join(',')})`, { method:'DELETE' }) : Promise.resolve()
  ]);
}
/* аәҘаә»аәҡаәҒаәІаәҷа»ӮаәӯаәҷаәӘаәІаәӮаәІаә«аәјаәІаәҚаәҘаәІаәҚаәҒаәІаәҷаәһа»үаәӯаәЎаәҒаәұаәҷ аә”а»үаә§аәҚ 2 request аәҘаә§аәЎ (аәӮа»Қа»үаәЎаә№аәҷ items аәЎаәөаәўаә№а»Ҳа»ғаәҷа»ңа»үаәІаәҲа»Қа»ҒаәҘа»үаә§ аәҡа»Қа»Ҳаә•а»үаәӯаәҮа»„аәӣаә”аә¶аәҮа»ға»қа»Ҳ) а»„аә§аәҒаә§а»ҲаәІаәҒаәІаәҷаәҘаә»аәҡа»Җаә—аә·а»ҲаәӯаәҘаә°аәҘаәІаәҚаәҒаәІаәҷаә«аәјаәІаәҚ */
async function bulkVoidTransferGroups(groupsArr){
  const allItems = groupsArr.flatMap(g=> g.items);
  const unitIds = [...new Set(allItems.filter(it=> it.unit_id).map(it=> it.unit_id))];
  const movementIds = allItems.map(it=> it.id);
  await Promise.all([
    unitIds.length ? sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'PATCH', body:{ status:'in_stock', note: null } }) : Promise.resolve(),
    movementIds.length ? sb(`stock_movements?id=in.(${movementIds.join(',')})`, { method:'DELETE' }) : Promise.resolve()
  ]);
}

async function renderReport(main){
  const month = (main.dataset.month) || todayStr().slice(0,7);
  const start = month + '-01';
  const endDate = new Date(start); endDate.setMonth(endDate.getMonth()+1);
  const end = endDate.toISOString().slice(0,10);

  const invoices = await sb(`sales_invoices?select=*&invoice_date=gte.${start}&invoice_date=lt.${end}&status=eq.confirmed&order=invoice_date.desc`);
  const { perInvoice: receivedByInvoice, total: totalByCur } = await getReceivedByInvoice(invoices);
  const outstandingInv = invoices.filter(r=> r.payment_status==='partial' || r.payment_status==='unpaid' || r.payment_status==='credit');
  const outstandingByCur = {};
  outstandingInv.forEach(r=>{
    const c = r.currency || 'LAK';
    outstandingByCur[c] = (outstandingByCur[c]||0) + (Number(r.total_amount||0) - Number(r.paid_amount||0));
  });
  const outstanding = Object.values(outstandingByCur).reduce((s,v)=>s+v,0);
  const profitByCur = currentRole === 'admin' ? await getPeriodProfit(start, end) : null;

  main.innerHTML = `
    <div class="card">
      <label>а»ҖаәҘаә·аәӯаәҒа»Җаә”аә·аәӯаәҷ</label>
      <input type="month" id="rep_month" value="${month}">

    <div class="stats-row">
      <div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(totalByCur)}</div><div class="lbl">аәҚаәӯаә”аәӮаәІаәҚаәҘаә§аәЎ</div></div>

      ${profitByCur !== null ? `<div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(profitByCur)}</div><div class="lbl">аәҒаәіа»„аәҘ (а»Ғаәӯаә”аәЎаәҙаәҷ)</div></div>` : ''}
    </div>
    ${outstanding > 0 ? `<div class="card"><div class="row"><span>аә„а»үаәІаәҮаәҠаәіаәҘаә°аәҘаә§аәЎ</span><span class="gold mono">${fmtByCurrency(outstandingByCur)}</span></div></div>` : ''}
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-chart"></use></svg>аәҡаәҙаәҷаәӮаәІаәҚа»ғаәҷа»Җаә”аә·аәӯаәҷаәҷаәөа»ү <span class="muted" style="font-weight:400;font-size:11px;">(аәҒаә»аә”а»Җаәһаә·а»Ҳаәӯа»Җаәҡаәҙа»ҲаәҮаәҘаәІаәҚаәҒаәІаәҷ)</span></h3>
      ${currentRole==='admin' && invoices.length ? `
        <div class="row" style="padding:6px 0;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);margin:0;">
            <input type="checkbox" id="inv_selectAll" style="width:17px;height:17px;margin:0;">а»ҖаәҘаә·аәӯаәҒаә—аәұаәҮа»қаә»аә”
          </label>
          <button class="btn danger" id="inv_deleteSelected" style="display:none;padding:6px 12px;font-size:12px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>аәҘаә»аәҡаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ (<span id="inv_selectedCount">0</span>)</button>
        </div>
      ` : ''}
      ${invoices.length ? invoices.map(inv=> `
        <div class="row clickable" data-inv="${inv.id}">
          <span style="display:flex;align-items:center;gap:10px;">
            ${currentRole==='admin' ? `<input type="checkbox" class="inv-check" value="${inv.id}" style="width:17px;height:17px;flex:none;margin:0;" onclick="event.stopPropagation()">` : ''}
            <span>
              <div class="mono">${inv.invoice_no || '-'} <span style="font-family:var(--font-body);">${inv.customer_name ? 'В· '+inv.customer_name : ''}</span></div>
              <div class="muted" style="font-size:11px;">${fmtDateDMY(inv.invoice_date)} В· ${inv.currency||'LAK'} ${statusTag(inv)}</div>
            </span>
          </span>
          <span class="gold mono">${fmtByCurrency(receivedByInvoice[inv.id] || {})}</span>
        </div>`).join('') : '<div class="empty">аәҡа»Қа»ҲаәЎаәөаәҡаәҙаәҷаәӮаәІаәҚа»ғаәҷа»Җаә”аә·аәӯаәҷаәҷаәөа»ү</div>'}
    </div>
  `;
  document.getElementById('rep_month').addEventListener('change', (e)=>{
    main.dataset.month = e.target.value;
    renderTab();
  });
  main.querySelectorAll('.row[data-inv]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('.inv-check')) return;
      openInvoiceDetail(el.dataset.inv, invoices.find(i=>i.id===el.dataset.inv));
    });
  });
  if(currentRole==='admin' && invoices.length){
    const selectAllEl = document.getElementById('inv_selectAll');
    const deleteBtn = document.getElementById('inv_deleteSelected');
    const countEl = document.getElementById('inv_selectedCount');
    const checks = ()=> Array.from(main.querySelectorAll('.inv-check'));
    function refreshSelection(){
      const selected = checks().filter(c=> c.checked);
      countEl.textContent = selected.length;
      deleteBtn.style.display = selected.length ? 'inline-flex' : 'none';
      selectAllEl.checked = selected.length === checks().length;
    }
    selectAllEl.addEventListener('change', ()=>{
      checks().forEach(c=> c.checked = selectAllEl.checked);
      refreshSelection();
    });
    checks().forEach(c=> c.addEventListener('change', refreshSelection));
    deleteBtn.addEventListener('click', async ()=>{
      const ids = checks().filter(c=> c.checked).map(c=> c.value);
      if(!ids.length) return;
      if(!confirm(`аәҘаә»аәҡаәҡаәҙаәҷаәӮаәІаәҚ ${ids.length} а»ғаәҡаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ? аәӘаә°аә•аәұаәӯаәҒаәҲаә°аә–аә·аәҒаә„аә·аәҷ а»ҒаәҘаә° аәҲаә°аәҘаә»аәҡаә–аәІаә§аәӯаәҷ (аәҒаә№а»үаә„аә·аәҷаәҡа»Қа»Ҳа»„аә”а»ү)`)) return;
      if(deleteBtn.disabled) return;
      deleteBtn.disabled = true;
      try{
        await bulkVoidInvoices(ids);
        toast(`аәҘаә»аәҡаәҡаәҙаәҷаәӮаәІаәҚаәӘаәіа»ҖаәҘаәұаә” ${ids.length} а»ғаәҡ аә„аә·аәҷаәӘаә°аә•аәұаәӯаәҒа»ҒаәҘа»үаә§`);
        renderTab();
      }catch(err){
        toast('аәҘаә»аәҡаәҡа»Қа»Ҳа»„аә”а»ү: аәӯаәІаә”аәЎаәөаәҡаәҙаәҷа»ғаә”а»ңаә¶а»ҲаәҮаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒаәЎаәөаәҡаәұаәҷаә«аәІ вҖ” аәҘаәӯаәҮа»ҖаәҘаә·аәӯаәҒаәҠа»үаәіа»ға»қа»Ҳ');
        deleteBtn.disabled = false;
      }
    });
  }
}
function statusTag(inv){
  if(inv.payment_status === 'paid') return 'В· <span style="color:var(--ok);font-weight:600;">аәҲа»ҲаәІаәҚаә„аә»аәҡ</span>';
  const remain = Number(inv.total_amount||0) - Number(inv.paid_amount||0);
  if(inv.payment_status === 'partial') return `В· <span class="gold">аә„а»үаәІаәҮ ${fmtMoney(remain)}</span>`;
  return `В· <span style="color:var(--danger);font-weight:600;">аәҚаәұаәҮаәҡа»Қа»ҲаәҲа»ҲаәІаәҚ</span>`;
}

async function getInvoiceItems(invoiceId){
  return await sb(`sales_invoice_items?select=*,stock_product_models(name,unit,cost_price,cost_price_thb),stock_product_units(cost_lak)&invoice_id=eq.${invoiceId}`);
}
async function getInvoicePayments(invoiceId){
  return await sb(`sales_payments?select=*&invoice_id=eq.${invoiceId}&order=payment_date.asc`);
}

async function openInvoiceDetail(invoiceId, inv){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal"><div class="empty">аәҒаәіаәҘаәұаәҮа»Ӯаә«аәҘаә”...</div></div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', (e)=>{ if(e.target === bg) bg.remove(); });
  await refreshInvoiceDetail(bg, invoiceId, inv);
}

    const paidCurrencies = [...new Set(payments.map(p=> p.currency || invCurrency))].filter(c=> c !== invCurrency);
    const discount = Number(inv.discount_amount||0);

            </div>

            <span class="doc-tag solid">${fmtDateDMY(inv.invoice_date)}</span>

              ${inv.customer_phone ? `<div class="doc-line"><svg class="dv-icon"><use href="#i-phone"></use></svg>${inv.customer_phone}</div>` : ''}
              ${address ? `<div class="doc-line"><svg class="dv-icon"><use href="#i-pin"></use></svg>${address}</div>` : ''}
            </div>
          </div>
          <div class="doc-section-label">аәҘаәІаәҚаәҒаәІаәҷаәӘаәҙаәҷаә„а»үаәІ</div>
          <div class="doc-table-head"><span>аәҘаәІаәҚаәҒаәІаәҷ</span><span>аәҲаәіаәҷаә§аәҷа»ҖаәҮаәҙаәҷ</span></div>
          <div class="doc-table-body">
            ${items.length ? items.map(it=> `
              <div class="row">
                <span>${it.stock_product_models ? it.stock_product_models.name : '-'}${it.variant_note ? (' В· <span class="mono">'+it.variant_note+'</span>') : (' Г— '+it.quantity)}</span>
                <span class="mono">${fmtMoney(it.amount)}</span>
              </div>`).join('') : '<div class="empty">аәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҘаә°аәӯаәҪаә”</div>'}
            <div class="row"><span class="muted">аәҘаә§аәЎаәҚа»ҲаәӯаәҚ</span><span class="mono muted">${fmtMoney(subtotal)}</span></div>
            ${discount > 0 ? `<div class="row"><span class="muted">аә«аәјаәёаә”аәҘаәІаә„аәІ</span><span class="mono muted">-${fmtMoney(discount)}</span></div>` : ''}
          </div>
          <div class="doc-total-band mono"><span style="font-family:var(--font-body);font-weight:600;">аәҘаә§аәЎ</span><span>${fmtMoney(inv.total_amount)}</span></div>
          ${currentRole==='admin' ? `<div class="row" style="font-size:12px;"><span class="gold">аәҒаәіа»„аәҘаәҡаәҙаәҷаәҷаәөа»ү (а»Ғаәӯаә”аәЎаәҙаәҷ)${unknownCostCount ? ' *' : ''}</span><span class="gold mono">${fmtByCurrency(profitByPaid)}</span></div>` : ''}
          ${currentRole==='admin' && unknownCostCount ? `<div class="muted" style="font-size:11px;margin-top:-4px;">* аәҡа»Қа»ҲаәҷаәұаәҡаәҘаә§аәЎ ${unknownCostCount} аәҘаәІаәҚаәҒаәІаәҷаә—аәөа»ҲаәҚаәұаәҮаәҡа»Қа»Ҳа»„аә”а»үаә•аәұа»үаәҮаә•аә»а»үаәҷаә—аә¶аәҷаәӘаә°аәҒаәёаәҷаәҡаәІаә”а»„аә§а»ү (а»„аәӣаә•аәұа»үаәҮаә—аәөа»Ҳа»ңа»үаәІаәӘаәҙаәҷаә„а»үаәІ)</div>` : ''}
          <hr class="sep">
          <div class="doc-section-label">аәҒаәІаәҷаәҲа»ҲаәІаәҚа»ҖаәҮаәҙаәҷ</div>
          ${payments.length ? payments.map(p=> `
            <div class="row" style="font-size:12px;">

      ${remain > 0 ? `

        <hr class="sep">
        <div class="muted" style="font-size:12px;margin-bottom:4px;">аә®аәұаәҡаәҠаәіаәҘаә°а»Җаәһаәөа»ҲаәЎ вҖӢВ· аә®аәұаәҡа»„аә”а»үаә—аәұаәҮаәҒаәөаәҡ аә«аәјаә· аәҡаәІаә”</div>
        <div class="grid2">
          <select id="pay_method">
            <option value="cash">а»ҖаәҮаәҙаәҷаәӘаә»аә”</option>
            <option value="transfer">а»Ӯаәӯаәҷ</option>
          </select>
          <select id="pay_currency">
            <option value="LAK">аәҒаәөаәҡ (LAK)</option>
            <option value="THB">аәҡаәІаә” (THB)</option>
          </select>
        </div>
        <input id="pay_amount" type="text" placeholder="аәҲаәіаәҷаә§аәҷ" style="margin-top:8px;">
        <div id="pay_rateBlock" style="display:none;">
          <label>аәӯаәұаә”аә•аәІа»ҒаәҘаәҒаәӣа»ҲаәҪаәҷаәЎаә·а»үаәҷаәөа»ү (1 аәҡаәІаә” = ? аәҒаәөаәҡ)</label>
          <input id="pay_rate" type="text" placeholder="а»ҖаәҠаәұа»Ҳаәҷ 620">
        </div>
        <button class="btn secondary" id="pay_submit"><svg class="dv-icon"><use href="#i-wallet"></use></svg>аәҡаәұаәҷаә—аә¶аәҒаәҒаәІаәҷаәҲа»ҲаәІаәҚ</button>
      ` : ''}
      ${currentRole==='admin' ? `<button class="btn danger" id="invDeleteBtn" style="margin-top:16px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>аәҘаә»аәҡаәҡаәҙаәҷаәҷаәөа»ү (аә„аә·аәҷаәӘаә°аә•аәұаәӯаәҒ)</button>` : ''}
      <button class="btn ${remain>0?'secondary':''}" id="invDetailClose">аәӣаәҙаә”</button>
    `;
    if(remain > 0){
      attachMoneyInput('pay_amount', '');
      bindEnterKey(['pay_amount'], 'pay_submit');
      const invCurrency = inv.currency || 'LAK';
      document.getElementById('pay_currency').value = invCurrency;
      document.getElementById('pay_currency').addEventListener('change', ()=>{
        document.getElementById('pay_rateBlock').style.display =
          document.getElementById('pay_currency').value !== invCurrency ? 'block' : 'none';
      });
      bg.querySelector('#pay_submit').addEventListener('click', async ()=>{
        const amt = moneyValue('pay_amount');
        if(!amt){ toast('а»ғаәӘа»ҲаәҲаәіаәҷаә§аәҷа»ҖаәҮаәҙаәҷ'); return; }
        const payCurrency = document.getElementById('pay_currency').value;
        let rate = null, convertedAmt = amt;

          rate = Number((document.getElementById('pay_rate').value||'').replace(/,/g,''));

          /* rate = 1 THB а»ҖаәӣаәұаәҷаәҲаәіаәҷаә§аәҷаәҒаәөаәҡ аәӘаә°а»Җа»қаәө, а»ғаәҠа»үа»ҒаәӣаәҮа»ғаә«а»үаәўаә№а»Ҳа»ғаәҷаәӘаә°аәҒаәёаәҷаәӮаәӯаәҮаәҡаәҙаәҷа»Җаәһаә·а»ҲаәӯаәҒаә§аә”аәҚаәӯаә”аә„а»үаәІаәҮа»Җаә—аә»а»ҲаәІаәҷаәұа»үаәҷ (аәҲаәіаәҷаә§аәҷаә—аәөа»Ҳаә®аәұаәҡа»Ғаә—а»үа»Ҷа»ҖаәҒаәұаәҡа»„аә§а»үаә„аә·а»Җаә”аәөаәЎ) */
          convertedAmt = invCurrency === 'LAK' ? amt * rate : amt / rate;
        }
        try{
          await sb('sales_payments', { method:'POST', body:{
            id: uid(), invoice_id: invoiceId, payment_date: todayStr(),
            method: bg.querySelector('#pay_method').value, currency: payCurrency,
            amount: amt, exchange_rate: rate, converted_amount: convertedAmt, created_by: currentUsername
          }});
          const newPaid = Number(inv.paid_amount||0) + convertedAmt;
          const newStatus = newPaid >= Number(inv.total_amount||0) ? 'paid' : 'partial';
          await sb(`sales_invoices?id=eq.${invoiceId}`, { method:'PATCH', body:{ paid_amount: newPaid, payment_status: newStatus } });
          inv.paid_amount = newPaid;
          inv.payment_status = newStatus;
          toast('аәҡаәұаәҷаә—аә¶аәҒаәҒаәІаәҷаәҲа»ҲаәІаәҚаәӘаәіа»ҖаәҘаәұаә”');
          await refreshInvoiceDetail(bg, invoiceId, inv);
          renderTab();
        }catch(err){ toast('аәңаәҙаә”аәһаәІаә”: '+err.message); }
      });
    }
    if(currentRole==='admin'){
      bg.querySelector('#invDeleteBtn').addEventListener('click', async ()=>{
        if(!confirm(`аәҘаә»аәҡаәҡаәҙаәҷ ${inv.invoice_no || ''} ? аәӘаә°аә•аәұаәӯаәҒаә—аәөа»Ҳаә«аәұаәҒа»„аәӣаәҲаә°аә„аә·аәҷаә—аәұаәҮа»қаә»аә” а»ҒаәҘаә° аәҲаә°аәҘаә»аәҡаә–аәІаә§аәӯаәҷ (аәҒаә№а»үаә„аә·аәҷаәҡа»Қа»Ҳа»„аә”а»ү)`)) return;
        try{
          await voidInvoice(invoiceId, items);
          toast('аәҘаә»аәҡаәҡаәҙаәҷаәӘаәіа»ҖаәҘаәұаә” аә„аә·аәҷаәӘаә°аә•аәұаәӯаәҒа»ҒаәҘа»үаә§');
          bg.remove();
          renderTab();
        }catch(err){ toast('аәңаәҙаә”аәһаәІаә”: '+err.message); }
      });
    }
    bg.querySelector('#invDetailClose').addEventListener('click', ()=> bg.remove());
  }catch(err){
    bg.querySelector('.modal').innerHTML = `<div class="empty">аәңаәҙаә”аәһаәІаә”: ${err.message}</div><button class="btn secondary" id="invDetailClose2">аәӣаәҙаә”</button>`;
    bg.querySelector('#invDetailClose2').addEventListener('click', ()=> bg.remove());
  }
}

/* аәҘаә»аәҡаәҡаәҙаәҷаәӮаәІаәҚ: аә„аә·аәҷаәӘаә°аә•аәұаәӯаәҒаә—аәұаәҮа»қаә»аә” (а»Җаә„аә·а»ҲаәӯаәҮаә—аәөа»ҲаәЎаәөа»ҖаәҘаәҒа»Җаә„аә·а»ҲаәӯаәҮаәҒаәұаәҡа»Җаәӣаәұаәҷ in_stock, аәҘаә»аәҡ movement аәӮаәІаәӯаәӯаәҒ) а»ҒаәҘа»үаә§аә„а»ҲаәӯаәҚаәҘаә»аәҡаәҡаәҙаәҷ (cascade аәҘаә»аәҡ items/payments а»ғаә«а»үаәӯаәұаә”аә•аә°а»ӮаәҷаәЎаәұаә”) */
async function voidInvoice(invoiceId, items){
  await Promise.all(items.map(it=>{
    if(it.unit_id){
      return sb(`stock_product_units?id=eq.${it.unit_id}`, { method:'PATCH', body:{ status:'in_stock', sold_at:null } });
    }
    return Promise.resolve();
  }));
  await sb(`stock_movements?ref_type=eq.sale&ref_id=eq.${invoiceId}`, { method:'DELETE' });
  await sb(`sales_invoices?id=eq.${invoiceId}`, { method:'DELETE' });
}
/* аәҘаә»аәҡаәҡаәҙаәҷаәӮаәІаәҚаә«аәјаәІаәҚа»ғаәҡаәһа»үаәӯаәЎаәҒаәұаәҷ аә”а»үаә§аәҚ 3 request аәҘаә§аәЎ (аәҡа»Қа»Ҳаә§а»ҲаәІаәҲаә°а»ҖаәҘаә·аәӯаәҒаәҲаәұаәҒа»ғаәҡ) а»Ғаә—аәҷаә—аәөа»ҲаәҲаә°аә”аә¶аәҮ/аәҘаә»аәҡа»Җаә—аә·а»ҲаәӯаәҘаә°а»ғаәҡ а»„аә§аәҒаә§а»ҲаәІаә«аәјаәІаәҚа»ҖаәЎаә·а»Ҳаәӯа»ҖаәҘаә·аәӯаәҒаә«аәјаәІаәҚа»Ҷа»ғаәҡ */
async function bulkVoidInvoices(ids){
  const idList = ids.join(',');
  const items = await sb(`sales_invoice_items?select=unit_id&invoice_id=in.(${idList})`);
  const unitIds = [...new Set(items.filter(it=> it.unit_id).map(it=> it.unit_id))];
  await Promise.all([
    unitIds.length ? sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'PATCH', body:{ status:'in_stock', sold_at:null } }) : Promise.resolve(),
    sb(`stock_movements?ref_type=eq.sale&ref_id=in.(${idList})`, { method:'DELETE' })
  ]);
  await sb(`sales_invoices?id=in.(${idList})`, { method:'DELETE' });
}

/* ============================================================
   INIT
   ============================================================ */
const savedSession = sessionStorage.getItem('dv_stock_session');
if(savedSession){
  try{
    const s = JSON.parse(savedSession);
    currentRole = s.role; currentUsername = s.username; currentUserFullName = s.name;
    enterApp();
  }catch(e){ sessionStorage.removeItem('dv_stock_session'); }
}
</script>
