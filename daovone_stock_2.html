<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Davone Shop - ລະບົບສະຕັອກ &amp; ບິນຂາຍ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Lao:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F3ED; --panel:#FFFFFF; --panel2:#EFEAE0; --border:#DBD2C0;
    --orange:#B8471C; --orange-soft:#B8471C; --ink:#2A241E; --muted:#7C7266;
    --danger:#A23327; --ok:#3E7A52;
    --font-body:'Noto Serif Lao','Source Serif 4',Georgia,serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;}
  #app{width:100%;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
  .narrow{max-width:520px;margin:0 auto;width:100%;}

  /* ---- Login ---- */
  #loginScreen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;}
  .brand{text-align:center;margin-bottom:28px;}
  .brand .name{font-size:22px;letter-spacing:1px;color:var(--orange-soft);font-weight:600;}
  .brand .sub{font-size:13px;color:var(--muted);margin-top:4px;}
  .login-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .login-input{width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--ink);font-size:15px;font-family:var(--font-body);outline:none;}
  .login-input:focus{border-color:var(--orange);}
  .login-btn{width:100%;padding:13px;border:none;border-radius:8px;background:var(--orange);color:#fff;font-weight:600;font-size:14px;letter-spacing:.03em;font-family:var(--font-body);margin-top:2px;}
  .login-btn:active{filter:brightness(.92);}
  .loginErr{color:var(--danger);font-size:13px;min-height:18px;margin-top:2px;text-align:center;}

  /* ---- Header / Nav ---- */
  header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;gap:10px;}
  .head-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .seal-mark{width:34px;height:34px;flex:none;display:flex;align-items:center;justify-content:center;position:relative;border-radius:50%;border:1.4px solid var(--orange);color:var(--orange);}
  .seal-mark::before{content:'';position:absolute;inset:3px;border:1px dashed var(--orange);border-radius:50%;}
  .seal-mark .dv-icon{width:15px;height:15px;}
  header .title{font-size:15px;color:var(--orange-soft);font-weight:700;line-height:1.2;}
  header .role{font-size:11px;color:var(--muted);}
  header .logout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 10px;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:var(--font-body);}

  nav{display:flex;overflow-x:auto;background:var(--panel2);border-bottom:1px solid var(--border);}
  nav button{flex:1;min-width:70px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);padding:8px 4px 7px;font-size:10.5px;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-body);}
  nav button.active{color:var(--orange-soft);border-bottom:2px solid var(--orange);font-weight:600;}

  main{flex:1;padding:14px 14px 90px;overflow-y:auto;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .card h3{margin:0 0 10px;font-size:14px;color:var(--orange-soft);border-bottom:1px solid var(--border);padding-bottom:8px;display:flex;align-items:center;gap:7px;}
  .card h3 .dv-icon{color:var(--orange);}
  .row{display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:flex-start;gap:10px;padding:7px 0;font-size:13px;border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row>span:first-child{flex:1 1 auto;min-width:0;}
  .row>span:last-child{flex:none;white-space:nowrap;text-align:right;}
  .row>span:only-child{flex:1 1 auto;white-space:normal;text-align:left;}
  .muted{color:var(--muted);}
  .gold{color:var(--orange-soft);}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;}
  input,select,textarea{width:100%;padding:9px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--ink);font-size:14px;}
  input:focus,select:focus,textarea:focus{outline:1px solid var(--orange);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--orange);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;width:100%;margin-top:10px;font-family:var(--font-body);}
  .btn.secondary{background:none;border:1px solid var(--orange);color:var(--orange-soft);}
  .btn.danger{background:var(--danger);color:#fff;}
  .btn.small{width:auto;padding:6px 10px;font-size:12px;margin-top:0;}
  .btn .dv-icon{width:15px;height:15px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--panel2);border-radius:10px;padding:12px;text-align:center;}
  .stat .num{font-size:19px;color:var(--orange-soft);font-weight:700;font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:12px;}
  .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
  .tag.ok{border-color:var(--ok);color:var(--ok);}
  .tag.sold{border-color:var(--danger);color:var(--danger);}
  .list-item{display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .list-item:last-child{border-bottom:none;}
  .list-item>span:first-child,.list-item>div:first-child{flex:1 1 auto;min-width:0;}
  .list-item>span:last-child,.list-item>div:last-child{flex:none;white-space:nowrap;text-align:right;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 0;}
  .cart-item{display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px;}
  .cart-item .x{color:var(--danger);font-size:16px;padding:0 6px;}
  .search-box{position:relative;margin-bottom:8px;}
  .picker-list{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:6px;}
  .picker-row{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;}
  .picker-row:last-child{border-bottom:none;}
  .picker-row .n{color:var(--ink);}
  .picker-row .p{color:var(--orange-soft);font-size:12px;}
  .toast-container{position:fixed;left:0;right:0;top:calc(66px + env(safe-area-inset-top));z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 16px;pointer-events:none;}
  .toast{background:var(--ink);border:none;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;box-shadow:0 10px 24px -8px rgba(0,0,0,.45);text-align:center;max-width:440px;animation:toastIn .18s ease-out;display:flex;align-items:center;gap:7px;justify-content:center;font-family:var(--font-body);}
  .toast .dv-icon{color:#8fd0a0;width:15px;height:15px;flex:none;}
  @keyframes toastIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;z-index:50;}
  .modal{background:var(--panel);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:520px;margin:0 auto;max-height:85vh;overflow-y:auto;}
  .modal h3{margin-top:0;color:var(--orange-soft);display:flex;align-items:center;gap:7px;}
  .invoice-total{font-size:20px;color:var(--orange-soft);font-weight:700;text-align:right;margin-top:10px;font-variant-numeric:tabular-nums;}

  /* ---- Document-style card (receipt / transfer note), mimics printed receipt layout ---- */
  .doc-card{margin:-16px -16px 14px;border-radius:16px 16px 0 0;overflow:hidden;background:var(--panel);border:1px solid var(--border);border-top:none;}
  .doc-head{background:linear-gradient(135deg,var(--orange),#D9752F);color:#fff;padding:16px 18px 14px;}
  .doc-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .doc-brand{display:flex;align-items:center;gap:8px;min-width:0;}
  .doc-brand .seal-mark{width:32px;height:32px;border-color:#fff;color:#fff;flex:none;}
  .doc-brand .seal-mark::before{border-color:rgba(255,255,255,.6);}
  .doc-brand-name{font-weight:700;font-size:14px;letter-spacing:.4px;white-space:nowrap;}
  .doc-head-title{text-align:right;flex:none;}
  .doc-head-title h3{margin:0;color:#fff;font-size:14px;justify-content:flex-end;font-family:var(--font-mono);}
  .doc-head-meta{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;margin-top:9px;font-size:11px;}
  .doc-tag{font-size:11px;font-weight:700;border:1.3px solid rgba(255,255,255,.9);border-radius:6px;padding:3px 8px;color:#fff;white-space:nowrap;background:rgba(0,0,0,.18);text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .doc-tag.solid{background:rgba(0,0,0,.36);border-color:transparent;}
  .doc-tag.solid, .doc-tag.solid *{color:#fff !important;}
  .doc-body{padding:14px 18px 2px;}
  .doc-box{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start;}
  .doc-avatar{width:38px;height:38px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;}
  .doc-avatar .dv-icon{width:18px;height:18px;}
  .doc-box-info{flex:1;min-width:0;}
  .doc-line{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink);margin-top:4px;}
  .doc-line:first-child{margin-top:0;}
  .doc-line .dv-icon{width:13px;height:13px;color:var(--orange-soft);flex:none;}
  .doc-section-label{font-size:11px;font-weight:700;color:var(--orange-soft);letter-spacing:.02em;margin:2px 0 6px;}
  .doc-table-head{display:flex;flex-wrap:nowrap;justify-content:space-between;gap:10px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:7px 12px;border-radius:8px 8px 0 0;}
  .doc-table-body{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:0 12px;margin-bottom:12px;}
  .doc-table-body .row{font-size:12.5px;}
  .doc-total-band{background:var(--orange);color:#fff;border-radius:9px;padding:10px 14px;display:flex;flex-wrap:nowrap;justify-content:space-between;align-items:center;gap:10px;font-size:16px;font-weight:700;margin:6px 0 14px;}
  .doc-total-band span:last-child{white-space:nowrap;flex:none;}
  .doc-footer{padding:12px 18px;border-top:1px solid var(--border);background:var(--panel2);text-align:center;font-size:11px;color:var(--muted);}
  @media (min-width:860px){
    .doc-card{margin:-28px -32px 16px;border-radius:16px;}
  }
  .switch{display:flex;align-items:center;gap:8px;font-size:13px;margin:10px 0;}
  .icon{width:16px;height:16px;display:inline-block;vertical-align:middle;}
  hr.sep{border:none;border-top:1px solid var(--border);margin:12px 0;}

  .body-row{display:flex;flex-direction:column;flex:1;min-height:0;}
  .card-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .row-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 9px;font-size:12px;line-height:1;display:inline-flex;align-items:center;gap:4px;font-family:var(--font-body);}
  .icon-btn:hover{color:var(--orange-soft);border-color:var(--orange);}
  .icon-btn .dv-icon{width:12px;height:12px;}

  /* ---- Icons & mono reference codes ---- */
  .dv-icon{width:17px;height:17px;flex:none;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px;}
  .mono{font-family:var(--font-mono);letter-spacing:-.01em;}

  /* ===================== DESKTOP / MacBook LAYOUT ===================== */
  @media (min-width:860px){
    body{padding:0;}
    #loginScreen{min-height:100vh;}
    header{padding:16px 28px;}
    header .title{font-size:17px;}
    .body-row{flex-direction:row;align-items:stretch;}
    nav{
      flex-direction:column;overflow-x:visible;width:190px;flex:none;
      border-bottom:none;border-right:1px solid var(--border);
      position:sticky;top:53px;align-self:flex-start;height:calc(100vh - 53px);
    }
    nav button{
      flex:none;width:100%;flex-direction:row;justify-content:flex-start;text-align:left;padding:13px 20px;font-size:13px;
      border-bottom:none;border-left:3px solid transparent;
    }
    nav button .dv-icon{width:16px;height:16px;}
    nav button.active{border-left:3px solid var(--orange);border-bottom:none;background:var(--panel2);}
    main{flex:1;padding:26px 40px 70px;max-width:1560px;}
    .card{padding:18px 22px;}
    .card-grid.cols-2{grid-template-columns:1fr 1fr;}
    .card-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
    .stats-row{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));max-width:1100px;}
    .login-btn:hover{filter:brightness(1.06);cursor:pointer;}
    nav button:hover{color:var(--orange-soft);cursor:pointer;}
    .logout:hover{border-color:var(--orange);cursor:pointer;}
    .list-item, .row{cursor:default;}
    .row.clickable, .list-item.clickable{cursor:pointer;}
    .row.clickable:hover, .list-item.clickable:hover{background:var(--panel2);border-radius:6px;}
    .modal-bg{align-items:center;}
    .modal{border-radius:16px;width:90vw;max-width:900px;max-height:88vh;padding:28px 32px;}
    .modal input, .modal select, .modal textarea{padding:11px 13px;font-size:15px;}
    .modal label{font-size:13px;margin:12px 0 5px;}
    .icon-btn{padding:7px 13px;font-size:13px;}
    .btn.small{padding:8px 15px;font-size:13px;}
  }
  /* ຊ່ອງຄົ້ນຫາສິນຄ້າ (ພິມຊື່/ລະຫັດເພື່ອກັ່ນຕອງ ແທນການເລື່ອນລິດຢາວໆ) */
  .model-search-wrap{position:relative;}
  .model-search-dropdown{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--panel);border:1px solid var(--border);border-radius:8px;max-height:260px;overflow-y:auto;z-index:60;box-shadow:0 10px 24px -8px rgba(0,0,0,.3);}
  .model-search-item{padding:10px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);}
  .model-search-item:last-child{border-bottom:none;}
  .model-search-item:hover,.model-search-item.active{background:var(--panel2);}
  .model-search-empty{padding:10px 12px;font-size:13px;color:var(--muted);}
</style>
</head>
<body>
<div id="app">

  <!-- ===================== LOGIN ===================== -->
  <div id="loginScreen">
    <div class="narrow" style="display:flex;flex-direction:column;align-items:center;">
    <div class="brand">
      <div class="seal-mark" style="width:44px;height:44px;margin:0 auto 12px;"><svg class="dv-icon" style="width:20px;height:20px;"><use href="#i-gear"></use></svg></div>
      <div class="name">DAVONE SHOP</div>
      <div class="sub">ລະບົບສະຕັອກ &amp; ບິນຂາຍ</div>
    </div>
    <div class="login-form">
      <input class="login-input" type="text" id="loginUsername" placeholder="ຊື່ຜູ້ໃຊ້" autocomplete="username" autocapitalize="off" spellcheck="false">
      <input class="login-input" type="password" id="loginPassword" placeholder="ລະຫັດຜ່ານ" autocomplete="current-password">
      <div class="loginErr" id="loginErr">&nbsp;</div>
      <button class="login-btn" id="loginBtn">ເຂົ້າສູ່ລະບົບ</button>
    </div>
    </div>
  </div>

  <!-- ===================== MAIN APP ===================== -->
  <div id="mainScreen" style="display:none;flex-direction:column;flex:1;">
    <header>
      <div class="head-left">
        <div class="seal-mark"><svg class="dv-icon"><use href="#i-gear"></use></svg></div>
        <div>
          <div class="title">DAVONE SHOP</div>
          <div class="role" id="roleLabel"></div>
        </div>
      </div>
      <button class="logout" id="logoutBtn"><svg class="dv-icon" style="width:13px;height:13px;"><use href="#i-logout"></use></svg>ອອກລະບົບ</button>
    </header>
    <div class="body-row">
      <nav id="tabNav"></nav>
      <main id="mainContent"></main>
    </div>
  </div>

</div>

<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
<symbol id="i-home" viewBox="0 0 24 24"><polyline points="3 11 12 4 21 11"></polyline><path d="M5 10v9a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1v-9"></path></symbol>
<symbol id="i-box" viewBox="0 0 24 24"><path d="M3 7.5l9-4 9 4-9 4-9-4z"></path><path d="M3 7.5v9l9 4 9-4v-9"></path><path d="M12 11.5v9"></path></symbol>

<symbol id="i-pencil" viewBox="0 0 24 24"><path d="M4 20l1-4L16 5l3 3L8 19l-4 1z"></path><line x1="14" y1="7" x2="17" y2="10"></line></symbol>
<symbol id="i-trash" viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"></line><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"></path><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></symbol>
<symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V6l7-3z"></path><polyline points="9 12 11 14 15 9.5"></polyline></symbol>
<symbol id="i-logout" viewBox="0 0 24 24"><path d="M9 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h3"></path><polyline points="14 8 18 12 14 16"></polyline><line x1="18" y1="12" x2="9" y2="12"></line></symbol>
<symbol id="i-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 2.5v3M12 18.5v3M4.4 4.4l2.1 2.1M17.5 17.5l2.1 2.1M2.5 12h3M18.5 12h3M4.4 19.6l2.1-2.1M17.5 6.5l2.1-2.1"></path></symbol>
<symbol id="i-check-circle" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><polyline points="8 12.5 11 15.5 16 9"></polyline></symbol>

/* ============================================================
   SUPABASE REST HELPER (fetch ตรงๆ, ไม่ใช้ supabase-js เพื่อความเข้ากันได้กับ iOS Safari)
   ============================================================ */
async function sb(path, options={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method: options.method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers||{})
    },
    body: options.body ? JSON.stringify(options.body) : undefined
  });
  if(!res.ok){
    const t = await res.text().catch(()=> '');
    throw new Error(`Supabase error ${res.status}: ${t}`);
  }
  if(res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function uid(){ return crypto.randomUUID(); }
function fmtMoney(n){ return (Math.round(n||0)).toLocaleString('en-US').replace(/,/g,'.'); }

/* ยอดกีบกับยอดบาทเป็นคนละสกุลเงิน เอามาบวกรวมกันตรงๆ ไม่ได้ (จะได้ตัวเลขที่ไม่มีความหมาย) ฟังก์ชันนี้เลยรวมแยกตามสกุลเงินแทน แล้วโชว์ทีละบรรทัด */
function sumByCurrency(rows, amountField){
  const out = {};
  rows.forEach(r=>{
    const c = r.currency || 'LAK';
    out[c] = (out[c]||0) + Number(r[amountField]||0);
  });
  return out;
}
function fmtByCurrency(obj){
  const parts = Object.keys(obj).filter(c=> obj[c]).map(c=> fmtMoney(obj[c]) + ' ' + (c==='THB' ? 'ບາດ' : 'ກີບ'));
  return parts.length ? parts.join('<br>') : (fmtMoney(0) + ' ກີບ');
}

/* ป้อนตัวเลขเงิน ให้ขึ้นจุดคั่นหลักพันอัตโนมัติ (ตามธรรมเนียมบิลลาว เช่น 1.550.000) */
function attachMoneyInput(id, initial){
  const el = document.getElementById(id);
  if(!el) return;
  el.setAttribute('inputmode','numeric');
  el.setAttribute('autocomplete','off');
  if(initial !== undefined && initial !== null && initial !== ''){
    const n = Number(initial)||0;
    el.value = n.toLocaleString('en-US').replace(/,/g,'.');
  }
  if(!el.dataset.moneyBound){
    el.dataset.moneyBound = '1';
    el.addEventListener('input', ()=>{
      const raw = el.value.replace(/[^\d]/g,'');
      el.value = raw ? Number(raw).toLocaleString('en-US').replace(/,/g,'.') : '';
    });
  }
}
function moneyValue(id){
  const el = document.getElementById(id);
  if(!el) return 0;
  return Number((el.value||'').replace(/[^\d]/g,'')) || 0;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
/* ปรับวันที่จาก YYYY-MM-DD (รูปแบบมาตรฐานที่เก็บในฐานข้อมูล/ช่อง input date) ให้แสดงผลเป็น วัน-เดือน-ปี ตามที่ผู้ใช้ต้องการเห็น (ใช้แค่ตอนแสดงผล ไม่กระทบข้อมูลที่เก็บจริง) */
function fmtDateDMY(dateStr){
  if(!dateStr) return '';
  const d = String(dateStr).slice(0,10);
  const parts = d.split('-');
  if(parts.length !== 3) return d;
  const [y,m,day] = parts;
  return `${day}-${m}-${y}`;
}

function toast(msg){
  let c = document.getElementById('toastContainer');
  if(!c){
    c = document.createElement('div');
    c.id = 'toastContainer';
    c.className = 'toast-container';
    document.body.appendChild(c);
  }
  const t = document.createElement('div');
  t.className = 'toast';
  const isWarn = msg.includes('ຜິດພາດ') || msg.includes('ບໍ່ໄດ້');
  const isOk = !isWarn && msg.includes('ສຳເລັດ');
  const iconId = isWarn ? 'i-alert' : (isOk ? 'i-check-circle' : '');
  t.innerHTML = (iconId ? `<svg class="dv-icon"><use href="#${iconId}"></use></svg>` : '') + `<span></span>`;
  t.querySelector('span').textContent = msg;
  if(isWarn) t.querySelector('.dv-icon').style.color = '#e7a494';
  c.appendChild(t);
  setTimeout(()=> t.remove(), 2200);
}

/* กด Enter/Return ในช่องพวกนี้ = กดปุ่มเดียวกับปุ่มที่ระบุ (สะดวกเวลาพิมพ์ด้วยคีย์บอร์ด MacBook) */
function bindEnterKey(inputIds, buttonId){
  inputIds.forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        const btn = document.getElementById(buttonId);
        if(btn) btn.click();
      }
    });
  });
}
/* กด Enter/Return ในช่องเหล่านี้ = โดดไปโฟกัสช่องถัดไปในลำดับ (ช่องสุดท้ายโดดไป finalId ถ้ามีระบุ) */
function bindEnterAdvance(inputIds, finalId){
  inputIds.forEach((id, idx)=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        const nextId = inputIds[idx+1] || finalId;
        const nextEl = nextId ? document.getElementById(nextId) : null;
        if(nextEl) nextEl.focus();
      }
    });
  });
}

/* ປ່ຽນ <select> ທີ່ມີລາຍການສິນຄ້າຫຼາຍໆໃຫ້ພິມຄົ້ນຫາໄດ້ (ຊື່ ຫຼື ລະຫັດ) ແທນການເລື່ອນຫາເອງ
   ໃຊ້ໄດ້ກັບ select ໃດກໍ່ໄດ້ ໂດຍ select ເກົ່າຍັງຢູ່ໃນ DOM (ເຊື່ອງໄວ້) ເພື່ອບໍ່ໃຫ້ໂຄ້ດອື່ນທີ່ອ້າງອີງ .value / .selectedOptions ພັງ */
function enableSearchableSelect(selectEl){
  if(!selectEl || selectEl.dataset.searchable) return;
  selectEl.dataset.searchable = 'true';
  const wrap = document.createElement('div');
  wrap.className = 'model-search-wrap';
  selectEl.parentNode.insertBefore(wrap, selectEl);
  wrap.appendChild(selectEl);
  selectEl.style.display = 'none';

  const input = document.createElement('input');
  input.type = 'text';
  input.id = selectEl.id + '_search';
  input.autocomplete = 'off';
  input.placeholder = 'ພິມຊື່ ຫຼື ລະຫັດສິນຄ້າ ເພື່ອຄົ້ນຫາ...';
  wrap.appendChild(input);

  const dropdown = document.createElement('div');
  dropdown.className = 'model-search-dropdown';
  dropdown.style.display = 'none';
  wrap.appendChild(dropdown);

  const options = Array.from(selectEl.options).filter(o=>o.value);
  let highlighted = -1;

  function renderList(filter){
    const f = (filter||'').trim().toLowerCase();
    const filtered = f ? options.filter(o=> o.textContent.toLowerCase().includes(f)) : options;
    highlighted = -1;
    dropdown.innerHTML = filtered.length
      ? filtered.map(o=> `<div class="model-search-item" data-value="${o.value}">${o.textContent}</div>`).join('')
      : '<div class="model-search-empty">ບໍ່ພົບສິນຄ້າ</div>';
  }
  function openDropdown(){ renderList(input.value); dropdown.style.display = 'block'; }
  function closeDropdown(){ dropdown.style.display = 'none'; }
  function selectOption(value){
    selectEl.value = value;
    const opt = selectEl.selectedOptions[0];
    input.value = opt ? opt.textContent : '';
    closeDropdown();
    selectEl.dispatchEvent(new Event('change', {bubbles:true}));
  }
  function updateHighlight(items){
    items.forEach((it,i)=> it.classList.toggle('active', i===highlighted));
    if(items[highlighted]) items[highlighted].scrollIntoView({block:'nearest'});
  }

  input.addEventListener('focus', openDropdown);
  input.addEventListener('click', openDropdown);
  input.addEventListener('input', openDropdown);
  dropdown.addEventListener('click', (e)=>{
    const item = e.target.closest('.model-search-item');
    if(item && item.dataset.value) selectOption(item.dataset.value);
  });
  input.addEventListener('keydown', (e)=>{
    if(dropdown.style.display === 'none' && (e.key === 'ArrowDown' || e.key === 'Enter')){
      openDropdown();
      if(e.key === 'Enter') return;
    }
    const items = dropdown.querySelectorAll('.model-search-item[data-value]');
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      highlighted = Math.min(highlighted+1, items.length-1);
      updateHighlight(items);
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      highlighted = Math.max(highlighted-1, 0);
      updateHighlight(items);
    } else if(e.key === 'Enter'){
      if(dropdown.style.display !== 'none' && items.length){
        e.preventDefault();
        e.stopPropagation();
        const idx = highlighted >= 0 ? highlighted : 0;
        if(items[idx]) selectOption(items[idx].dataset.value);
      }
    } else if(e.key === 'Escape'){
      closeDropdown();
      input.blur();
    }
  });
  input.addEventListener('blur', ()=>{
    setTimeout(()=>{
      closeDropdown();
      const opt = selectEl.selectedOptions[0];
      input.value = (opt && opt.value) ? opt.textContent : '';
    }, 150);
  });
  document.addEventListener('click', (e)=>{
    if(!wrap.contains(e.target)) closeDropdown();
  });
}

async function tryLogin(){
  const userEl = document.getElementById('loginUsername');
  const passEl = document.getElementById('loginPassword');
  const errEl = document.getElementById('loginErr');
  const btnEl = document.getElementById('loginBtn');
  const username = userEl.value.trim();
  const password = passEl.value;
  errEl.textContent = '';
  if(!username || !password){
    errEl.textContent = 'ກະລຸນາປ້ອນຊື່ຜູ້ໃຊ້ ແລະ ລະຫັດຜ່ານ';
    return;
  }
  btnEl.disabled = true;
  try{
    const rows = await sb(`hub_accounts?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&active=eq.true&select=*`);
    const account = rows && rows[0];
    const appRole = account ? DB_ROLE_TO_APP_ROLE[account.role] : null;
    if(account && appRole){
      currentRole = appRole;
      currentUsername = account.username;
      currentUserFullName = account.name || account.username;
      sessionStorage.setItem('dv_stock_session', JSON.stringify({ role: appRole, username: currentUsername, name: currentUserFullName }));
      passEl.value = '';
      enterApp();
    } else {
      errEl.textContent = 'ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ';
      passEl.value = '';
    }
  }catch(e){
    errEl.textContent = 'ເຊື່ອມຕໍ່ບໍ່ໄດ້ ລອງໃໝ່';
  }finally{
    btnEl.disabled = false;
  }
}
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginUsername').addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('loginPassword').addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('logoutBtn').addEventListener('click', ()=>{
  currentRole = null;
  currentUsername = null;
  currentUserFullName = null;
  sessionStorage.removeItem('dv_stock_session');
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginErr').innerHTML = '&nbsp;';
});

const TABS = [

function enterApp(){
  document.getElementById('loginScreen').style.display = 'none';
  const main = document.getElementById('mainScreen');
  main.style.display = 'flex';
  document.getElementById('roleLabel').textContent = `${currentUserFullName || ''} · ${ROLE_LABEL[currentRole]}`;

  renderTab();

function buildNav(){
  const nav = document.getElementById('tabNav');
  nav.innerHTML = '';
  TABS.filter(t=> t.roles.includes(currentRole)).forEach(t=>{
    const b = document.createElement('button');
    b.innerHTML = `<svg class="dv-icon"><use href="#${t.icon}"></use></svg><span>${t.label}</span>`;
    b.className = t.id === activeTab ? 'active' : '';
    b.addEventListener('click', ()=>{ activeTab = t.id; buildNav(); renderTab(); });
    nav.appendChild(b);
  });
}

async function renderTab(){
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="empty">ກຳລັງໂຫລດ...</div>';
  try{
    if(activeTab === 'dashboard') await renderDashboard(main);
    else if(activeTab === 'products') await renderProducts(main);
    else if(activeTab === 'receive') await renderReceive(main);
    else if(activeTab === 'sell') await renderSell(main);
    else if(activeTab === 'transfer') await renderTransfer(main);
    else if(activeTab === 'report') await renderReport(main);
  }catch(err){
    console.error(err);
    main.innerHTML = `<div class="card"><div class="empty">ເກີດຂໍ້ຜິດພາດ: ${err.message}</div></div>`;
  }
}

async function renderDashboard(main){
  const today = todayStr();
  const monthStart = today.slice(0,7) + '-01';
  const [todayInv, monthInv, models, balMap, unitMap] = await Promise.all([
    sb(`sales_invoices?select=id,total_amount,currency&invoice_date=eq.${today}&status=eq.confirmed`),
    sb(`sales_invoices?select=id,total_amount,currency&invoice_date=gte.${monthStart}&status=eq.confirmed`),
    getModels(), getBalanceMap(), getUnitCountMap()
  ]);
  const [todayByCur, monthByCur] = await Promise.all([
    sumInvoicesByPaidCurrency(todayInv),
    sumInvoicesByPaidCurrency(monthInv)
  ]);

  const lowStock = models.filter(m=>{
    const qty = m.has_serial ? (unitMap[m.id]||0) : (balMap[m.id]||0);
    const threshold = m.low_stock_threshold!=null ? Number(m.low_stock_threshold) : 1;
    return qty <= threshold;
  }).sort((a,b)=>{
    const qtyA = a.has_serial ? (unitMap[a.id]||0) : (balMap[a.id]||0);
    const qtyB = b.has_serial ? (unitMap[b.id]||0) : (balMap[b.id]||0);
    return qtyA - qtyB;
  });

  const isAdmin = currentRole === 'admin';
  let profitBlock = '';
  if(isAdmin){
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
    const monthProfitByCur = await getPeriodProfit(monthStart, tomorrow.toISOString().slice(0,10));
    profitBlock = `<div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(monthProfitByCur)}</div><div class="lbl">ກຳໄລເດືອນນີ້ (ແອດມິນ)</div></div>`;
  }

  main.innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(todayByCur)}</div><div class="lbl">ຍອດຂາຍມື້ນີ້</div></div>
      <div class="stat"><div class="num mono" style="font-size:15px;">${fmtByCurrency(monthByCur)}</div><div class="lbl">ຍອດຂາຍເດືອນນີ້</div></div>
      ${profitBlock}
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-alert"></use></svg>ສິນຄ້າໃກ້ໝົດ / ໝົດແລ້ວ</h3>
      ${lowStock.length ? lowStock.map(m=>{
        const qty = m.has_serial ? (unitMap[m.id]||0) : (balMap[m.id]||0);
        return `<div class="row"><span>${m.name}</span><span style="color:${qty<=0?'var(--danger)':'var(--orange-soft)'};font-weight:600;">ເຫຼືອ ${qty} ${m.unit||''}</span></div>`;
      }).join('') : '<div class="empty">ສະຕັອກຍັງປົກກະຕິ</div>'}
    </div>
  `;
}

/* ต้นทุนที่บันทึกไว้ (cost_lak ของแต่ละเครื่อง / cost_price ของรุ่นสินค้า) เป็นเงินกีบเสมอ ถ้าบิลขายเป็นสกุลบาทต้องเทียบกับ cost_price_thb ของรุ่นสินค้าแทน ไม่งั้นเอากีบไปลบบาทตรงๆ กำไรจะผิดเพี้ยนมหาศาล (ติดลบทั้งที่จริงกำไรอยู่) ถ้าบิลเป็นบาทแต่ยังไม่ได้ตั้ง cost_price_thb ไว้ ให้ถือว่าไม่ทราบต้นทุน (คืนค่า null) แล้วไม่รวมรายการนั้นในการคิดกำไร แทนที่จะโชว์ตัวเลขผิดๆ */
function itemUnitCostForInvoice(it, invCurrency){
  const model = it.stock_product_models || {};
  if(invCurrency === 'THB'){
    return model.cost_price_thb ? Number(model.cost_price_thb) : null;
  }
  if(it.unit_id && it.stock_product_units && it.stock_product_units.cost_lak != null){
    return Number(it.stock_product_units.cost_lak);
  }
  return model.cost_price != null ? (Number(model.cost_price)||0) : 0;
}
/* รวมกำไรของรายการสินค้าทั้งหมดในบิลเดียว คิดเป็นสกุลเงินของบิลนั้น (ยังไม่แปลงเป็นสกุลที่รับจ่ายจริง) */
function computeInvoiceItemProfit(items, invCurrency){
  let unknownCostCount = 0;
  const profit = items.reduce((s,it)=>{
    const unitCost = itemUnitCostForInvoice(it, invCurrency);
    if(unitCost === null){ unknownCostCount++; return s; }
    const cost = unitCost * Number(it.quantity||0);
    return s + (Number(it.amount||0) - cost);
  }, 0);
  return { profit, unknownCostCount };
}
/* ตั้งบิลไว้เป็นสกุลไหน ไม่ได้แปลว่าลูกค้าจ่ายเป็นสกุลนั้นจริงๆ (เช่นตั้งบิลเป็นบาท แต่ลูกค้าโอนมาเป็นกีบ) ยอดขาย/กำไรควรนับตามสกุลเงินที่ร้านได้รับจริงจากการจ่ายเงินแต่ละครั้ง ไม่ใช่สกุลเงินที่ตั้งราคาไว้ตอนออกบิล ฟังก์ชันนี้กระจายมูลค่าของบิล (ที่คิดไว้เป็นสกุลบิล เช่น ยอดขายทั้งบิล หรือ กำไรทั้งบิล) ไปตามสัดส่วนที่แต่ละการจ่ายเงินครอบคลุมยอดบิล แล้วแปลงส่วนนั้นเป็นสกุลเงินที่จ่ายจริง ส่วนที่ยังไม่ได้จ่าย (ค้างชำระ) จะยังนับเป็นสกุลเงินของบิลไปก่อน เพราะยังไม่รู้ว่าสุดท้ายจะได้รับเป็นสกุลไหน
   ถ้าลูกค้าจ่ายเกินยอดบิล (เช่นตั้งบิล 2,200 บาท @700 = 1,540,000 กีบ แต่รับเงินสด 1,600,000 กีบ) ส่วนที่เกิน (60,000 กีบ) จะถูกนับรวมเข้ายอดตามเงินสดที่รับจริง ไม่ตัดทิ้ง ทำให้ยอดขาย/กำไรตรงกับเงินที่ได้รับจริง */
function splitByPaidCurrency(valueInInvCurrency, invCurrency, totalAmount, payments){
  const out = {};
  payments = payments || [];
  if(!totalAmount){
    /* ບໍ່ຮູ້ຍອດບິນ: ຖ້າມີການຈ່າຍ ໃຫ້ນັບຕາມເງິນສົດທີ່ຮັບຈິງ, ບໍ່ດັ່ງນັ້ນຄືນຄ່າຕາມສະກຸນບິນ */
    if(payments.length){
      payments.forEach(p=>{
        const amt = Number(p.amount)||0;
        if(!amt) return;
        const payCurrency = p.currency || invCurrency;
        out[payCurrency] = (out[payCurrency]||0) + amt;
      });
      return out;
    }
    out[invCurrency] = (out[invCurrency]||0) + valueInInvCurrency;
    return out;
  }
  let coveredInInv = 0; /* ຍອດບິນທີ່ຈ່າຍແລ້ວ ນັບເປັນສະກຸນຂອງບິນ */
  payments.forEach(p=>{
    const amt = Number(p.amount)||0;
    const coveredInInvCurrency = p.converted_amount != null ? Number(p.converted_amount) : amt;
    if(!coveredInInvCurrency) return;
    const payCurrency = p.currency || invCurrency;
    const payPerInv = amt / coveredInInvCurrency; /* 1 ໜ່ວຍສະກຸນບິນ = ? ໜ່ວຍສະກຸນທີ່ຈ່າຍ */
    /* ສ່ວນທີ່ໃຊ້ຫັກຍອດບິນ (ບໍ່ເກີນຍອດຄ້າງ) → ໄດ້ສ່ວນແບ່ງຂອງ value ຕາມສັດສ່ວນ */
    const usableInInv = Math.max(0, Math.min(coveredInInvCurrency, totalAmount - coveredInInv));
    if(usableInInv > 0){
      const valueShare = valueInInvCurrency * (usableInInv / totalAmount);
      out[payCurrency] = (out[payCurrency]||0) + (payCurrency !== invCurrency ? valueShare * payPerInv : valueShare);
      coveredInInv += usableInInv;
    }
    /* ສ່ວນທີ່ຈ່າຍເກີນຍອດບິນ (overpayment) → ນັບເປັນມູນຄ່າເພີ່ມຕາມເງິນສົດທີ່ຮັບຈິງ ບໍ່ຕັດຖິ້ມ */
    const overInInv = coveredInInvCurrency - usableInInv;
    if(overInInv > 0){
      out[payCurrency] = (out[payCurrency]||0) + (payCurrency !== invCurrency ? overInInv * payPerInv : overInInv);
    }
  });
  /* ຍັງຄ້າງຊຳລະ → ນັບເປັນສະກຸນຂອງບິນໄປກ່ອນ ເພາະຍັງບໍ່ຮູ້ວ່າຈະຮັບເປັນສະກຸນໃດ */
  const remainingInInv = Math.max(0, totalAmount - coveredInInv);
  if(remainingInInv > 0){
    out[invCurrency] = (out[invCurrency]||0) + valueInInvCurrency * (remainingInInv / totalAmount);
  }
  return out;
}
/* รวมยอดขาย (total_amount) ของบิลหลายใบ แยกตามสกุลเงินที่รับจ่ายจริง (ไม่ใช่สกุลเงินที่ตั้งบิลไว้เฉยๆ) ต้องมี id ในแต่ละแถวของ invoices */
async function sumInvoicesByPaidCurrency(invoices){
  const out = {};
  if(!invoices.length) return out;
  const ids = invoices.map(i=>i.id).join(',');
  const payments = await sb(`sales_payments?select=invoice_id,currency,amount,converted_amount&invoice_id=in.(${ids})`);
  const paymentsByInvoice = {};
  payments.forEach(p=> (paymentsByInvoice[p.invoice_id] = paymentsByInvoice[p.invoice_id]||[]).push(p));
  invoices.forEach(inv=>{
    const invCurrency = inv.currency || 'LAK';
    const totalAmount = Number(inv.total_amount||0);
    const split = splitByPaidCurrency(totalAmount, invCurrency, totalAmount, paymentsByInvoice[inv.id]||[]);
    Object.keys(split).forEach(c=>{ out[c] = (out[c]||0) + split[c]; });
  });
  return out;
}
/* คำนวณกำไร (ยอดขาย - ต้นทุน) ของບິນທັງໝົດในช่วงวันที่ที่กำหนด ใช้ต้นทุนปัจจุบันของสินค้า (ไม่ได้เก็บ snapshot ต้นทุน ณ วันขาย) แล้วนับกำไรตามสกุลเงินที่รับจ่ายจริงของแต่ละบิล ไม่ใช่สกุลเงินที่ตั้งบิลไว้ */
async function getPeriodProfit(start, end){
  const invoices = await sb(`sales_invoices?select=id,currency,total_amount&invoice_date=gte.${start}&invoice_date=lt.${end}&status=eq.confirmed`);
  if(!invoices.length) return {};
  const ids = invoices.map(i=>i.id).join(',');
  const [items, payments] = await Promise.all([
    sb(`sales_invoice_items?select=amount,quantity,unit_id,invoice_id,stock_product_models(cost_price,cost_price_thb),stock_product_units(cost_lak)&invoice_id=in.(${ids})`),
    sb(`sales_payments?select=invoice_id,currency,amount,converted_amount&invoice_id=in.(${ids})`)
  ]);
  const itemsByInvoice = {};
  items.forEach(it=> (itemsByInvoice[it.invoice_id] = itemsByInvoice[it.invoice_id]||[]).push(it));
  const paymentsByInvoice = {};
  payments.forEach(p=> (paymentsByInvoice[p.invoice_id] = paymentsByInvoice[p.invoice_id]||[]).push(p));
  const profitByCurrency = {};
  invoices.forEach(inv=>{
    const invCurrency = inv.currency || 'LAK';
    const { profit } = computeInvoiceItemProfit(itemsByInvoice[inv.id]||[], invCurrency);
    const perCurrency = splitByPaidCurrency(profit, invCurrency, Number(inv.total_amount||0), paymentsByInvoice[inv.id]||[]);
    Object.keys(perCurrency).forEach(c=>{
      profitByCurrency[c] = (profitByCurrency[c]||0) + perCurrency[c];
    });
  });
  return profitByCurrency;
}

        </span>

          const model = models.find(m=> m.id === btn.dataset.del);

          try{
            await sb(`stock_product_models?id=eq.${model.id}`, { method:'DELETE' });
            toast('ລົບສຳເລັດ');
            renderTab();
          }catch(err){

          }
        });
      });
    }

    <button class="btn" id="addModelBtn"><svg class="dv-icon"><use href="#i-box"></use></svg>ເພີ່ມສິນຄ້າ/ຮຸ່ນໃໝ່</button>

      <div id="prod_list">${rowsHtml(models)}</div>
    </div>
  `;
  document.getElementById('addModelBtn').addEventListener('click', ()=> openModelModal());
  if(isAdmin){
    document.getElementById('checkDupBtn').addEventListener('click', ()=> openDuplicateSerialsModal(models));
  }
  bindRowEvents();
  const searchEl = document.getElementById('prod_search');
  searchEl.addEventListener('input', ()=>{
    const q = searchEl.value.trim().toLowerCase();
    const filtered = q ? models.filter(m=>
      (m.name||'').toLowerCase().includes(q) ||
      (m.code||'').toLowerCase().includes(q) ||
      (m.category||'').toLowerCase().includes(q)
    ) : models;
    document.getElementById('prod_list').innerHTML = rowsHtml(filtered);
    document.getElementById('prod_count').textContent = filtered.length;
    bindRowEvents();
  });
}

/* ກວດເລກເຄື່ອງທີ່ຊ້ຳກັນຢູ່ໃນລະບົບ (ສຳລັບລ້າງຂໍ້ມູນເກົ່າກ່ອນຈະມີການກັນຊ້ຳ) — ອ່ານຢ່າງດຽວ ບໍ່ລົບຫຍັງໃຫ້ອັດຕະໂນມັດ */

      <div class="muted" style="font-size:12px;margin-bottom:8px;">${dupGroups.length ? `ພົບເລກເຄື່ອງຊ້ຳ ${dupGroups.length} ຊຸດ — ລາຍການລຸ່ມນີ້ຄື 2 (ຫຼືຫຼາຍກວ່າ) ໜ່ວຍທີ່ໃຊ້ເລກເຄື່ອງດຽວກັນ, ໄປແກ້ໄຂ/ລົບອັນທີ່ຜິດໃນ Supabase ໄດ້ເລີຍ` : 'ບໍ່ພົບເລກເຄື່ອງຊ້ຳໃນລະບົບ ✓'}</div>
      <hr class="sep">

        <div style="margin-bottom:10px;">
          <div class="mono" style="font-weight:700;color:var(--danger);">${g[0].serial_no}</div>
          ${g.map(u=> `<div class="row" style="padding:4px 0;"><span style="font-size:12px;">${modelName(u.model_id)}</span><span class="muted" style="font-size:11px;">${u.status==='in_stock'?'ຄົງຄັງ':(u.status==='transferred'?'ໂອນສາຂາແລ້ວ':'ຂາຍແລ້ວ')} · ${fmtDateDMY(u.received_at)}</span></div>`).join('')}
        </div>`).join('') : ''}
      <button class="btn secondary" id="dupClose" style="margin-top:8px;">ປິດ</button>
    `;
    bg.querySelector('#dupClose').addEventListener('click', ()=> bg.remove());
  }catch(err){
    bg.querySelector('.modal').innerHTML = `<div class="empty">ຜິດພາດ: ${err.message}</div><button class="btn secondary" id="dupClose2">ປິດ</button>`;
    bg.querySelector('#dupClose2').addEventListener('click', ()=> bg.remove());
  }
}

function openModelModal(existing){
  const isEdit = !!existing;
  const canSeeCost = currentRole === 'admin';
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h3><svg class="dv-icon"><use href="#i-box"></use></svg>${isEdit ? 'ແກ້ໄຂສິນຄ້າ' : 'ເພີ່ມສິນຄ້າ/ຮຸ່ນໃໝ່'}</h3>
      <label>ຊື່ສິນຄ້າ *</label>
      <input id="m_name" placeholder="ເຊັ່ນ ແທັກເຕີ M6040" value="${isEdit ? (existing.name||'').replace(/"/g,'&quot;') : ''}">
      <label>ລະຫັດ (code)</label>
      <input id="m_code" placeholder="ເຊັ່ນ W9500-95511" value="${isEdit ? (existing.code||'').replace(/"/g,'&quot;') : ''}">
      <label>ໝວດໝູ່</label>
      <input id="m_cat" placeholder="ເຊັ່ນ ແທັກເຕີ / ອາໄຫລ່ / ຢາງ" value="${isEdit ? (existing.category||'').replace(/"/g,'&quot;') : ''}">
      <label>ຫົວໜ່ວຍ</label>
      <input id="m_unit" placeholder="ຖັງ / ອັນ / ຄູ່ / ໃບ" value="${isEdit ? (existing.unit||'ອັນ') : 'ອັນ'}">
      <label>ລາຄາຂາຍ</label>
      <div class="grid2">
        <div><input id="m_price" type="text" placeholder="0"><div class="muted" style="font-size:11px;margin-top:3px;">ກີບ (LAK)</div></div>
        <div><input id="m_price_thb" type="text" placeholder="0"><div class="muted" style="font-size:11px;margin-top:3px;">ບາດ (THB)</div></div>
      </div>
      ${canSeeCost ? `
      <label>ຕົ້ນທຶນ</label>
      <div class="grid2">
        <div><input id="m_cost" type="text" placeholder="0"><div class="muted" style="font-size:11px;margin-top:3px;">ກີບ (LAK)</div></div>
        <div><input id="m_cost_thb" type="text" placeholder="0"><div class="muted" style="font-size:11px;margin-top:3px;">ບາດ (THB)</div></div>
      </div>` : `
      <div class="muted" style="font-size:11px;margin-top:2px;">* ຕົ້ນທຶນຈະໃສ່ໂດຍແອດມິນທີ່ຫຼັງ</div>`}
      <label>ແຈ້ງເຕືອນເມື່ອເຫຼືອ ≤</label>
      <input id="m_threshold" type="number" min="0" value="${isEdit ? (existing.low_stock_threshold!=null ? existing.low_stock_threshold : 1) : 1}">
      <div class="switch"><input type="checkbox" id="m_serial" style="width:auto;" ${isEdit && existing.has_serial ? 'checked':''}> ຕ້ອງເກັບເລກເຄື່ອງແຍກທີລະໜ່ວຍ (ແທັກເຕີ/ເຄື່ອງຈັກ)</div>
      ${isEdit ? `<div class="switch"><input type="checkbox" id="m_active" style="width:auto;" ${existing.active!==false ? 'checked':''}> ໃຊ້ງານຢູ່ (ຖ້າເອົາອອກ ຈະບໍ່ຂຶ້ນໃນລາຍການໃຫ້ເລືອກອີກ)</div>` : ''}
      <button class="btn" id="m_save"><svg class="dv-icon"><use href="#i-check-circle"></use></svg>ບັນທຶກ</button>
      <button class="btn secondary" id="m_cancel">ຍົກເລີກ</button>
    </div>`;
  document.body.appendChild(bg);
  attachMoneyInput('m_price', isEdit ? existing.sale_price : '');
  attachMoneyInput('m_price_thb', isEdit ? existing.sale_price_thb : '');
  if(canSeeCost){
    attachMoneyInput('m_cost', isEdit ? existing.cost_price : '');
    attachMoneyInput('m_cost_thb', isEdit ? existing.cost_price_thb : '');
  }
  /* กด Enter ในแต่ละช่อง = โดดลงช่องถัดไปตามลำดับ พอถึงช่องสุดท้ายโดดไปโฟกัสปุ่ม "บันทึก" (กด Enter อีกทีค่อยบันทึกจริง) ไม่ใช่บันทึกทันทีทีละช่องเหมือนก่อน */
  {
    const modelFieldOrder = ['m_name','m_code','m_cat','m_unit','m_price','m_price_thb'];
    if(canSeeCost) modelFieldOrder.push('m_cost','m_cost_thb');
    modelFieldOrder.push('m_threshold');
    bindEnterAdvance(modelFieldOrder, 'm_save');
  }
  bg.addEventListener('click', (e)=>{ if(e.target === bg) bg.remove(); });
  document.getElementById('m_cancel').addEventListener('click', ()=> bg.remove());
  document.getElementById('m_save').addEventListener('click', async ()=>{
    const name = document.getElementById('m_name').value.trim();
    if(!name){ toast('ກະລຸນາໃສ່ຊື່ສິນຄ້າ'); return; }
    const payload = {
      name,
      code: document.getElementById('m_code').value.trim(),
      category: document.getElementById('m_cat').value.trim(),
      unit: document.getElementById('m_unit').value.trim() || 'ອັນ',
      sale_price: moneyValue('m_price'),
      sale_price_thb: moneyValue('m_price_thb'),
      low_stock_threshold: Number(document.getElementById('m_threshold').value)||0,
      has_serial: document.getElementById('m_serial').checked
    };
    if(canSeeCost){
      payload.cost_price = moneyValue('m_cost');
      payload.cost_price_thb = moneyValue('m_cost_thb');
    }
    try{
      if(isEdit){
        payload.active = document.getElementById('m_active').checked;
        await sb(`stock_product_models?id=eq.${existing.id}`, { method:'PATCH', body: payload });
      } else {
        payload.id = uid();
        await sb('stock_product_models', { method:'POST', body: payload });
      }
      toast('ບັນທຶກສຳເລັດ');
      bg.remove();
      renderTab();
    }catch(err){ toast('ຜິດພາດ: '+err.message); }
  });
}

/* ============================================================
   RECEIVE STOCK (ຮັບເຂົ້າ)
   ============================================================ */
let receiveCart = [];
/* ถ้ากด Enter ตอนที่ไม่ได้อยู่ในช่องพิมพ์ไหนเลย (เช่น เพิ่งกด X ลบรายการ หรือคลิกออกจากช่องไปแล้ว) แล้วอยู่แท็บຮับเข้า+มีรายการในตะกร้าแล้ว = บันทึกรับเข้าทันที กันปัญหากด Enter ไม่ติดตอนโฟกัสหลุดจากช่อง */
document.addEventListener('keydown', (e)=>{
  if(e.key !== 'Enter') return;
  const submitBtn = document.getElementById('r_submit');
  if(!submitBtn) return; // ไม่ได้อยู่แท็บຮับเข้าตอนนี้
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return; // ปล่อยให้ตัวจัดการเฉพาะช่องทำงานแทน
  if(!receiveCart.length) return;
  e.preventDefault();
  submitBtn.click();
});

      <input id="r_supplier" placeholder="ຊື່ຜູ້ສະໜອງ (ຖ້າມີ)">
      <label>ວັນທີ</label>

        <textarea id="r_serials" rows="3" placeholder="W95TD-00011&#10;W95TD-00012"></textarea>
      </div>
      ${canSeeCost ? `
      <label>ຊື້ເປັນສະກຸນ</label>
      <select id="r_currency">
        <option value="LAK">ກີບ (LAK)</option>
        <option value="THB">ບາດ (THB)</option>
      </select>
      <label id="r_cost_lbl">ຕົ້ນທຶນ/ໜ່ວຍ (ກີບ)</label>
      <input id="r_cost" type="text" value="0">
      <div id="r_rateBlock" style="display:none;">
        <label>ອັດຕາແລກປ່ຽນ (1 ບາດ = ? ກີບ)</label>
        <input id="r_rate" type="text" placeholder="ເຊັ່ນ 620">
        <div class="muted" style="font-size:11px;margin-top:3px;" id="r_lockedPreview"></div>
      </div>` : ''}
      <button class="btn secondary" id="r_addItem"><svg class="dv-icon"><use href="#i-box"></use></svg>ເພີ່ມເຂົ້າລາຍການ</button>
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-receipt"></use></svg>ລາຍການທີ່ຈະຮັບເຂົ້າ</h3>
      <div id="r_cartList">${renderReceiveCart()}</div>
      ${canSeeCost ? `<div class="invoice-total mono">ລວມ: ${fmtMoney(receiveCart.reduce((s,i)=>s+i.amount,0))}</div>` : ''}
      <button class="btn" id="r_submit"><svg class="dv-icon"><use href="#i-check-circle"></use></svg>ບັນທຶກຮັບເຂົ້າ</button>
    </div>
    <div class="card">
      <h3><svg class="dv-icon"><use href="#i-truck"></use></svg>ປະຫວັດການຮັບເຂົ້າ <span class="muted" style="font-weight:400;font-size:11px;">(ກົດເພື່ອເບິ່ງລາຍການ)</span></h3>
      <label>ເລືອກເດືອນ</label>
      <input type="month" id="rcv_month" value="${historyMonth}">
      <div id="rcv_history" style="margin-top:8px;"><div class="empty">ກຳລັງໂຫລດ...</div></div>
    </div>
  `;
  document.getElementById('rcv_month').addEventListener('change', (e)=>{
    main.dataset.rcvMonth = e.target.value;
    loadReceiveHistory(e.target.value);
  });
  loadReceiveHistory(historyMonth);
  if(canSeeCost) attachMoneyInput('r_cost', 0);
  const modelSel = document.getElementById('r_model');
  enableSearchableSelect(modelSel);
  /* ອັດຕາຕ້ອງພິມໃໝ່ທຸກຄັ້ງທີ່ຮັບເຂົ້າ (ບໍ່ຈື່ອັດຕາເກົ່າໄວ້) ​ຕົ້ນທຶນກີບຈະລ໋ອກຕາມມື້ນີ້ ບໍ່ປ່ຽນຕາມພາຍຫຼັງ */
  function updateReceiveCostLabel(){
    if(!canSeeCost) return;
    const currency = document.getElementById('r_currency').value;
    const rateBlock = document.getElementById('r_rateBlock');
    const lbl = document.getElementById('r_cost_lbl');
    rateBlock.style.display = currency === 'THB' ? 'block' : 'none';
    lbl.textContent = currency === 'THB' ? 'ຕົ້ນທຶນ/ໜ່ວຍ (ບາດ)' : 'ຕົ້ນທຶນ/ໜ່ວຍ (ກີບ)';
    updateReceiveCostPreview();
  }
  function updateReceiveCostPreview(){
    const preview = document.getElementById('r_lockedPreview');
    if(!preview) return;
    const currency = document.getElementById('r_currency').value;
    if(currency !== 'THB'){ preview.textContent=''; return; }
    const costThb = moneyValue('r_cost');
    const rate = Number((document.getElementById('r_rate').value||'').replace(/,/g,''));
    if(costThb && rate) preview.textContent = `≈ ${fmtMoney(costThb*rate)} ກີບ/ໜ່ວຍ (ລ໋ອກຕົ້ນທຶນນີ້ໄວ້)`;
    else preview.textContent = 'ໃສ່ອັດຕາແລກປ່ຽນເພື່ອລ໋ອກຕົ້ນທຶນເປັນກີບ';
  }
  if(canSeeCost){
    document.getElementById('r_currency').addEventListener('change', updateReceiveCostLabel);
    document.getElementById('r_cost').addEventListener('input', updateReceiveCostPreview);
    document.getElementById('r_rate').addEventListener('input', updateReceiveCostPreview);
  }
  modelSel.addEventListener('change', ()=>{
    const opt = modelSel.selectedOptions[0];
    const isSerial = opt && opt.dataset.serial === 'true';
    document.getElementById('r_qtyBlock').style.display = isSerial ? 'none' : 'block';
    document.getElementById('r_serialBlock').style.display = isSerial ? 'block' : 'none';
    if(canSeeCost){
      document.getElementById('r_currency').value = 'LAK';
      updateReceiveCostLabel();
      attachMoneyInput('r_cost', opt ? (opt.dataset.cost||0) : 0);
    }
  });
  document.getElementById('r_addItem').addEventListener('click', async ()=>{
    const opt = modelSel.selectedOptions[0];
    if(!opt || !opt.value){ toast('ເລືອກສິນຄ້າກ່ອນ'); return; }
    const isSerial = opt.dataset.serial === 'true';
    const currency = canSeeCost ? document.getElementById('r_currency').value : 'LAK';
    const costInput = canSeeCost ? moneyValue('r_cost') : 0;
    let cost = costInput; // locked LAK unit cost, used everywhere below
    let costThb = null, exchangeRate = null;
    if(canSeeCost && currency === 'THB'){
      exchangeRate = Number((document.getElementById('r_rate').value||'').replace(/,/g,''));
      if(!exchangeRate){ toast('ໃສ່ອັດຕາແລກປ່ຽນ (1 ບາດ = ? ກີບ)'); return; }
      costThb = costInput;
      cost = costThb * exchangeRate; // ລ໋ອກເປັນກີບຕາມອັດຕາມື້ນີ້
    }
    let addedCount = 0;
    if(isSerial){
      const rawSerials = document.getElementById('r_serials').value.split('\n').map(s=>s.trim()).filter(Boolean);
      if(!rawSerials.length){ toast('ໃສ່ເລກເຄື່ອງຢ່າງໜ້ອຍ 1 ຕົວ'); return; }

      /* ກັນເລກເຄື່ອງຊ້ຳກັນເອງໃນລາຍການທີ່ພິມ/ວາງເຂົ້າມາຄັ້ງນີ້ */
      const seen = new Set();
      const dupInInput = [];
      const serials = [];
      rawSerials.forEach(sn=>{
        const key = sn.toUpperCase();
        if(seen.has(key)){ dupInInput.push(sn); } else { seen.add(key); serials.push(sn); }
      });
      if(dupInInput.length){ toast(`ເລກເຄື່ອງຊ້ຳກັນເອງ: ${[...new Set(dupInInput)].join(', ')}`); return; }

      /* ກັນຊ້ຳກັບລາຍການທີ່ຄ້າງຢູ່ໃນກະຕ່າ (ຍັງບໍ່ທັນບັນທຶກຮັບເຂົ້າ) */
      const cartSerials = new Set(receiveCart.filter(i=>i.serial_no).map(i=>i.serial_no.toUpperCase()));
      const dupInCart = serials.filter(sn=> cartSerials.has(sn.toUpperCase()));
      if(dupInCart.length){ toast(`ເລກເຄື່ອງນີ້ຢູ່ໃນລາຍການແລ້ວ: ${dupInCart.join(', ')}`); return; }

      /* ກັນຊ້ຳກັບເລກເຄື່ອງທີ່ມີຢູ່ແລ້ວໃນລະບົບ (ຮັບເຂົ້າໄປແລ້ວກ່ອນໜ້ານີ້ ບໍ່ວ່າຈະຄົງຄັງ ຫຼື ຂາຍໄປແລ້ວ) */
      try{
        const list = serials.map(sn=> encodeURIComponent(sn)).join(',');
        const existing = await sb(`stock_product_units?select=serial_no&serial_no=in.(${list})`);
        if(existing.length){
          toast(`ເລກເຄື່ອງນີ້ມີໃນລະບົບແລ້ວ: ${existing.map(e=>e.serial_no).join(', ')}`);
          return;
        }
      }catch(err){ toast('ກວດເລກເຄື່ອງຊ້ຳບໍ່ໄດ້: '+err.message); return; }

      serials.forEach(sn=>{
        receiveCart.push({ model_id: opt.value, model_name: opt.textContent, serial_no: sn, quantity:1, unit_cost:cost, amount:cost, cost_currency:currency, unit_cost_thb:costThb, exchange_rate:exchangeRate });
      });
      addedCount = serials.length;
      document.getElementById('r_serials').value = '';
    } else {
      const qty = Number(document.getElementById('r_qty').value)||1;
      receiveCart.push({ model_id: opt.value, model_name: opt.textContent, serial_no:null, quantity:qty, unit_cost:cost, amount: qty*cost, cost_currency:currency, unit_cost_thb:costThb, exchange_rate:exchangeRate });
      addedCount = qty;
    }
    document.getElementById('r_cartList').innerHTML = renderReceiveCart();
    const totalEl = main.querySelector('.invoice-total');
    if(totalEl) totalEl.textContent = 'ລວມ: ' + fmtMoney(receiveCart.reduce((s,i)=>s+i.amount,0));
    bindReceiveCartRemove();
    toast(`ເພີ່ມ ${opt.textContent} ແລ້ວ`);
  });
  /* Enter ในแต่ละช่อง = ไล่ลงช่องถัดไปตามลำดับจริงในฟอร์ม (เลขเครื่อง/จำนวน → สกุลເງິນ → ต้นทุน → อัตราแลกเปลี่ยน[ถ้าเป็นบาท]) พอถึงช่องสุดท้ายค่อยเพิ่มเข้ารายการ แล้วต้องกดปุ่ม "บันทึกรับเข้า" (r_submit) เองเสมอ เพื่อกันบันทึกค้างๆ โดยไม่ตั้งใจ */
  function handleReceiveEnter(){
    document.getElementById('r_addItem').click();
  }
  /* หลังเพิ่มเข้ารายการแล้ว โฟกัสกลับไปช่องที่เหมาะสมเพื่อพิมพ์/สแกนตัวถัดไปได้ทันที */
  function focusBackAfterAdd(){
    const serialBlock = document.getElementById('r_serialBlock');
    const isSerialVisible = serialBlock && serialBlock.style.display !== 'none';
    if(isSerialVisible){
      const serialsEl = document.getElementById('r_serials');
      if(serialsEl) serialsEl.focus();
    } else {
      const qtyEl = document.getElementById('r_qty');
      if(qtyEl) qtyEl.focus();
    }
  }
  /* ลำดับช่องจริงของฟอร์ม ณ ขณะนั้น (ขึ้นกับว่ามีเลขเครื่องไหม / เห็นต้นทุนไหม / เลือกสกุลบาทไหม) */
  function getReceiveFieldChain(){
    const canSeeCost2 = currentRole === 'admin';
    const serialBlock = document.getElementById('r_serialBlock');
    const isSerialVisible = serialBlock && serialBlock.style.display !== 'none';
    const chain = [isSerialVisible ? 'r_serials' : 'r_qty'];
    if(canSeeCost2){
      chain.push('r_currency', 'r_cost');
      const currencyEl = document.getElementById('r_currency');
      if(currencyEl && currencyEl.value === 'THB') chain.push('r_rate');
    }
    return chain;
  }
  function focusReceiveField(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.focus();
    if(el.select) el.select();
  }
  /* กด Enter จากช่อง id นี้ → ถ้ายังไม่ใช่ช่องสุดท้ายในลำดับ ให้ลงไปช่องถัดไป, ถ้าเป็นช่องสุดท้ายแล้วให้เพิ่มเข้ารายการเลย */
  function handleReceiveFieldEnter(currentId){
    const chain = getReceiveFieldChain();
    const idx = chain.indexOf(currentId);
    if(idx === -1) return;
    if(idx < chain.length - 1){
      focusReceiveField(chain[idx+1]);
    } else {
      handleReceiveEnter();
      focusBackAfterAdd();
    }
  }
  ['r_qty','r_currency','r_cost','r_rate'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter'){ e.preventDefault(); handleReceiveFieldEnter(id); }
    });
  });
  bindEnterAdvance(['r_supplier','r_date'], 'r_model_search');
  document.getElementById('r_serials').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){
      e.preventDefault();
      const val = e.target.value.trim();
      if(!val){
        /* ไม่มีเลขเครื่องเหลือให้เพิ่มแล้ว = พิมพ์เสร็จหมดแล้ว กด Enter ครั้งนี้จึงบันทึกเข้าระบบทั้งใบ */
        document.getElementById('r_submit').click();
      } else {
        /* พิมพ์เลขเครื่องแล้วกด Enter ครั้งแรก = ไล่ลงช่องถัดไปตามลำดับจริง (สกุลเงิน → ต้นทุน → อัตราแลกเปลี่ยน → เพิ่มเข้ารายการ) */
        handleReceiveFieldEnter('r_serials');
      }
    }
  });
  bindReceiveCartRemove();
  document.getElementById('r_submit').addEventListener('click', async (e)=>{
    if(!receiveCart.length){ toast('ຍັງບໍ່ມີລາຍການ'); return; }
    const btn = e.currentTarget;
    if(btn.disabled) return; // กันกดซ้ำระหว่างกำลังบันทึก
    btn.disabled = true;
    try{
      const receiptId = uid();
      const total = receiveCart.reduce((s,i)=>s+i.amount,0);
      const receiptNo = 'RCV-' + Date.now().toString().slice(-8);
      await sb('stock_purchase_receipts', { method:'POST', body:{
        id: receiptId,
        receipt_no: receiptNo,
        supplier_name: document.getElementById('r_supplier').value.trim(),
        receipt_date: document.getElementById('r_date').value || todayStr(),
        total_amount: total,
        created_by: currentUsername
      }});
      /* ບັນທຶກທັງໝົດເປັນຊຸດ (bulk) ແທນທີລະລາຍການ: ສ້າງເລກເຄື່ອງ (unit) ກ່ອນ (ຖ້າມີ) ເພາະ movement ຕ້ອງອ້າງອີງ unit ທີ່ມີແລ້ວ ຈາກນັ້ນບັນທຶກລາຍການ/ການເຄື່ອນໄຫວ/ຕົ້ນທຶນພ້ອມກັນ */
      const receiptDate = document.getElementById('r_date').value || todayStr();
      const unitsBody = receiveCart.filter(item=> item.serial_no).map(item=> ({
        id: uid(), model_id: item.model_id, serial_no: item.serial_no, status:'in_stock',
        received_at: receiptDate, cost_lak: item.unit_cost
      }));
      if(unitsBody.length) await sb('stock_product_units', { method:'POST', body: unitsBody });
      const unitIdBySerial = {};
      unitsBody.forEach(u=> unitIdBySerial[u.serial_no] = u.id);
      const receiptItemsBody = receiveCart.map(item=> ({
        id: uid(), receipt_id: receiptId, model_id: item.model_id, serial_no: item.serial_no,
        quantity: item.quantity, unit_cost: item.unit_cost, amount: item.amount,
        cost_currency: item.cost_currency||'LAK', unit_cost_thb: item.unit_cost_thb, exchange_rate: item.exchange_rate
      }));
      const movementsBody = receiveCart.map(item=> ({
        id: uid(), model_id: item.model_id, unit_id: item.serial_no ? unitIdBySerial[item.serial_no] : null, movement_type:'in',
        quantity: item.quantity, ref_type:'purchase', ref_id: receiptId, created_by: currentUsername
      }));
      /* ອັບເດດຕົ້ນທຶນອ້າງອິງຂອງແຕ່ລະຮຸ່ນສິນຄ້າ (ໜຶ່ງຄຳຂໍຕໍ່ 1 ຮຸ່ນ ເຖິງຈະມີຫຼາຍລາຍການຂອງຮຸ່ນດຽວກັນ) */
      const costByModel = {};
      if(currentRole==='admin'){
        receiveCart.forEach(item=> { costByModel[item.model_id] = item.unit_cost; });
      }
      await Promise.all([
        sb('stock_purchase_receipt_items', { method:'POST', body: receiptItemsBody }),
        sb('stock_movements', { method:'POST', body: movementsBody }),
        ...Object.entries(costByModel).map(([modelId, cost])=>
          sb(`stock_product_models?id=eq.${modelId}`, { method:'PATCH', body:{ cost_price: cost } }))
      ]);
      toast(`ຮັບເຂົ້າສະຕັອກສຳເລັດ · ${receiptNo}`);
      receiveCart = [];
      renderTab();
    }catch(err){ toast('ຜິດພາດ: '+err.message); btn.disabled = false; }
  });
}
function renderReceiveCart(){
  if(!receiveCart.length) return '<div class="empty">ຍັງບໍ່ມີລາຍການ</div>';
  const canSeeCost = currentRole === 'admin';
  return receiveCart.map((it,idx)=> `
    <div class="cart-item">
      <span>${it.model_name}${it.serial_no?(' · '+it.serial_no):(' × '+it.quantity)}${it.cost_currency==='THB' ? ' <span class="muted" style="font-size:11px;">(ຊື້ ' + fmtMoney(it.unit_cost_thb) + ' ບາດ @' + it.exchange_rate + ')</span>' : ''}</span>
      <span>${canSeeCost ? fmtMoney(it.amount)+' ກີບ ' : ''}<span class="x" data-idx="${idx}">✕</span></span>
    </div>`).join('');
}
function bindReceiveCartRemove(){
  document.querySelectorAll('#r_cartList .x').forEach(el=>{
    el.addEventListener('click', ()=>{
      receiveCart.splice(Number(el.dataset.idx),1);
      renderTab();
    });
  });
}

/* ປະຫວັດການຮັບເຂົ້າ (ເບິ່ງຍ້ອນຫຼັງລາຍເດືອນ) */
async function getPurchaseReceipts(start, end){
  return await sb(`stock_purchase_receipts?select=*&receipt_date=gte.${start}&receipt_date=lt.${end}&order=receipt_date.desc,receipt_no.desc`);
}
async function getPurchaseReceiptItems(receiptId){
  return await sb(`stock_purchase_receipt_items?select=*,stock_product_models(name,unit)&receipt_id=eq.${receiptId}`);
}
async function loadReceiveHistory(month){
  const el = document.getElementById('rcv_history');
  if(!el) return;
  const canSeeCost = currentRole === 'admin';
  try{
    const start = month + '-01';
    const endDate = new Date(start); endDate.setMonth(endDate.getMonth()+1);
    const end = endDate.toISOString().slice(0,10);
    const receipts = await getPurchaseReceipts(start, end);
    el.innerHTML = `
      ${canSeeCost && receipts.length ? `
        <div class="row" style="padding:6px 0;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);margin:0;">
            <input type="checkbox" id="rcv_selectAll" style="width:17px;height:17px;margin:0;">ເລືອກທັງໝົດ
          </label>
          <button class="btn danger" id="rcv_deleteSelected" style="display:none;padding:6px 12px;font-size:12px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>ລົບທີ່ເລືອກ (<span id="rcv_selectedCount">0</span>)</button>
        </div>
      ` : ''}
      ${receipts.length ? receipts.map(r=> `
      <div class="row clickable" data-rcv="${r.id}">
        <span style="display:flex;align-items:center;gap:10px;">
          ${canSeeCost ? `<input type="checkbox" class="rcv-check" value="${r.id}" style="width:17px;height:17px;flex:none;margin:0;" onclick="event.stopPropagation()">` : ''}
          <span>
            <div class="mono">${r.receipt_no || '-'} <span style="font-family:var(--font-body);">${r.supplier_name ? '· '+r.supplier_name : ''}</span></div>
            <div class="muted" style="font-size:11px;">${fmtDateDMY(r.receipt_date)}</div>
          </span>
        </span>
        ${canSeeCost ? `<span class="gold mono">${fmtMoney(r.total_amount)}</span>` : ''}
      </div>`).join('') : '<div class="empty">ບໍ່ມີການຮັບເຂົ້າໃນເດືອນນີ້</div>'}`;
    el.querySelectorAll('.row[data-rcv]').forEach(row=>{
      row.addEventListener('click', (e)=>{
        if(e.target.closest('.rcv-check')) return;
        openReceiptDetail(row.dataset.rcv, receipts.find(r=>r.id===row.dataset.rcv));
      });
    });
    if(canSeeCost && receipts.length){
      const selectAllEl = document.getElementById('rcv_selectAll');
      const deleteBtn = document.getElementById('rcv_deleteSelected');
      const countEl = document.getElementById('rcv_selectedCount');
      const checks = ()=> Array.from(el.querySelectorAll('.rcv-check'));
      function refreshSelection(){
        const selected = checks().filter(c=> c.checked);
        countEl.textContent = selected.length;
        deleteBtn.style.display = selected.length ? 'inline-flex' : 'none';
        selectAllEl.checked = selected.length === checks().length;
      }
      selectAllEl.addEventListener('change', ()=>{
        checks().forEach(c=> c.checked = selectAllEl.checked);
        refreshSelection();
      });
      checks().forEach(c=> c.addEventListener('change', refreshSelection));
      deleteBtn.addEventListener('click', async ()=>{
        const ids = checks().filter(c=> c.checked).map(c=> c.value);
        if(!ids.length) return;
        if(!confirm(`ລົບການຮັບເຂົ້າ ${ids.length} ໃບທີ່ເລືອກ? ສະຕັອກທີ່ຮັບເຂົ້າຈະຖືກຫັກຄືນ ແລະ ຈະລົບຖາວອນ (ກູ້ຄືນບໍ່ໄດ້)`)) return;
        if(deleteBtn.disabled) return;
        deleteBtn.disabled = true;
        try{
          await bulkVoidReceipts(ids);
          toast(`ລົບການຮັບເຂົ້າສຳເລັດ ${ids.length} ໃບ ຄືນສະຕັອກແລ້ວ`);
          renderTab();
        }catch(err){
          toast('ລົບບໍ່ໄດ້: ອາດມີສິນຄ້າຈາກໃບໃດໜຶ່ງທີ່ເລືອກຖືກຂາຍ/ໂອນໄປແລ້ວ — ລອງຍົກເລີກການເລືອກໃບນັ້ນແລ້ວລົບໃໝ່');
          deleteBtn.disabled = false;
        }
      });
    }
  }catch(err){
    el.innerHTML = `<div class="empty">ຜິດພາດ: ${err.message}</div>`;
  }
}
async function openReceiptDetail(receiptId, receipt){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal"><div class="empty">ກຳລັງໂຫລດ...</div></div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', (e)=>{ if(e.target === bg) bg.remove(); });
  const canSeeCost = currentRole === 'admin';
  try{
    const items = await getPurchaseReceiptItems(receiptId);
    bg.querySelector('.modal').innerHTML = `
      <h3><svg class="dv-icon"><use href="#i-truck"></use></svg><span class="mono">${receipt.receipt_no || 'ການຮັບເຂົ້າ'}</span></h3>
      <div class="muted" style="font-size:12px;margin-bottom:8px;">
        ${receipt.supplier_name ? 'ຈາກ: '+receipt.supplier_name : ''}<br>
        ${fmtDateDMY(receipt.receipt_date)}
      </div>
      <hr class="sep">
      ${items.length ? items.map(it=> `
        <div class="row">
          <span>${it.stock_product_models ? it.stock_product_models.name : '-'}${it.serial_no ? (' · <span class="mono">'+it.serial_no+'</span>') : (' × '+it.quantity)}</span>
          ${canSeeCost ? `<span class="mono">${fmtMoney(it.amount)}</span>` : ''}
        </div>`).join('') : '<div class="empty">ບໍ່ມີລາຍລະອຽດ</div>'}
      ${canSeeCost ? `<div class="invoice-total mono">ລວມ: ${fmtMoney(receipt.total_amount)}</div>` : ''}
      ${currentRole==='admin' ? `<button class="btn danger" id="rcvDeleteBtn" style="margin-top:16px;"><svg class="dv-icon"><use href="#i-trash"></use></svg>ລົບການຮັບເຂົ້ານີ້ (ຄືນສະຕັອກ)</button>` : ''}
      <button class="btn secondary" id="rcvDetailClose">ປິດ</button>
    `;
    if(currentRole==='admin'){
      bg.querySelector('#rcvDeleteBtn').addEventListener('click', async ()=>{
        if(!confirm(`ລົບການຮັບເຂົ້າ ${receipt.receipt_no || ''} ? ສະຕັອກທີ່ຮັບເຂົ້າຄັ້ງນີ້ຈະຖືກຫັກຄືນ ແລະ ຈະລົບຖາວອນ (ກູ້ຄືນບໍ່ໄດ້)`)) return;
        try{
          await voidReceipt(receiptId);
          toast('ລົບການຮັບເຂົ້າສຳເລັດ ຄືນສະຕັອກແລ້ວ');
          bg.remove();
          renderTab();
        }catch(err){
          toast('ລົບບໍ່ໄດ້ (ອາດມີສິນຄ້າຈາກຄັ້ງນີ້ຖືກຂາຍໄປແລ້ວ) — ລົບ/ຍົກເລີກບິນຂາຍທີ່ກ່ຽວຂ້ອງກ່ອນ');
        }
      });
    }
    bg.querySelector('#rcvDetailClose').addEventListener('click', ()=> bg.remove());
  }catch(err){
    bg.querySelector('.modal').innerHTML = `<div class="empty">ຜິດພາດ: ${err.message}</div><button class="btn secondary" id="rcvDetailClose2">ປິດ</button>`;
    bg.querySelector('#rcvDetailClose2').addEventListener('click', ()=> bg.remove());
  }
}
/* ລົບການຮັບເຂົ້າ: ຖ້າມີເລກເຄື່ອງທີ່ຂາຍໄປແລ້ວຈາກຄັ້ງນີ້ ຈະລົບບໍ່ໄດ້ (unit ຈະຕິດ FK ກັບບິນຂາຍ) */
async function voidReceipt(receiptId){
  const movements = await sb(`stock_movements?select=id,unit_id&ref_type=eq.purchase&ref_id=eq.${receiptId}`);
  await Promise.all(movements.map(mv=>{
    if(mv.unit_id){
      return sb(`stock_product_units?id=eq.${mv.unit_id}`, { method:'DELETE' });
    }
    return Promise.resolve();
  }));
  await sb(`stock_movements?ref_type=eq.purchase&ref_id=eq.${receiptId}`, { method:'DELETE' });
  await sb(`stock_purchase_receipts?id=eq.${receiptId}`, { method:'DELETE' });
}
/* ລົບໃບຮັບເຂົ້າຫຼາຍໃບພ້ອມກັນ ດ້ວຍ 4 request ລວມ (ບໍ່ວ່າຈະເລືອກຈັກໃບ) ແທນທີ່ຈະລົບເທື່ອລະໃບ (ໄວກວ່າຫຼາຍເມື່ອເລືອກຫຼາຍໆໃບ) — ຕ້ອງລົບ unit ກ່ອນ movement ຄືເກົ່າ ເພື່ອໃຫ້ FK ກວດ "ຂາຍໄປແລ້ວບໍ່ໃຫ້ລົບ" ຍັງເຮັດວຽກຄືເດີມ */
async function bulkVoidReceipts(ids){
  const idList = ids.join(',');
  const movements = await sb(`stock_movements?select=unit_id&ref_type=eq.purchase&ref_id=in.(${idList})`);
  const unitIds = [...new Set(movements.filter(m=> m.unit_id).map(m=> m.unit_id))];
  if(unitIds.length){
    await sb(`stock_product_units?id=in.(${unitIds.join(',')})`, { method:'DELETE' });
  }
  await sb(`stock_movements?ref_type=eq.purchase&ref_id=in.(${idList})`, { method:'DELETE' });
  await sb(`stock_purchase_receipts?id=in.(${idList})`, { method:'DELETE' });
}
