<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ງານເງິນຮ້ານດາວອນ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Phetsarath OT','Noto Sans Lao','Sarabun',sans-serif; background:#1a1a2e; min-height:100vh; color:#e0e0e0; transition:background 0.3s; }
  body.light { background:#f4f1eb !important; color:#1a1a1a !important; }
  body.light .app { background:#f4f1eb !important; }
  body.light .home { background:#f4f1eb !important; }
  body.light .app-title { color:#1a1a1a !important; }
  body.light .app-sub { color:#777 !important; }
  body.light .pin-wrap { background:#f4f1eb !important; }
  body.light .pin-title { color:#1a1a1a !important; }
  body.light .pin-key { background:#fff !important; color:#1a1a1a !important; border-color:#ddd !important; }
  body.light .dept-grid { background:#f4f1eb !important; }
  body.light .dept-grid h2 { color:#1a1a1a !important; }
  body.light .dept-card { background:#fff !important; }
  body.light .form-scroll { background:#f4f1eb !important; }
  body.light .lbl { color:#444 !important; }
  body.light .inp { background:#fff !important; color:#1a1a1a !important; border-color:#ddd !important; }
  body.light .photo-btn { background:#fafafa !important; color:#555 !important; border-color:#bbb !important; }
  body.light .admin-wrap { background:#f4f1eb !important; }
  body.light .record-card { background:#fff !important; }
  body.light .dept-summary { background:#fff !important; }
  body.light .tab { background:#fff !important; color:#777 !important; border-color:#ddd !important; }
  body.light .section-title { color:#999 !important; }
  body.light .record-dept { color:#1a1a1a !important; }
  body.light .record-time { color:#aaa !important; }
  body.light .record-name { color:#555 !important; }
  body.light .dept-sum-row { color:#1a1a1a !important; border-color:#f0f0f0 !important; }
  body.light .done-box { background:#fff !important; }
  body.light .done-title { color:#1a1a1a !important; }
  body.light .modal { background:#fff !important; color:#1a1a1a !important; }
  body.light .backup-modal { background:#fff !important; color:#1a1a1a !important; }
  body.light .modal-info { color:#444 !important; }
  body.light .btn-cancel { background:#fff !important; color:#555 !important; border-color:#ddd !important; }
  body.light .view-btn { background:#fff !important; color:#555 !important; border-color:#ddd !important; }
  body.light .cur-btn { background:#fff !important; color:#555 !important; border-color:#ddd !important; }
  body.light .cur-active { background:#e8f5e9 !important; color:#2d6a4f !important; border-color:#2d6a4f !important; }
  body.light .restore-btn { background:#fff !important; }
  body.light .clear-btn { background:#fff !important; }
  body.light .backup-textarea { background:#f9fef9 !important; color:#1a1a1a !important; }
  body.light .admin-scroll { background:#f4f1eb !important; }
  body.light .month-picker { background:#fff !important; color:#1a1a1a !important; border-color:#ddd !important; }
  .app { max-width:480px; margin:0 auto; min-height:100vh; background:#1a1a2e; }
  button { font-family:inherit; cursor:pointer; }
  input { font-family:inherit; font-size:16px; }
  * { touch-action: manipulation; }
  button { touch-action: manipulation; }

  /* HOME */
  .home { display:flex; flex-direction:column; align-items:center; padding:40px 20px; background:#1a1a2e; }
  .logo { width:150px; height:150px; border-radius:50%; object-fit:cover; margin-bottom:8px; }
  .app-title { font-size:24px; font-weight:800; color:#ffffff; text-align:center; margin-bottom:4px; }
  .app-sub { font-size:13px; color:#aaa; margin-bottom:32px; text-align:center; }
  .home-cards { display:flex; flex-direction:column; gap:14px; width:100%; }
  .home-card { display:flex; flex-direction:column; align-items:flex-start; padding:20px 24px; border-radius:16px; border:none; color:#fff; text-align:left; box-shadow:0 4px 20px rgba(0,0,0,0.15); transition:opacity 0.1s; }
  .home-card:active { opacity:0.85; }
  .card-icon { font-size:32px; margin-bottom:6px; }
  .card-title { font-size:20px; font-weight:700; }
  .card-sub { font-size:13px; opacity:0.8; margin-top:2px; }
  .sync-note { margin-top:16px; font-size:11px; color:#bbb; text-align:center; }
  .theme-btn { position:fixed; bottom:20px; right:20px; width:48px; height:48px; border-radius:50%; border:none; font-size:22px; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.3); z-index:999; display:flex; align-items:center; justify-content:center; }
  .theme-btn.dark { background:#16213e; color:#ffd700; }
  .theme-btn.light { background:#fff; color:#1a1a2e; }

  /* HEADER */
  .header { background:#1a1a1a; color:#fff; display:flex; align-items:center; padding:14px 16px; gap:12px; position:sticky; top:0; z-index:10; }
  .header-back { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:0 8px 0 0; }
  .header-title { font-size:16px; font-weight:700; }

  /* PIN */
  .pin-wrap { display:flex; flex-direction:column; align-items:center; padding:30px 20px; min-height:100vh; background:#1a1a2e; }
  .pin-title { font-size:20px; font-weight:700; color:#ffffff; margin:20px 0 30px; }
  .pin-dots { display:flex; gap:16px; margin-bottom:12px; }
  .pin-dot { width:18px; height:18px; border-radius:50%; background:#ddd; transition:background 0.2s; }
  .pin-dot.filled { background:#1a3a5c; }
  .pin-dot.error { background:#e74c3c; }
  .pin-error { color:#e74c3c; font-size:13px; margin-bottom:10px; }
  .pin-grid { display:grid; grid-template-columns:repeat(3, 80px); gap:12px; margin-top:20px; }
  .pin-key { width:80px; height:80px; border-radius:16px; border:1.5px solid #444; background:#16213e; color:#fff; font-size:26px; font-weight:700; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .pin-key.del { background:#fff2f2; color:#e74c3c; }
  .pin-key.empty { background:transparent; border:none; box-shadow:none; cursor:default; }

  /* FORM */
  .form-scroll { overflow-y:auto; -webkit-overflow-scrolling:touch; height:calc(100vh - 52px); background:#1a1a2e; }
  .form-container { padding:20px 16px; display:flex; flex-direction:column; gap:16px; }
  .back-btn { background:none; border:none; font-size:15px; color:#2d6a4f; cursor:pointer; text-align:left; padding:0; font-family:inherit; }
  .dept-badge { border-radius:12px; padding:14px 18px; display:flex; align-items:center; gap:12px; color:#fff; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .lbl { font-size:14px; font-weight:600; color:#ccc; }
  .inp { padding:12px 14px; border-radius:10px; border:1.5px solid #444; font-size:16px; font-family:inherit; outline:none; background:#16213e; color:#fff; width:100%; }
  .amount-preview { font-size:13px; color:#2d6a4f; font-weight:700; margin-top:2px; }
  .amount-preview.thb { color:#2980b9; }
  .photo-btn { padding:16px; border-radius:10px; border:2px dashed #555; background:#16213e; font-size:14px; cursor:pointer; font-family:inherit; color:#aaa; width:100%; }
  .img-preview-wrap { position:relative; border-radius:12px; overflow:hidden; }
  .img-preview { width:100%; display:block; }
  .rephoto-btn { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); color:#fff; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-family:inherit; font-size:13px; }
  .warn-box { background:#fff3cd; border:1px solid #ffc107; border-radius:10px; padding:10px 14px; font-size:13px; color:#856404; text-align:center; }
  .btn-green { background:#2d6a4f; color:#fff; border:none; border-radius:12px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; width:100%; margin-bottom:32px; }
  .btn-green:disabled { opacity:0.4; cursor:not-allowed; }

  /* DONE */
  .center { display:flex; justify-content:center; align-items:center; min-height:80vh; }
  .done-box { background:#16213e; border-radius:20px; padding:40px 30px; text-align:center; box-shadow:0 4px 30px rgba(0,0,0,0.5); display:flex; flex-direction:column; align-items:center; gap:12px; width:90%; max-width:360px; }
  .done-check { width:72px; height:72px; border-radius:50%; background:#2d6a4f; color:#fff; font-size:36px; display:flex; align-items:center; justify-content:center; }
  .done-title { font-size:22px; font-weight:800; color:#fff; }
  .done-sub { font-size:14px; color:#777; }
  .done-amount { font-size:26px; font-weight:800; color:#2d6a4f; }
  .done-amount.thb { color:#2980b9; }

  /* DEPT GRID */
  .dept-grid { padding:20px 16px; background:#1a1a2e; min-height:100vh; }
  .dept-grid h2 { font-size:18px; font-weight:700; color:#ffffff; margin-bottom:16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .dept-card { background:#16213e; border:2px solid; border-radius:14px; padding:16px 12px; min-height:130px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.3); transition:opacity 0.1s; }
  .dept-card:active { opacity:0.8; }
  .dept-icon { font-size:40px; }
  .dept-name { font-size:13px; font-weight:700; text-align:center; }

  /* ADMIN */
  .admin-wrap { padding:16px; padding-bottom:40px; background:#1a1a2e; min-height:100vh; }
  .total-card { background:linear-gradient(135deg,#1a3a5c,#2d6a4f); border-radius:18px; padding:24px; color:#fff; text-align:center; margin-bottom:16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
  .total-label { font-size:13px; opacity:0.8; margin-bottom:4px; }
  .total-amount { font-size:30px; font-weight:800; }
  .total-amount2 { font-size:22px; font-weight:800; margin-top:4px; }
  .total-count { font-size:12px; opacity:0.7; margin-top:4px; }
  .pending-badge { margin-top:8px; background:rgba(255,255,255,0.2); border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; display:inline-block; }
  .tabs { display:flex; gap:8px; margin-bottom:12px; }
  .tab { flex:1; padding:10px; border-radius:10px; border:1.5px solid #444; background:#16213e; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; color:#aaa; }
  .tab.active { background:#1a3a5c; color:#fff; border-color:#1a3a5c; }

  /* Month filter */
  .month-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
  .month-picker { flex:1; padding:10px 12px; border-radius:10px; border:1.5px solid #444; background:#16213e; color:#ccc; font-family:inherit; font-size:14px; outline:none; }
  .month-label { font-size:13px; color:#aaa; white-space:nowrap; }

  .backup-row { display:flex; gap:10px; margin-bottom:10px; }
  .backup-btn { flex:1; padding:12px; border-radius:10px; border:none; background:#2d5a8e; color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .restore-btn { flex:1; padding:12px; border-radius:10px; border:1.5px solid #4a8fd4; background:#16213e; color:#4a8fd4; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .clear-btn { width:100%; padding:12px; border-radius:10px; border:1.5px solid #e74c3c; background:#16213e; color:#e74c3c; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-bottom:14px; }
  .clear-btn-safe { width:100%; padding:12px; border-radius:10px; border:1.5px solid #f39c12; background:#16213e; color:#f39c12; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; margin-bottom:14px; }
  .restore-msg { background:#f0f9f0; border:1px solid #b2dfdb; border-radius:10px; padding:10px 14px; font-size:13px; color:#2d6a4f; text-align:center; margin-bottom:12px; }
  .dept-summary { background:#16213e; border-radius:14px; padding:14px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .section-title { font-size:12px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .dept-sum-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #2a2a4a; font-size:13px; color:#ccc; }
  .record-card { background:#16213e; border-radius:12px; padding:14px; margin-bottom:10px; border-left:4px solid; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .record-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .record-dept { font-size:14px; font-weight:700; color:#fff; }
  .record-amt { font-size:15px; font-weight:800; }
  .record-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .record-time { font-size:11px; color:#888; }
  .status-badge { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .status-wait { background:#fff8e1; color:#f39c12; }
  .status-done { background:#e8f5e9; color:#27ae60; }
  .record-name { font-size:12px; color:#aaa; margin-bottom:8px; }
  .record-actions { display:flex; gap:8px; }
  .view-btn { flex:1; padding:8px; border-radius:8px; border:1.5px solid #444; background:#1a1a2e; color:#ccc; cursor:pointer; font-family:inherit; font-size:12px; }
  .verify-btn { flex:1; padding:8px; border-radius:8px; border:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:700; color:#fff; }
  .verify-btn.wait { background:#fff8e1; color:#f39c12; }
  .verify-btn.done { background:#27ae60; }
  .delete-btn { padding:8px 12px; border-radius:8px; border:none; background:#fdecea; color:#e74c3c; cursor:pointer; font-family:inherit; font-size:16px; font-weight:700; }
  .empty { text-align:center; color:#bbb; padding:40px; font-size:14px; }
  .loading { text-align:center; color:#aaa; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:12px; }
  .loading-icon { font-size:40px; }
  .safety-note { background:#1a3a5c; border-radius:10px; padding:12px 14px; font-size:12px; color:#7fb3d3; margin-bottom:12px; line-height:1.6; }
  .archive-banner { background:#2d4a1a; border-radius:10px; padding:10px 14px; font-size:12px; color:#7dc47d; margin-bottom:12px; text-align:center; }

  /* OVERLAY */
  .overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:100; }
  .modal { background:#16213e; border-radius:20px; padding:32px 24px; text-align:center; width:80%; max-width:320px; display:flex; flex-direction:column; align-items:center; gap:10px; color:#fff; }
  .modal-img-box { background:#fff; border-radius:16px; overflow:hidden; width:90%; max-width:420px; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; background:#1a1a1a; color:#fff; font-size:14px; font-weight:600; }
  .modal-img { width:100%; display:block; }
  .modal-info { padding:14px 16px; font-size:13px; line-height:1.8; color:#ccc; text-align:left; width:100%; }
  .modal-actions { display:flex; gap:12px; width:100%; }
  .btn-cancel { flex:1; padding:13px; border-radius:12px; border:1.5px solid #555; background:#1a1a2e; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; color:#ccc; }
  .btn-delete { flex:1; padding:13px; border-radius:12px; border:none; background:#e74c3c; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .backup-modal { background:#16213e; border-radius:20px; padding:24px; width:92%; max-width:420px; max-height:85vh; overflow-y:auto; display:flex; flex-direction:column; align-items:center; gap:10px; color:#fff; }
  .backup-textarea { width:100%; height:220px; font-size:12px; padding:10px; border-radius:10px; border:1.5px solid #2d6a4f; font-family:monospace; line-height:1.6; resize:none; background:#f9fef9; }
  .hidden { display:none; }
  .pin-input-confirm { margin-top:12px; padding:12px; border-radius:10px; border:1.5px solid #555; background:#1a1a2e; color:#fff; font-size:18px; font-family:inherit; text-align:center; width:140px; letter-spacing:8px; outline:none; }
</style>

let supa = null;
function getSupa() {
  if (!supa) supa = supabase.createClient(SUPA_URL, SUPA_KEY);
  return supa;
}

// ══════════════════════════════════════════════════
// DATABASE — ເກັບຮັກສາຂໍ້ມູນທຸກລາຍການໄວ້ຕະຫຼອດ
// ══════════════════════════════════════════════════
async function dbGet() {
  try {
    const { data, error } = await Promise.race([
      getSupa().from("records").select("*").order("timestamp", {ascending:true}),
      new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), 8000))
    ]);
    if (error || !data) return getCached();
    const records = data.map(r => ({
      id: r.id, timestamp: r.timestamp,
      department: r.department, departmentName: r.department_name,
      amount: Number(r.amount), currency: r.currency||"LAK",
      note: r.note||"", image: r.image||null,
      verified: r.verified||false, approved: r.approved||false,
    }));
    try { localStorage.setItem("dv_cache", JSON.stringify(records)); } catch {}
    return records;
  } catch(e) {
    console.error(e);
    return getCached();
  }
}

function getCached() {
  try {
    const c = localStorage.getItem("dv_cache");
    return c ? JSON.parse(c) : [];
  } catch { return []; }
}

async function dbSave(rec) {
  const { error } = await getSupa().from("records").insert({
    id: rec.id, timestamp: rec.timestamp,
    department: rec.department, department_name: rec.departmentName,
    amount: rec.amount, currency: rec.currency||"LAK",
    note: rec.note||"", image: rec.image||null,
    verified: false, approved: false,
  });
  if (error) throw error;
}

async function dbUpdate(id, patch) {
  await getSupa().from("records").update(patch).eq("id", id);
}

async function dbDelete(id) {
  const { error } = await getSupa().from("records").delete().eq("id", id);
  if (error) throw error;
}

async function dbDeleteByMonth(year, month) {
  // month: 1-12
  const start = new Date(year, month-1, 1).getTime();
  const end   = new Date(year, month, 1).getTime() - 1;
  const { error } = await getSupa().from("records")
    .delete()
    .gte("timestamp", start)
    .lte("timestamp", end);
  if (error) throw error;
}

function fmtKIP(n) { return (n||0).toLocaleString("lo-LA") + " ກີບ"; }
function fmtTHB(n) { return (n||0).toLocaleString("th-TH") + " ບາດ"; }
function fmtAmt(n,c) { return c==="THB" ? fmtTHB(n) : fmtKIP(n); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString("lo-LA",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function fmtNum(d) { return d ? d.replace(/\B(?=(\d{3})+(?!\d))/g,".") : ""; }
function todayKey() { const d=new Date(); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function monthKey() { const d=new Date(); return d.getFullYear()+"-"+d.getMonth(); }
function nowYearMonth() { const d=new Date(); return { y:d.getFullYear(), m:d.getMonth()+1 }; }
function monthName(y,m) {
  return new Date(y,m-1,1).toLocaleDateString("lo-LA",{month:"long",year:"numeric"});
}

function compressImg(dataUrl) {
  return new Promise(res => {
    const i = new Image();
    i.onload = () => {
      const MAX=500; let w=i.width,h=i.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(i,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.4));
    };
    i.onerror=()=>res(null); i.src=dataUrl;
  });
}

let state = { mode:null, pin:null };
function render() {
  if (adminInterval) { clearInterval(adminInterval); adminInterval = null; }
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (state.pin==="admin") { app.innerHTML = pinHTML("🔐 ລະຫັດຜູ້ອານຸມັດ","admin"); return; }
  if (state.pin==="owner") { app.innerHTML = pinHTML("🔐 ລະຫັດຫົວໜ້າ","owner"); return; }
  if (state.mode==="staff") {
    app.innerHTML = headerHTML("ສົ່ງຍອດ & ຖ່າຍຮູບບິນ");
    app.insertAdjacentHTML("beforeend", deptGridHTML());
    return;
  }
  if (state.mode==="admin"||state.mode==="owner") {
    app.innerHTML = headerHTML(state.mode==="owner"?"👑 ຫົວໜ້າ — ເບິ່ງຍອດເງິນ":"🔍 ກຳລັງກວດສອບ") + adminLoadingHTML();
    loadAdmin();
    return;
  }
  app.innerHTML = homeHTML();
}

// ── PIN ─────────────────────────────────────────────────
let pinVal = "";
function pinHTML(title, target) {
  pinVal = "";
  return `<div class="pin-wrap">
    <button class="back-btn" onclick="state.pin=null;render()">← ກັບ</button>
    <div class="pin-title">${title}</div>
    <div class="pin-dots" id="pin-dots">
      ${[0,1,2,3].map(()=>'<div class="pin-dot"></div>').join("")}
    </div>
    <div id="pin-error" class="pin-error hidden"></div>
    <div class="pin-grid">
      ${["1","2","3","4","5","6","7","8","9","","0","DEL"].map(k=>
        k===""?'<button class="pin-key empty" disabled></button>':
        `<button class="pin-key ${k==="DEL"?"del":""}" onclick="tapPin('${k}','${target}')">${k==="DEL"?"⌫":k}</button>`
      ).join("")}
    </div>
  </div>`;
}
function tapPin(k, target) {
  if (k==="DEL") { pinVal=pinVal.slice(0,-1); updateDots(false); return; }
  pinVal += k;
  updateDots(false);
  if (pinVal.length===4) {
    const correct = target==="admin" ? ADMIN_PIN : OWNER_PIN;
    if (pinVal===correct) { state.pin=null; state.mode=target; render(); }
    else { updateDots(true); setTimeout(()=>{ pinVal=""; updateDots(false); },500); }
  }
}
function updateDots(error) {
  const dots = document.querySelectorAll(".pin-dot");
  dots.forEach((d,i) => {
    d.className = "pin-dot" + (i<pinVal.length ? (error?" error":" filled") : "");
  });
  const err = document.getElementById("pin-error");
  if (err) { err.textContent = error?"ລະຫັດບໍ່ຖືກຕ້ອງ":""; err.className = "pin-error"+(error?"":" hidden"); }
}

function backToDept() {
  staffState = { step:"dept", dept:null, rawLAK:"", rawTHB:"", name:"", img:null, saving:false };
  const app = document.getElementById("app");
  const header = app.querySelector(".header");
  app.innerHTML = "";
  app.appendChild(header);
  app.insertAdjacentHTML("beforeend", deptGridHTML());
}

function onAmtInput(el, cur) {
  const digits = el.value.replace(/\D/g,"");
  if (cur==="LAK") staffState.rawLAK=digits; else staffState.rawTHB=digits;
  el.value = fmtNum(digits);
  const num = digits ? parseInt(digits,10) : 0;
  if (cur==="LAK") {
    const p=document.getElementById("preview-lak");
    if(p){p.textContent=fmtKIP(num);p.style.display=digits?"block":"none";}
  } else {
    const p=document.getElementById("preview-thb");
    if(p){p.textContent=fmtTHB(num);p.style.display=digits?"block":"none";}
  }
  const numLAK = staffState.rawLAK?parseInt(staffState.rawLAK,10):0;
  const numTHB = staffState.rawTHB?parseInt(staffState.rawTHB,10):0;
  const btn=document.getElementById("submit-btn");
  if(btn){btn.disabled=!(numLAK>0||numTHB>0);}
}

function onFileChange(el) {
  const file=el.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async ev=>{
    const compressed=await compressImg(ev.target.result);
    staffState.img=compressed;
    const inner=document.getElementById("form-inner");
    if(inner)inner.innerHTML=formBodyHTML();
  };
  r.readAsDataURL(file);
}

async function submitRecord() {
  const numLAK=staffState.rawLAK?parseInt(staffState.rawLAK,10):0;
  const numTHB=staffState.rawTHB?parseInt(staffState.rawTHB,10):0;
  if(numLAK<=0&&numTHB<=0) return;
  staffState.saving=true;
  const btn=document.getElementById("submit-btn");
  if(btn){btn.disabled=true;btn.textContent="⏳ ກຳລັງສົ່ງ...";}
  try {
    const ts = Date.now();
    if(numLAK>0) await dbSave({id:ts,timestamp:ts,department:staffState.dept.id,departmentName:staffState.dept.name,amount:numLAK,currency:"LAK",note:staffState.name,image:staffState.img});
    if(numTHB>0) await dbSave({id:ts+1,timestamp:ts,department:staffState.dept.id,departmentName:staffState.dept.name,amount:numTHB,currency:"THB",note:staffState.name,image:numLAK>0?null:staffState.img});
    showDone(numLAK,numTHB);
  } catch(e) {
    console.error(e);
    alert("ເກີດຂໍ້ຜິດພາດ ກະລຸນາລອງໃໝ່: "+e.message);
    staffState.saving=false;
    const btn=document.getElementById("submit-btn");
    if(btn){btn.disabled=false;btn.textContent="✓ ສົ່ງຂໍ້ມູນ";}
  }
}

function showDone(numLAK,numTHB) {
  const d=staffState.dept;
  const app=document.getElementById("app");
  const header=app.querySelector(".header");
  app.innerHTML="";
  app.appendChild(header);
  app.insertAdjacentHTML("beforeend",`<div class="center"><div class="done-box">
    <div class="done-check">✓</div>
    <div class="done-title">ສົ່ງຂໍ້ມູນສຳເລັດ!</div>
    <div class="done-sub">ພະແນກ: ${d.name}</div>
    ${numLAK>0?`<div class="done-amount">${fmtKIP(numLAK)}</div>`:""}
    ${numTHB>0?`<div class="done-amount thb">${fmtTHB(numTHB)}</div>`:""}
    <button class="btn-green" onclick="backToDept()" style="margin-bottom:0">ສົ່ງລາຍການໃໝ່</button>
  </div></div>`);
}

let adminRecords=[], adminTab="today", adminInterval=null;
// filterMonth: null = ທຸກເດືອນ, "YYYY-M" = ກັ່ນຕອງ
let filterMonth = null;

function adminLoadingHTML() {
  return `<div class="loading"><div class="loading-icon">☁️</div><div>ກຳລັງໂຫຼດຂໍ້ມູນ...</div></div>`;
}

async function loadAdmin() {
  if(adminInterval) clearInterval(adminInterval);
  const cached = getCached();
  if (cached.length > 0) { adminRecords = cached; renderAdmin(); }
  await refreshAdmin();
  adminInterval = setInterval(refreshAdmin, 15000);
}

async function refreshAdmin() {
  const newRecords = await dbGet();
  const changed = JSON.stringify(newRecords) !== JSON.stringify(adminRecords);
  if (!changed) return;
  adminRecords = newRecords;
  const scrollEl = document.querySelector(".admin-scroll");
  const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
  renderAdmin();
  requestAnimationFrame(() => {
    const el = document.querySelector(".admin-scroll");
    if (el && scrollTop > 0) el.scrollTop = scrollTop;
  });
}

// ══════════════════════════════════════════════════
// ກັ່ນຕອງຂໍ້ມູນ — ເກັບທຸກເດືອນ ບໍ່ລຶບ
// ══════════════════════════════════════════════════
function getFiltered() {
  const isOwner = state.mode==="owner";
  return adminRecords.filter(r => {
    // ຖ້າເປັນ owner ສະແດງແຕ່ verified
    if(isOwner && !r.verified) return false;
    const d = new Date(r.timestamp);
    const rk = d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();
    const rm = d.getFullYear()+"-"+(d.getMonth()+1); // YYYY-M (1-based)
    const rmOld = d.getFullYear()+"-"+d.getMonth();  // old format for today/month tabs

    if (adminTab==="today") return rk===todayKey();
    if (adminTab==="month") {
      if (filterMonth) return rm === filterMonth;
      return rmOld===monthKey(); // default = this month
    }
    // "all" tab
    if (filterMonth) return rm === filterMonth;
    return true;
  });
}

// ── ສ້າງ list ເດືອນທີ່ມີຂໍ້ມູນ ──
function getAvailableMonths() {
  const months = new Set();
  adminRecords.forEach(r => {
    const d = new Date(r.timestamp);
    months.add(d.getFullYear()+"-"+(d.getMonth()+1));
  });
  return [...months].sort().reverse(); // ໃໝ່ສຸດກ່ອນ
}

function recordsHTML(filtered, isOwner) {
  if(filtered.length===0) return `<div class="empty">${isOwner?"ຍັງບໍ່ມີລາຍການ ສຳເລັດ":"ຍັງບໍ່ມີລາຍການ"}</div>`;
  return [...filtered].reverse().map(r=>{
    const dept=DEPTS.find(d=>d.id===r.department)||{icon:"📦",name:r.departmentName,color:"#999"};
    return `<div class="record-card" style="border-left-color:${dept.color}">
      <div class="record-top">
        <span class="record-dept">${dept.icon} ${r.departmentName}</span>
        <span class="record-amt" style="color:${dept.color}">${fmtAmt(r.amount,r.currency||"LAK")}</span>
      </div>
      <div class="record-meta">
        <span class="record-time">${fmtDate(r.timestamp)} ${r.currency==="THB"?"🇹🇭":"🇱🇦"}</span>
        <span class="status-badge ${r.verified?"status-done":"status-wait"}">${r.verified?"✅ ສຳເລັດ":"⏳ ລໍ້ຖ້າ"}</span>
      </div>
      ${r.note?`<div class="record-name">👤 ${r.note}</div>`:""}
      <div class="record-actions">
        ${r.image?`<button class="view-btn" onclick="viewBill(${r.id})">🖼 ເບິ່ງບິນ</button>`:""}
        ${!isOwner?`<button class="verify-btn ${r.verified?"done":"wait"}" onclick="tapVerify(${r.id})">${r.verified?"✅ ສຳເລັດ":"⏳ ກົດຢືນຢັນ"}</button>`:""}
        ${!isOwner?`<button class="delete-btn" onclick="confirmDelete(${r.id})">🗑</button>`:""}
      </div>
    </div>`;
  }).join("");
}

function renderAdmin() {
  const app=document.getElementById("app");
  const header=app.querySelector(".header");
  if(!header) return;
  const isOwner=state.mode==="owner";
  const filtered=getFiltered();
  const pending=adminRecords.filter(r=>!r.verified).length;
  const totalLAK=filtered.filter(r=>!r.currency||r.currency==="LAK").reduce((s,r)=>s+r.amount,0);
  const totalTHB=filtered.filter(r=>r.currency==="THB").reduce((s,r)=>s+r.amount,0);

  // ຕາຕະລາງຈຳນວນຕາມພະແນກ
  const byDept=DEPTS.map(d=>{
    const rows=filtered.filter(r=>r.department===d.id);
    const lak=rows.filter(r=>!r.currency||r.currency==="LAK").reduce((s,r)=>s+r.amount,0);
    const thb=rows.filter(r=>r.currency==="THB").reduce((s,r)=>s+r.amount,0);
    return {...d,lak,thb,count:rows.length};
  }).filter(d=>d.lak>0||d.thb>0);

  // ── Month picker (ສຳລັບ tab all/month) ──
  const months = getAvailableMonths();
  const {y:ny, m:nm} = nowYearMonth();
  const thisMonthKey = ny+"-"+nm;
  const monthPickerHTML = (adminTab==="month"||adminTab==="all") ? `
    <div class="month-row">
      <span class="month-label">📅 ເດືອນ:</span>
      <select class="month-picker" onchange="setFilterMonth(this.value)">
        <option value="">ທຸກເດືອນ</option>
        ${months.map(mk => {
          const [my,mm] = mk.split("-").map(Number);
          return `<option value="${mk}" ${filterMonth===mk?"selected":""}>${monthName(my,mm)}</option>`;
        }).join("")}
      </select>
    </div>` : "";

  // ── Dept summary ──
  let deptHTML = "";
  if(byDept.length>0) {
    deptHTML = `<div class="dept-summary"><div class="section-title">ສະຫຼຸບຕາມພະແນກ</div>
      ${byDept.map(d=>`<div class="dept-sum-row">
        <span>${d.icon} ${d.name}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          ${d.lak>0?`<span style="font-weight:700;font-size:13px;color:${d.color}">${fmtKIP(d.lak)}</span>`:""}
          ${d.thb>0?`<span style="font-weight:700;font-size:13px;color:#2980b9">${fmtTHB(d.thb)}</span>`:""}
          <span style="font-size:11px;color:#aaa">${d.count} ລາຍການ</span>
        </div>
      </div>`).join("")}
    </div>`;
  }

  // ── Label ──
  let tabLabel = adminTab==="today" ? "ຍອດລວມມື້ນີ້"
               : adminTab==="month" ? (filterMonth ? monthName(...filterMonth.split("-").map(Number)) : "ຍອດລວມເດືອນນີ້")
               : filterMonth ? monthName(...filterMonth.split("-").map(Number)) : "ຍອດລວມທັງໝົດ";

  // ── ປຸ່ມລ້າງຂໍ້ມູນ (ແຍກ: ລ້າງເດືອນ vs ລ້າງທັງໝົດ) ──
  const clearHTML = !isOwner ? `
    <div class="safety-note">
      🛡️ <b>ຂໍ້ມູນທຸກເດືອນຈະຖືກເກັບໄວ້ຕະຫຼອດ</b><br>
      ຖ້າຢາກລ້າງຂໍ້ມູນ ຕ້ອງໃສ່ PIN ຢືນຢັນທຸກຄັ້ງ
    </div>
    <div class="backup-row">
      <button class="backup-btn" onclick="doBackup()">📥 Backup ຂໍ້ຄວາມ</button>
      <button class="restore-btn" onclick="document.getElementById('restore-file').click()">📤 Restore JSON</button>
      <input type="file" id="restore-file" accept=".json" class="hidden" onchange="doRestore(this)">
    </div>
    <button class="backup-btn" style="width:100%;margin-bottom:10px;background:#1a6a4f" onclick="doBackupJSON()">💾 Export JSON (ສຳຮອງຂໍ້ມູນ)</button>
    <button class="clear-btn-safe" onclick="confirmClearMonth()">🗑 ລ້າງຂໍ້ມູນເດືອນທີ່ເລືອກ (ຕ້ອງ PIN)</button>
    <button class="clear-btn" onclick="confirmClearAll()">⚠️ ລ້າງຂໍ້ມູນທັງໝົດ (ຕ້ອງ PIN)</button>
  ` : "";

  const html = `<div class="admin-wrap">
    <div class="total-card">
      <div class="total-label">${tabLabel}</div>
      <div class="total-amount">${totalLAK>0?fmtKIP(totalLAK):""}</div>
      <div class="total-amount2">${totalTHB>0?fmtTHB(totalTHB):""}</div>
      ${totalLAK===0&&totalTHB===0?`<div class="total-amount">${fmtKIP(0)}</div>`:""}
      <div class="total-count">${filtered.length} ລາຍການ | ທັງໝົດໃນລະບົບ ${adminRecords.length} ລາຍການ</div>
      ${!isOwner&&pending>0?`<span class="pending-badge">⏳ ລໍ້ຖ້າກວດສອບ ${pending} ລາຍການ</span>`:""}
    </div>
    <div class="tabs">
      <button class="tab ${adminTab==="today"?"active":""}" data-tab="today" onclick="setTab('today')">ມື້ນີ້</button>
      <button class="tab ${adminTab==="month"?"active":""}" data-tab="month" onclick="setTab('month')">ເດືອນ</button>
      <button class="tab ${adminTab==="all"?"active":""}" data-tab="all" onclick="setTab('all')">ທັງໝົດ</button>
    </div>
    ${monthPickerHTML}
    ${deptHTML}
    ${clearHTML}
    <div class="section-title">ລາຍການ</div>
    <div id="rec-list">${recordsHTML(filtered, isOwner)}</div>
  </div>`;

  const existing = app.querySelector(".admin-scroll");
  if (existing) {
    existing.querySelector(".admin-wrap").outerHTML = html;
    // re-inject
    const newWrap = document.createElement("div");
    newWrap.innerHTML = html;
    existing.innerHTML = "";
    existing.appendChild(newWrap.firstElementChild);
    return;
  }

  const oldContent = app.querySelector(".admin-wrap,.loading");
  if(oldContent) oldContent.remove();
  const scrollDiv = document.createElement("div");
  scrollDiv.className = "admin-scroll";
  scrollDiv.style = "overflow-y:auto;-webkit-overflow-scrolling:touch;height:calc(100vh - 52px);background:#1a1a2e";
  scrollDiv.innerHTML = html;
  app.appendChild(scrollDiv);
}

function setTab(t) {
  adminTab = t;
  if (t==="today") filterMonth = null; // reset month filter when viewing today
  renderAdmin();
  const el = document.querySelector(".admin-scroll");
  if (el) el.scrollTo({top:0, behavior:"smooth"});
}

function setFilterMonth(val) {
  filterMonth = val || null;
  renderAdmin();
}

async function tapVerify(id) {
  const r=adminRecords.find(x=>x.id===id); if(!r) return;
  await dbUpdate(id,{approved:true, verified:!r.verified});
  await refreshAdmin();
}

function confirmDelete(id) {
  const r = adminRecords.find(x=>x.id===id); if(!r) return;
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `<div class="modal">
    <div style="font-size:44px">🗑️</div>
    <div style="font-size:18px;font-weight:800">ລຶບລາຍການນີ້?</div>
    <div style="font-size:13px;color:#aaa;margin-bottom:4px">${r.departmentName} — ${fmtAmt(r.amount,r.currency||"LAK")}</div>
    <div style="font-size:12px;color:#f39c12;margin-bottom:8px">ໃສ່ PIN ຫົວໜ້າເພື່ອຢືນຢັນ</div>
    <input type="password" inputmode="numeric" maxlength="4" placeholder="PIN" id="del-pin" class="pin-input-confirm">
    <div id="del-err" style="color:#e74c3c;font-size:12px;min-height:18px;margin-top:4px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="this.closest('.overlay').remove()">ຍົກເລີກ</button>
      <button class="btn-delete" onclick="checkAndDelete(${id},this)">ລຶບ</button>
    </div>
  </div>`;
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
  setTimeout(()=>{ const p=document.getElementById("del-pin"); if(p) p.focus(); },100);
}

async function checkAndDelete(id, btn) {
  const pin = document.getElementById("del-pin").value;
  if (pin !== CLEAR_CONFIRM_PIN) {
    document.getElementById("del-err").textContent = "PIN ບໍ່ຖືກຕ້ອງ";
    return;
  }
  btn.textContent = "⏳"; btn.disabled = true;
  try {
    await dbDelete(id);
    btn.closest(".overlay").remove();
    await refreshAdmin();
  } catch(e) {
    document.getElementById("del-err").textContent = "ລຶບບໍ່ສຳເລັດ: " + e.message;
    btn.textContent = "ລຶບ"; btn.disabled = false;
  }
}

async function doDeleteMonth(btn) {
  const pin = document.getElementById("delm-pin").value;
  if (pin !== CLEAR_CONFIRM_PIN) {
    document.getElementById("delm-err").textContent = "PIN ບໍ່ຖືກຕ້ອງ";
    return;
  }
  const sel = document.getElementById("del-month-sel").value;
  if (!sel) return;
  const [y,m] = sel.split("-").map(Number);
  btn.textContent = "⏳ ກຳລັງລ້າງ..."; btn.disabled = true;
  try {
    await dbDeleteByMonth(y, m);
    // update cache
    adminRecords = adminRecords.filter(r => {
      const d = new Date(r.timestamp);
      return !(d.getFullYear()===y && d.getMonth()+1===m);
    });
    try { localStorage.setItem("dv_cache", JSON.stringify(adminRecords)); } catch {}
    btn.closest(".overlay").remove();
    renderAdmin();
    alert(`ລ້າງຂໍ້ມູນ ${monthName(y,m)} ສຳເລັດ ✅`);
  } catch(e) {
    document.getElementById("delm-err").textContent = "ລ້າງບໍ່ສຳເລັດ: " + e.message;
    btn.textContent = "ລ້າງເດືອນ"; btn.disabled = false;
  }
}

// ── BACKUP TEXT ────────────────────────────────────────────
async function doBackup() {
  const all = await dbGet();
  const filtered = getFiltered();
  const d = new Date();
  const dateStr = d.toLocaleDateString("lo-LA",{day:"2-digit",month:"long",year:"numeric"});
  let lines = ["═══════════════════════","  ງານເງິນຮ້ານດາວອນ",`  ວັນທີ: ${dateStr}`,"═══════════════════════",""];
  let tLAK=0, tTHB=0;
  filtered.forEach((r,i)=>{
    const dt = new Date(r.timestamp);
    const time = dt.toLocaleTimeString("lo-LA",{hour:"2-digit",minute:"2-digit"});
    const dateR = dt.toLocaleDateString("lo-LA",{day:"2-digit",month:"short"});
    lines.push(`${i+1}. ${r.departmentName}`);
    if(r.note) lines.push(`   👤 ${r.note}`);
    lines.push(`   💰 ${fmtAmt(r.amount,r.currency||"LAK")}`);
    lines.push(`   🕐 ${dateR} ${time}`,"");
    if(r.currency==="THB") tTHB+=r.amount; else tLAK+=r.amount;
  });
  lines.push("───────────────────────","  ສະຫຼຸບຍອດລວມ");
  if(tLAK>0) lines.push(`  💵 ${fmtKIP(tLAK)}`);
  if(tTHB>0) lines.push(`  💵 ${fmtTHB(tTHB)}`);
  lines.push(`  📋 ທັງໝົດ ${filtered.length} ລາຍການ`,"═══════════════════════");
  const text = lines.join("\n");
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `<div class="backup-modal">
    <div style="font-size:36px">📋</div>
    <div style="font-size:18px;font-weight:800">Backup ຂໍ້ຄວາມ</div>
    <div style="font-size:12px;color:#aaa">ກົດທີ່ຊ່ອງດ້ານລຸ່ມ → Copy → Paste ໃນ Note/Line</div>
    <textarea class="backup-textarea" readonly onclick="this.select();navigator.clipboard.writeText(this.value).catch(()=>{})">${text}</textarea>
    <button class="btn-green" style="margin-bottom:0;width:100%" onclick="this.closest('.overlay').remove()">ປິດ</button>
  </div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
  try{navigator.clipboard.writeText(text);}catch{}
}

// ── BACKUP JSON ────────────────────────────────────────────
async function doBackupJSON() {
  const all = await dbGet();
  const json = JSON.stringify({
    exported: new Date().toISOString(),
    version: 2,
    records: all.map(r=>({...r, image:null})) // ບໍ່ export ຮູບ (ໃຫຍ່ເກີນ)
  }, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "daovone_backup_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(url);
}

// ── RESTORE JSON ───────────────────────────────────────────
function doRestore(el) {
  const file=el.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      const imported=data.records||data;
      if(!Array.isArray(imported)) throw new Error("ຮູບແບບ JSON ບໍ່ຖືກຕ້ອງ");
      const existing=await dbGet();
      const ids=new Set(existing.map(r=>r.id));
      const newRecs=imported.filter(r=>!ids.has(r.id));
      let ok=0, fail=0;
      for(const rec of newRecs) {
        try { await dbSave(rec); ok++; } catch { fail++; }
      }
      await refreshAdmin();
      alert(`ນຳເຂົ້າສຳເລັດ: ${ok} ລາຍການ${fail>0?" (ລ້ົ້ ​ +"+fail+" ລາຍການ)":""}`)
    } catch(e) { alert("ໄຟລ໌ JSON ບໍ່ຖືກຕ້ອງ: "+e.message); }
  };
  r.readAsText(file); el.value="";
}

// ── INIT ─────────────────────────────────────────────────
let isDark = localStorage.getItem("dv_theme") !== "light";
function applyTheme() {
  document.body.classList.toggle("light", !isDark);
  const btn = document.getElementById("theme-btn");
  if (btn) {
    btn.textContent = isDark ? "☀️" : "🌙";
    btn.className = "theme-btn " + (isDark ? "dark" : "light");
  }
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem("dv_theme", isDark ? "dark" : "light");
  applyTheme();
}

const themeBtn = document.createElement("button");
themeBtn.id = "theme-btn";
themeBtn.onclick = toggleTheme;
document.body.appendChild(themeBtn);

applyTheme();
render();
</script>
