<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ງານເງິນຮ້ານດາວອນ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Phetsarath OT','Noto Sans Lao','Sarabun',sans-serif; background:#f4f1eb; min-height:100vh; }
  .app { max-width:480px; margin:0 auto; min-height:100vh; }
  button { font-family:inherit; cursor:pointer; }
  input { font-family:inherit; }

  /* HOME */
  .home { display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
  .logo { width:150px; height:150px; border-radius:50%; object-fit:cover; margin-bottom:8px; }
  .app-title { font-size:24px; font-weight:800; color:#1a1a1a; text-align:center; margin-bottom:4px; }
  .app-sub { font-size:13px; color:#777; margin-bottom:32px; text-align:center; }
  .home-cards { display:flex; flex-direction:column; gap:14px; width:100%; }
  .home-card { display:flex; flex-direction:column; align-items:flex-start; padding:20px 24px; border-radius:16px; border:none; color:#fff; text-align:left; box-shadow:0 4px 20px rgba(0,0,0,0.15); transition:opacity 0.1s; }
  .home-card:active { opacity:0.85; }
  .card-icon { font-size:32px; margin-bottom:6px; }
  .card-title { font-size:20px; font-weight:700; }
  .card-sub { font-size:13px; opacity:0.8; margin-top:2px; }
  .sync-note { margin-top:16px; font-size:11px; color:#bbb; text-align:center; }

  /* HEADER */
  .header { background:#1a1a1a; color:#fff; display:flex; align-items:center; padding:14px 16px; gap:12px; position:sticky; top:0; z-index:10; }
  .header-back { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:0 8px 0 0; }
  .header-title { font-size:16px; font-weight:700; }

  /* PIN */
  .pin-wrap { display:flex; flex-direction:column; align-items:center; padding:30px 20px; min-height:100vh; background:#f4f1eb; }
  .pin-title { font-size:20px; font-weight:700; color:#1a1a1a; margin:20px 0 30px; }
  .pin-dots { display:flex; gap:16px; margin-bottom:12px; }
  .pin-dot { width:18px; height:18px; border-radius:50%; background:#ddd; transition:background 0.2s; }
  .pin-dot.filled { background:#1a3a5c; }
  .pin-dot.error { background:#e74c3c; }
  .pin-error { color:#e74c3c; font-size:13px; margin-bottom:10px; }
  .pin-grid { display:grid; grid-template-columns:repeat(3, 80px); gap:12px; margin-top:20px; }
  .pin-key { width:80px; height:80px; border-radius:16px; border:1.5px solid #ddd; background:#fff; font-size:26px; font-weight:700; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .pin-key.del { background:#fff2f2; color:#e74c3c; }
  .pin-key.empty { background:transparent; border:none; box-shadow:none; cursor:default; }

  /* FORM */
  .form-scroll { overflow-y:auto; -webkit-overflow-scrolling:touch; height:calc(100vh - 52px); }
  .form-container { padding:20px 16px; display:flex; flex-direction:column; gap:16px; }
  .back-btn { background:none; border:none; font-size:15px; color:#2d6a4f; cursor:pointer; text-align:left; padding:0; font-family:inherit; }
  .dept-badge { border-radius:12px; padding:14px 18px; display:flex; align-items:center; gap:12px; color:#fff; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .lbl { font-size:14px; font-weight:600; color:#444; }
  .inp { padding:12px 14px; border-radius:10px; border:1.5px solid #ddd; font-size:18px; font-family:inherit; outline:none; background:#fff; width:100%; }
  .amount-preview { font-size:13px; color:#2d6a4f; font-weight:700; margin-top:2px; }
  .amount-preview.thb { color:#2980b9; }
  .photo-btn { padding:16px; border-radius:10px; border:2px dashed #bbb; background:#fafafa; font-size:14px; cursor:pointer; font-family:inherit; color:#555; width:100%; }
  .img-preview-wrap { position:relative; border-radius:12px; overflow:hidden; }
  .img-preview { width:100%; display:block; }
  .rephoto-btn { position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); color:#fff; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; font-family:inherit; font-size:13px; }
  .warn-box { background:#fff3cd; border:1px solid #ffc107; border-radius:10px; padding:10px 14px; font-size:13px; color:#856404; text-align:center; }
  .btn-green { background:#2d6a4f; color:#fff; border:none; border-radius:12px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; width:100%; margin-bottom:32px; }
  .btn-green:disabled { opacity:0.4; cursor:not-allowed; }

  /* DONE */
  .center { display:flex; justify-content:center; align-items:center; min-height:80vh; }
  .done-box { background:#fff; border-radius:20px; padding:40px 30px; text-align:center; box-shadow:0 4px 30px rgba(0,0,0,0.1); display:flex; flex-direction:column; align-items:center; gap:12px; width:90%; max-width:360px; }
  .done-check { width:72px; height:72px; border-radius:50%; background:#2d6a4f; color:#fff; font-size:36px; display:flex; align-items:center; justify-content:center; }
  .done-title { font-size:22px; font-weight:800; color:#1a1a1a; }
  .done-sub { font-size:14px; color:#777; }
  .done-amount { font-size:26px; font-weight:800; color:#2d6a4f; }
  .done-amount.thb { color:#2980b9; }

  /* DEPT GRID */
  .dept-grid { padding:20px 16px; }
  .dept-grid h2 { font-size:18px; font-weight:700; color:#1a1a1a; margin-bottom:16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .dept-card { background:#fff; border:2px solid; border-radius:14px; padding:16px 12px; min-height:130px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.07); transition:opacity 0.1s; }
  .dept-card:active { opacity:0.8; }
  .dept-icon { font-size:40px; }
  .dept-name { font-size:13px; font-weight:700; text-align:center; }

  /* ADMIN */
  .admin-wrap { padding:16px; padding-bottom:40px; }
  .total-card { background:linear-gradient(135deg,#1a3a5c,#2d6a4f); border-radius:18px; padding:24px; color:#fff; text-align:center; margin-bottom:16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
  .total-label { font-size:13px; opacity:0.8; margin-bottom:4px; }
  .total-amount { font-size:30px; font-weight:800; }
  .total-amount2 { font-size:22px; font-weight:800; margin-top:4px; }
  .total-count { font-size:12px; opacity:0.7; margin-top:4px; }
  .pending-badge { margin-top:8px; background:rgba(255,255,255,0.2); border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; display:inline-block; }
  .tabs { display:flex; gap:8px; margin-bottom:16px; }
  .tab { flex:1; padding:10px; border-radius:10px; border:1.5px solid #ddd; background:#fff; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; color:#777; }
  .tab.active { background:#1a3a5c; color:#fff; border-color:#1a3a5c; }
  .backup-row { display:flex; gap:10px; margin-bottom:14px; }
  .backup-btn { flex:1; padding:12px; border-radius:10px; border:none; background:#1a3a5c; color:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .restore-btn { flex:1; padding:12px; border-radius:10px; border:1.5px solid #1a3a5c; background:#fff; color:#1a3a5c; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .restore-msg { background:#f0f9f0; border:1px solid #b2dfdb; border-radius:10px; padding:10px 14px; font-size:13px; color:#2d6a4f; text-align:center; margin-bottom:12px; }
  .dept-summary { background:#fff; border-radius:14px; padding:14px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .section-title { font-size:12px; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .dept-sum-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
  .record-card { background:#fff; border-radius:12px; padding:14px; margin-bottom:10px; border-left:4px solid; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .record-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .record-dept { font-size:14px; font-weight:700; }
  .record-amt { font-size:15px; font-weight:800; }
  .record-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .record-time { font-size:11px; color:#aaa; }
  .status-badge { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .status-wait { background:#fff8e1; color:#f39c12; }
  .status-done { background:#e8f5e9; color:#27ae60; }
  .record-name { font-size:12px; color:#555; margin-bottom:8px; }
  .record-actions { display:flex; gap:8px; }
  .view-btn { flex:1; padding:8px; border-radius:8px; border:1.5px solid #ddd; background:#fff; cursor:pointer; font-family:inherit; font-size:12px; }
  .verify-btn { flex:1; padding:8px; border-radius:8px; border:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:700; color:#fff; }
  .verify-btn.wait { background:#fff8e1; color:#f39c12; }
  .verify-btn.done { background:#27ae60; }
  .delete-btn { padding:8px 12px; border-radius:8px; border:none; background:#fdecea; color:#e74c3c; cursor:pointer; font-family:inherit; font-size:16px; font-weight:700; }
  .empty { text-align:center; color:#bbb; padding:40px; font-size:14px; }
  .loading { text-align:center; color:#aaa; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:12px; }
  .loading-icon { font-size:40px; }

  /* OVERLAY */
  .overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:100; }
  .modal { background:#fff; border-radius:20px; padding:32px 24px; text-align:center; width:80%; max-width:320px; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .modal-img-box { background:#fff; border-radius:16px; overflow:hidden; width:90%; max-width:420px; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; background:#1a1a1a; color:#fff; font-size:14px; font-weight:600; }
  .modal-img { width:100%; display:block; }
  .modal-info { padding:14px 16px; font-size:13px; line-height:1.8; color:#444; text-align:left; width:100%; }
  .modal-actions { display:flex; gap:12px; width:100%; }
  .btn-cancel { flex:1; padding:13px; border-radius:12px; border:1.5px solid #ddd; background:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; color:#555; }
  .btn-delete { flex:1; padding:13px; border-radius:12px; border:none; background:#e74c3c; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .backup-modal { background:#fff; border-radius:20px; padding:24px; width:92%; max-width:420px; max-height:85vh; overflow-y:auto; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .backup-textarea { width:100%; height:220px; font-size:12px; padding:10px; border-radius:10px; border:1.5px solid #2d6a4f; font-family:monospace; line-height:1.6; resize:none; background:#f9fef9; }
  .hidden { display:none; }
</style>
</head>

let supa = null;
function getSupa() {
  if (!supa) supa = supabase.createClient(SUPA_URL, SUPA_KEY);
  return supa;
}

async function dbGet() {
  try {
    const { data, error } = await getSupa().from("records").select("*").order("timestamp", {ascending:true});
    if (error || !data) return [];
    return data.map(r => ({
      id: r.id, timestamp: r.timestamp,
      department: r.department, departmentName: r.department_name,
      amount: Number(r.amount), currency: r.currency||"LAK",
      note: r.note||"", image: r.image||null,
      verified: r.verified||false, approved: r.approved||false,
    }));
  } catch(e) { console.error(e); return []; }
}

async function dbSave(rec) {
  await getSupa().from("records").insert({
    id: rec.id, timestamp: rec.timestamp,
    department: rec.department, department_name: rec.departmentName,
    amount: rec.amount, currency: rec.currency||"LAK",
    note: rec.note||"", image: rec.image||null,
    verified: false, approved: false,
  });
}

async function dbUpdate(id, patch) {
  await getSupa().from("records").update(patch).eq("id", id);
}

async function dbDelete(id) {
  await getSupa().from("records").delete().eq("id", id);
}

function fmtKIP(n) { return (n||0).toLocaleString("lo-LA") + " ກີບ"; }
function fmtTHB(n) { return (n||0).toLocaleString("th-TH") + " ບາດ"; }
function fmtAmt(n,c) { return c==="THB" ? fmtTHB(n) : fmtKIP(n); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString("lo-LA",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function fmtNum(d) { return d ? d.replace(/\B(?=(\d{3})+(?!\d))/g,".") : ""; }
function todayKey() { const d=new Date(); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function monthKey() { const d=new Date(); return d.getFullYear()+"-"+d.getMonth(); }

function compressImg(dataUrl) {
  return new Promise(res => {
    const i = new Image();
    i.onload = () => {
      const MAX=500; let w=i.width,h=i.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(i,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.4));
    };
    i.onerror=()=>res(null); i.src=dataUrl;
  });
}

let state = { mode:null, pin:null };
function render() {
  // Stop any admin polling
  if (adminInterval) { clearInterval(adminInterval); adminInterval = null; }
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (state.pin==="admin") { app.innerHTML = pinHTML("🔐 ລະຫັດຜູ້ອານຸມັດ","admin"); return; }
  if (state.pin==="owner") { app.innerHTML = pinHTML("🔐 ລະຫັດຫົວໜ້າ","owner"); return; }
  if (state.mode==="staff") {
    app.innerHTML = headerHTML("ສົ່ງຍອດ & ຖ່າຍຮູບບິນ");
    app.insertAdjacentHTML("beforeend", deptGridHTML());
    return;
  }
  if (state.mode==="admin"||state.mode==="owner") {
    app.innerHTML = headerHTML(state.mode==="owner"?"👑 ຫົວໜ້າ — ເບິ່ງຍອດເງິນ":"🔍 ກຳລັງກວດສອບ") + adminLoadingHTML();
    loadAdmin();
    return;
  }
  app.innerHTML = homeHTML();
}

function headerHTML(title) {
  return `<div class="header"><button class="header-back" onclick="goBack()">←</button><span class="header-title">${title}</span></div>`;
}
function bindHeader() { /* back handled by goBack() */ }
function goBack() { state.mode=null; state.pin=null; render(); }

let pinVal = "";
function pinHTML(title, target) {
  pinVal = "";
  return `<div class="pin-wrap">
    <button class="back-btn" onclick="state.pin=null;render()">← ກັບ</button>
    <div class="pin-title">${title}</div>
    <div class="pin-dots" id="pin-dots">
      ${[0,1,2,3].map(()=>'<div class="pin-dot"></div>').join("")}
    </div>
    <div id="pin-error" class="pin-error hidden"></div>
    <div class="pin-grid">
      ${["1","2","3","4","5","6","7","8","9","","0","DEL"].map(k=>
        k===""?'<button class="pin-key empty" disabled></button>':
        `<button class="pin-key ${k==="DEL"?"del":""}" onclick="tapPin('${k}','${target}')">${k==="DEL"?"⌫":k}</button>`
      ).join("")}
    </div>
  </div>`;
}
function tapPin(k, target) {
  if (k==="DEL") { pinVal=pinVal.slice(0,-1); updateDots(false); return; }
  pinVal += k;
  updateDots(false);
  if (pinVal.length===4) {
    const correct = target==="admin" ? ADMIN_PIN : OWNER_PIN;
    if (pinVal===correct) { state.pin=null; state.mode=target; render(); }
    else { updateDots(true); setTimeout(()=>{ pinVal=""; updateDots(false); },500); }
  }
}
function updateDots(error) {
  const dots = document.querySelectorAll(".pin-dot");
  dots.forEach((d,i) => {
    d.className = "pin-dot" + (i<pinVal.length ? (error?" error":" filled") : "");
  });
  const err = document.getElementById("pin-error");
  if (err) { err.textContent = error?"ລະຫັດບໍ່ຖືກຕ້ອງ":""; err.className = "pin-error"+(error?"":" hidden"); }
}

function onAmtInput(el, cur) {
  const digits = el.value.replace(/\D/g,"");
  if (cur==="LAK") staffState.rawLAK=digits; else staffState.rawTHB=digits;
  el.value = fmtNum(digits);
  const num = digits ? parseInt(digits,10) : 0;
  if (cur==="LAK") {
    const p=document.getElementById("preview-lak");
    if(p){p.textContent=fmtKIP(num);p.style.display=digits?"block":"none";}
  } else {
    const p=document.getElementById("preview-thb");
    if(p){p.textContent=fmtTHB(num);p.style.display=digits?"block":"none";}
  }
  const numLAK = staffState.rawLAK?parseInt(staffState.rawLAK,10):0;
  const numTHB = staffState.rawTHB?parseInt(staffState.rawTHB,10):0;
  const btn=document.getElementById("submit-btn");
  if(btn){btn.disabled=!(numLAK>0||numTHB>0);}
  const warn=document.querySelector(".warn-box");
  if(warn){warn.style.display=(numLAK>0||numTHB>0)?"none":"block";}

function onFileChange(el) {

    staffState.img=compressed;

    const scroll=app.querySelector(".form-scroll");
    if(scroll){
      const inner=scroll.querySelector("#form-inner");
      if(inner)inner.innerHTML=formBodyHTML();
    }
  };
  r.readAsDataURL(file);
}
async function submitRecord() {
  const numLAK=staffState.rawLAK?parseInt(staffState.rawLAK,10):0;
  const numTHB=staffState.rawTHB?parseInt(staffState.rawTHB,10):0;
  if(numLAK<=0&&numTHB<=0) return;

  const btn=document.getElementById("submit-btn");
  if(btn){btn.disabled=true;btn.textContent="⏳ ກຳລັງສົ່ງ...";}
  try {
    if(numLAK>0) await dbSave({id:Date.now(),timestamp:Date.now(),department:staffState.dept.id,departmentName:staffState.dept.name,amount:numLAK,currency:"LAK",note:staffState.name,image:staffState.img});

function renderAdmin() {
  const app=document.getElementById("app");
  const header=app.querySelector(".header");
  if(!header) return;
  const isOwner=state.mode==="owner";
  const filtered=adminRecords.filter(r=>{
    if(isOwner&&!r.verified) return false;
    const d=new Date(r.timestamp);
    const rk=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();
    const rm=d.getFullYear()+"-"+d.getMonth();
    if(adminTab==="today") return rk===todayKey();
    if(adminTab==="month") return rm===monthKey();
    return true;
  });
  const pending=adminRecords.filter(r=>!r.verified).length;
  const totalLAK=filtered.filter(r=>!r.currency||r.currency==="LAK").reduce((s,r)=>s+r.amount,0);
  const totalTHB=filtered.filter(r=>r.currency==="THB").reduce((s,r)=>s+r.amount,0);
  const byDept=DEPTS.map(d=>{
    const rows=filtered.filter(r=>r.department===d.id);
    return {...d,total:rows.reduce((s,r)=>s+r.amount,0),count:rows.length};
  }).filter(d=>d.total>0);

  let html=`<div class="admin-wrap">
    <div class="total-card">
      <div class="total-label">${adminTab==="today"?"ຍອດລວມມື້ນີ້":adminTab==="month"?"ຍອດລວມເດືອນນີ້":"ຍອດລວມທັງໝົດ"}</div>
      ${totalLAK>0?`<div class="total-amount">${fmtKIP(totalLAK)}</div>`:""}
      ${totalTHB>0?`<div class="total-amount2">${fmtTHB(totalTHB)}</div>`:""}
      ${totalLAK===0&&totalTHB===0?`<div class="total-amount">${fmtKIP(0)}</div>`:""}
      <div class="total-count">${filtered.length} ລາຍການ</div>
      ${!isOwner&&pending>0?`<span class="pending-badge">⏳ ລໍ້ຖ້າກວດສອບ ${pending} ລາຍການ</span>`:""}
    </div>
    <div class="tabs">
      <button class="tab ${adminTab==="today"?"active":""}" onclick="setTab('today')">ມື້ນີ້</button>
      <button class="tab ${adminTab==="month"?"active":""}" onclick="setTab('month')">ເດືອນນີ້</button>
      <button class="tab ${adminTab==="all"?"active":""}" onclick="setTab('all')">ທັງໝົດ</button>
    </div>
    ${!isOwner?`<div class="backup-row">
      <button class="backup-btn" onclick="doBackup()">📥 Backup</button>
      <button class="restore-btn" onclick="document.getElementById('restore-file').click()">📤 Restore</button>
      <input type="file" id="restore-file" accept=".json" class="hidden" onchange="doRestore(this)">
    </div>`:""}`; 

  if(byDept.length>0) {
    html+=`<div class="dept-summary"><div class="section-title">ສະຫຼຸບຕາມພະແນກ</div>`;
    byDept.forEach(d=>{
      html+=`<div class="dept-sum-row"><span>${d.icon} ${d.name}</span><div style="display:flex;gap:8px;align-items:center"><span style="font-size:11px;color:#aaa">${d.count} ລາຍການ</span><span style="font-weight:700;font-size:14px;color:${d.color}">${fmtKIP(d.total)}</span></div></div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="section-title">ລາຍການທັງໝົດ</div>`;
  if(filtered.length===0) {
    html+=`<div class="empty">${isOwner?"ຍັງບໍ່ມີລາຍການ ສຳເລັດ":"ຍັງບໍ່ມີລາຍການ"}</div>`;
  } else {
    [...filtered].reverse().forEach(r=>{
      const dept=DEPTS.find(d=>d.id===r.department)||{icon:"📦",name:r.departmentName,color:"#999"};
      html+=`<div class="record-card" style="border-left-color:${dept.color}">
        <div class="record-top">
          <span class="record-dept">${dept.icon} ${r.departmentName}</span>
          <span class="record-amt" style="color:${dept.color}">${fmtAmt(r.amount,r.currency||"LAK")}</span>
        </div>
        <div class="record-meta">
          <span class="record-time">${fmtDate(r.timestamp)} ${r.currency==="THB"?"🇹🇭":"🇱🇦"}</span>
          <span class="status-badge ${r.verified?"status-done":"status-wait"}">${r.verified?"✅ ສຳເລັດ":"⏳ ລໍ້ຖ້າ"}</span>
        </div>
        ${r.note?`<div class="record-name">👤 ${r.note}</div>`:""}
        <div class="record-actions">
          ${r.image?`<button class="view-btn" onclick="viewBill(${r.id})">🖼 ເບິ່ງບິນ</button>`:""}
          ${!isOwner?`<button class="verify-btn ${r.verified?"done":"wait"}" onclick="tapVerify(${r.id})">${r.verified?"✅ ສຳເລັດ":"⏳ ກົດຢືນຢັນ"}</button>`:""}
          ${!isOwner?`<button class="delete-btn" onclick="confirmDelete(${r.id})">🗑</button>`:""}
        </div>
      </div>`;
    });
  }
  html+=`</div>`;

  // Replace content after header
  const oldContent=app.querySelector(".admin-wrap,.loading");
  if(oldContent) oldContent.remove();
  const scrollDiv=document.createElement("div");
  scrollDiv.style="overflow-y:auto;-webkit-overflow-scrolling:touch;height:calc(100vh - 52px)";
  scrollDiv.innerHTML=html;
  app.appendChild(scrollDiv);
}

async function doBackup() {
  const all=await dbGet();
  const approved=all.filter(r=>r.approved&&r.verified);
  const d=new Date();
  const dateStr=d.toLocaleDateString("lo-LA",{day:"2-digit",month:"long",year:"numeric"});
  let lines=["═══════════════════════","  ງານເງິນຮ້ານດາວອນ",`  ວັນທີ: ${dateStr}`,"═══════════════════════",""];
  let tLAK=0,tTHB=0;
  approved.forEach((r,i)=>{
    const dt=new Date(r.timestamp);
    const time=dt.toLocaleTimeString("lo-LA",{hour:"2-digit",minute:"2-digit"});
    const dateR=dt.toLocaleDateString("lo-LA",{day:"2-digit",month:"short"});
    lines.push(`${i+1}. ${r.departmentName}`);
    if(r.note) lines.push(`   👤 ${r.note}`);
    lines.push(`   💰 ${fmtAmt(r.amount,r.currency||"LAK")}`);
    lines.push(`   🕐 ${dateR} ${time}`,"");
    if(r.currency==="THB") tTHB+=r.amount; else tLAK+=r.amount;
  });
  lines.push("───────────────────────","  ສະຫຼຸບຍອດລວມ");
  if(tLAK>0) lines.push(`  💵 ${fmtKIP(tLAK)}`);
  if(tTHB>0) lines.push(`  💵 ${fmtTHB(tTHB)}`);
  lines.push(`  📋 ທັງໝົດ ${approved.length} ລາຍການ`,"═══════════════════════");
  const text=lines.join("\n");
  const overlay=document.createElement("div");
  overlay.className="overlay";
  overlay.innerHTML=`<div class="backup-modal">
    <div style="font-size:36px">💾</div>
    <div style="font-size:20px;font-weight:800">Backup ສຳເລັດ</div>
    <div style="font-size:12px;color:#27ae60;font-weight:600">✅ ກວດສອບແລ້ວ ${approved.length} ລາຍການ</div>
    <div style="font-size:12px;color:#aaa;text-align:center">ກົດທີ່ຊ່ອງດ້ານລຸ່ມເພື່ອ Copy</div>
    <textarea class="backup-textarea" readonly onclick="this.select();navigator.clipboard.writeText(this.value).catch(()=>{})">${text}</textarea>
    <button class="btn-green" style="margin-bottom:0;width:100%" onclick="this.closest('.overlay').remove()">ປິດ</button>
  </div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
  try{navigator.clipboard.writeText(text);}catch{}
}

function doRestore(el) {
  const file=el.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=async ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      const imported=data.records||data;
      if(!Array.isArray(imported)) throw new Error();
      const existing=await dbGet();
      const ids=new Set(existing.map(r=>r.id));
      const newRecs=imported.filter(r=>!ids.has(r.id));
      for(const rec of newRecs) await dbSave(rec);
      await refreshAdmin();
      alert(`ນຳເຂົ້າ ${newRecs.length} ລາຍການສຳເລັດ`);
    } catch { alert("ໄຟລ໌ບໍ່ຖືກຕ້ອງ"); }
  };
  r.readAsText(file); el.value="";
}

// ── INIT ─────────────────────────────────────────────────
render();
</script>
</body>
</html>
