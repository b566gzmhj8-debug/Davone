<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daovone Shop – ລະບົບລວມ</title>
<style>
  :root{
    --ivory:#f6f3ec; --card:#ffffff; --navy:#16233d; --navy-2:#1c2a48;
    --gold:#a9834b; --gold-light:#e9ddc4; --ink:#1c2430; --muted:#7a7568;
    --hair:rgba(28,36,48,.14);
  }
  *{box-sizing:border-box;}
  html,body{touch-action:manipulation;}
  body{margin:0;font-family:'Lao MN',-apple-system,sans-serif;background:var(--ivory);color:var(--ink);}
  .serif{font-family:'Lao MN',-apple-system,sans-serif;}

  /* ---------- LOGIN ---------- */
  #login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;background:var(--navy);padding:32px 24px;position:relative;}
  #login-wrap::before, #login-wrap::after{content:"";position:absolute;left:50%;transform:translateX(-50%);
    width:min(360px,80%);height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  #login-wrap::before{top:20px;} #login-wrap::after{bottom:20px;}
  .crest{width:112px;height:112px;border:2px solid var(--gold);border-radius:50%;display:flex;
    align-items:center;justify-content:center;margin-bottom:18px;overflow:hidden;background:#0d1730;
    box-shadow:0 0 0 6px rgba(169,131,75,.12);}
  .crest img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  #login-wrap h1{color:#f3ead2;font-size:1.05rem;font-weight:600;margin:0 0 6px;text-align:center;
    letter-spacing:.02em;line-height:1.55;max-width:340px;}
  #login-wrap .sub{color:rgba(233,221,196,.55);font-size:.78rem;margin:0 0 30px;letter-spacing:.05em;}
  .login-form{width:100%;max-width:280px;display:flex;flex-direction:column;gap:14px;margin-top:4px;}
  .login-input{width:100%;padding:14px 16px;border-radius:3px;border:1px solid rgba(233,221,196,.28);
    background:rgba(255,255,255,.03);color:#f3ead2;font-size:.95rem;font-family:'Lao MN',-apple-system,sans-serif;outline:none;transition:.15s;}
  .login-input::placeholder{color:rgba(233,221,196,.35);}
  .login-input:focus{border-color:var(--gold);background:rgba(255,255,255,.06);}
  .login-err{color:#d8a596;font-size:.8rem;min-height:1.2em;letter-spacing:.03em;text-align:center;}
  .login-btn{width:100%;padding:14px;border:none;border-radius:3px;background:var(--gold);color:var(--navy);
    font-weight:600;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;font-family:'Lao MN',-apple-system,sans-serif;transition:.15s;}
  .login-btn:active{filter:brightness(.92);}

  /* ---------- MENU (statement style) ---------- */
  #menu-wrap{display:none;min-height:100vh;background:var(--ivory);}
  .menu-header{background:var(--navy);color:#f3ead2;padding:28px 28px 22px;position:relative;}
  .menu-header .eyebrow{font-size:1rem;font-weight:600;letter-spacing:.02em;color:var(--gold-light);
    opacity:1;margin-bottom:10px;line-height:1.35;max-width:520px;}
  .menu-header .name{font-family:'Lao MN',-apple-system,sans-serif;font-size:1.4rem;font-weight:600;}
  .logout-btn{position:absolute;top:26px;right:26px;background:transparent;border:1px solid rgba(233,221,196,.4);
    color:#f3ead2;border-radius:2px;padding:8px 16px;font-size:.72rem;letter-spacing:.08em;
    text-transform:uppercase;font-family:'Lao MN',-apple-system,sans-serif;}
  .statement{max-width:640px;margin:0 auto;padding:0 24px;}
  .statement-title{display:flex;justify-content:space-between;align-items:baseline;
    padding:22px 0 10px;border-bottom:1px solid var(--hair);margin-top:20px;}
  .statement-title span{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .rows{}
  .row{display:flex;align-items:center;gap:18px;padding:20px 4px;border-bottom:1px solid var(--hair);cursor:pointer;}
  .row:active{background:rgba(169,131,75,.06);}
  .row .num{font-family:'Lao MN',-apple-system,sans-serif;font-size:.85rem;color:var(--gold);width:22px;}
  .row .ic{width:40px;height:40px;border:1px solid var(--hair);border-radius:2px;display:flex;
    align-items:center;justify-content:center;color:var(--navy);flex-shrink:0;}
  .row .ic svg{width:19px;height:19px;}
  .row .txt{flex:1;}
  .row .txt b{display:block;font-family:'Lao MN',-apple-system,sans-serif;font-weight:600;font-size:1.02rem;color:var(--navy-2);}
  .row .txt span{font-size:.75rem;color:var(--muted);}
  .row .chev{color:var(--gold);font-size:1.1rem;}
  .empty-note{text-align:center;color:var(--muted);margin-top:60px;padding:0 24px;font-size:.9rem;}

  /* ---------- MODULE VIEW ---------- */
  #module-wrap{display:none;position:fixed;inset:0;background:#000;z-index:50;}
  .module-bar{height:50px;background:var(--navy);display:flex;align-items:center;
    padding:0 14px;gap:12px;border-bottom:2px solid var(--gold);}
  .back-btn{background:var(--gold);color:var(--navy);border:none;border-radius:2px;
    padding:8px 16px;font-weight:600;font-size:.78rem;font-family:'Lao MN',-apple-system,sans-serif;letter-spacing:.02em;}
  .module-bar .mtitle{color:#f3ead2;font-size:.85rem;opacity:.9;font-family:'Lao MN',-apple-system,sans-serif;}
  #module-frame{width:100%;height:calc(100% - 50px);border:none;background:#fff;}

  /* ---------- DESKTOP / MacBook (mouse & trackpad) ---------- */
  .login-btn,.logout-btn,.back-btn{cursor:pointer;}
  @media (hover:hover) and (pointer:fine){
    .login-btn:hover{filter:brightness(1.06);}
    .row:hover{background:rgba(169,131,75,.05);}
    .logout-btn:hover{background:rgba(233,221,196,.08);}
    .back-btn:hover{filter:brightness(1.08);}
  }
</style>
</head>

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginErr');
  if(!username || !password){
    errEl.textContent = "ກະລຸນາປ້ອນຊື່ຜູ້ໃຊ້ ແລະ ລະຫັດຜ່ານ";
    return;
  }
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/hub_accounts?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&active=eq.true&select=*`, { headers: HEADERS });
    const rows = await res.json();
    if(rows && rows.length){
      currentUser = rows[0];
      sessionStorage.setItem('daovone_hub_user', JSON.stringify(currentUser));
      syncStockSession(currentUser);
      showMenu();
    } else {
      errEl.textContent = "ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ";
      document.getElementById('password').value = "";
    }
  }catch(e){
    errEl.textContent = "ເຊື່ອມຕໍ່ບໍ່ໄດ້ ລອງໃໝ່";
  }
}

/* ================= MENU LOGIC ================= */
function showMenu(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('menu-wrap').style.display='block';
  document.getElementById('userName').textContent = `ສະບາຍດີ, ${currentUser.name}`;
  const now = new Date();
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('dateStr').textContent = `${dd}.${mm}.${now.getFullYear()}`;

  const allowed = Array.isArray(currentUser.modules) ? currentUser.modules : [];
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = "";
  let count = 0;
  let i = 0;
  Object.keys(MODULES).forEach(key=>{
    if(!allowed.includes(key)) return;
    i++; count++;
    const m = MODULES[key];
    cardsEl.innerHTML += `
      <div class="row" onclick="openModule('${key}')">
        <div class="num">${String(i).padStart(2,'0')}</div>
        <div class="ic">${ICONS[key]}</div>
        <div class="txt"><b>${m.label}</b><span>ກົດເພື່ອເຂົ້າລະບົບ</span></div>
        <div class="chev">›</div>
      </div>`;
  });
  document.getElementById('emptyNote').style.display = count? 'none':'block';
}

function openModule(key){
  const m = MODULES[key];
  document.getElementById('moduleTitle').textContent = m.label;
  document.getElementById('module-frame').src = m.file;
  document.getElementById('module-wrap').style.display='block';
}
function closeModule(){
  document.getElementById('module-wrap').style.display='none';
  document.getElementById('module-frame').src = "about:blank";
}
function logout(){
  sessionStorage.removeItem('daovone_hub_user');
  sessionStorage.removeItem('dv_stock_session');
  currentUser = null;
  document.getElementById('menu-wrap').style.display='none';
  document.getElementById('module-wrap').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('username').value = "";
  document.getElementById('password').value = "";
  document.getElementById('loginErr').innerHTML = "&nbsp;";
}

/* ================= INIT ================= */
const saved = sessionStorage.getItem('daovone_hub_user');
if(saved){
  try{ currentUser = JSON.parse(saved); syncStockSession(currentUser); showMenu(); }catch(e){}
}
</script>
